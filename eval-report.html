stage\"},{\"name\":\"tech_stack_summary\"},{\"name\":\"account_health\"},{\"name\":\"primary_contact_name\"},{\"name\":\"primary_contact_email\"},{\"name\":\"contacts_json\"},{\"name\":\"notes\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT customer_id, name, industry, notes FROM customers WHERE account_health = 'at_risk' OR account_health LIKE '%risk%';\"}","output":"[{\"customer_id\":\"cus_10762173c26d\",\"name\":\"BlueHarbor Logistics\",\"industry\":\"Logistics\",\"notes\":\"Executive mandate (VP Ops) to reduce manual work by 40% over 6 months. Customer reports search relevance drop after metadata/taxonomy update rolled last month; suspected index weighting mismatch with new schema. Considering NoiseGuard for temporary dedupe if Nexus search can't be stabilized quickly.\"},{\"customer_id\":\"cus_b430f59e0caf\",\"name\":\"City of Verdant Bay\",\"industry\":\"Public Sector\",\"notes\":\"Migration from ProcureFlow completed 2026-02-10. Since migration, ~22% of approval-triggered playbooks have failed validation due to policy override mismatches between municipal (country/province) policy sets and new global defaults. Renewing contract in April 2026; customer requested price relief and technical remediation plan.\"},{\"customer_id\":\"cus_6a81c89143a3\",\"name\":\"NorrLog Freight AB\",\"industry\":\"Logistics\",\"notes\":\"Pilot expanded to second BU (contract logistics) on 2026-02-15. Since expansion, executive dashboards show 30–45 minute lag on hourly scheduled reports; customer concerned about SLAs for C-suite reporting. Procurement evaluating EdgeCollector Co. for cheaper collectors; security and compliance need SOC2 alignment evidence. Primary pain: reporting latency for executive dashboards; root cause traced to slow enrichment stage and repeated reprocessing in ingestion pipeline.\"},{\"customer_id\":\"cus_4637d32c1def\",\"name\":\"Harbourline Regional Transit Authority\",\"industry\":\"Public Sector\",\"notes\":\"Trigger: Board requested tighter operating metrics (2026-02 board meeting). Pain: role provisioning lag post-restructure; root cause traced to inconsistent SCIM mappings + fragmented approval chains across three regional divisions. Considering ObservaGrid renewal for deeper tracing; negotiation window ends 2026-04-02. Pilot covers Signal Insights + Event Nexus (private cloud appliances) spanning identity lifecycle events (approx. 750 GB/day peak ingestion during shift windows).\"},{\"customer_id\":\"cus_37e1826806c9\",\"name\":\"Peregrine Logistics Group\",\"industry\":\"Logistics\",\"notes\":\"Trigger: post-acquisition systems consolidation caused inconsistent idempotency keys. Renewal negotiation flagged for Q2 2026; customer reporting high alert volume and duplicate runbook executions increasing operational load by estimated 18% on ops team.\"},{\"customer_id\":\"cus_e1ae80e00362\",\"name\":\"Province of Laurentia — Department of Public Works\",\"industry\":\"Public Sector\",\"notes\":\"Recent regional launch (Laurentia-East operations) created multiple new ingest sources. Implementation slowed by unclear ownership of canonical event schema between Operations and Corporate IT. Using Northstar products Orchestrator and Signal Ingest; competing against MetricLens for dashboarding contracts. Single-tenant cloud deployment with on-prem collectors required for data residency.\"},{\"customer_id\":\"cus_c017e831b967\",\"name\":\"NordFryst AB\",\"industry\":\"Logistics\",\"notes\":\"Renewal negotiation opened 2026-03-10 after procurement push to reduce vendor count and lower per-GB ingest fees. Customer reported 45% increase in alert volume since Oct 2025; noisy alerts tied to temperature sensor jitter at 120 remote sites and default threshold rules left from pilot.\"},{\"customer_id\":\"cus_7355bb61ec30\",\"name\":\"Department of Regional Services (DRS)\",\"industry\":\"Public Sector\",\"notes\":\"Trigger event: high-severity escalation after quarterly audit (Q4 FY25) where three exceptions routed automatically were overridden manually and later caused delayed reconciliations. Frontline teams distrust confidence thresholds; they prefer manual overrides. Customer demands stronger auditability and a staged rollback of automated rules. Primary competitor in discussions: ComplianceStream (audit packaging) — customer previously evaluated ComplianceStream for compliance exports but chose Northstar for insights; now using ComplianceStream connectors for evidence bundles.\"},{\"customer_id\":\"cus_fe2c64f4608d\",\"name\":\"Pioneer Freight Solutions\",\"industry\":\"Logistics\",\"notes\":\"Executive mandate (Feb 2026) to reduce manual work across operations; recent taxonomy change (2026-02-18) by Asset Management team caused search relevance degradation in Event Nexus incident lookups. Primary competitor in noise reduction is NoiseGuard (deployed in parallel in a tactical PoC). Renewal negotiation in progress for enterprise agreement covering Event Nexus + Orchestrator; implementation still active with several open engineering tasks and a medium-severity support ticket about knowledge retrieval.\"},{\"customer_id\":\"cus_e98688cf78bc\",\"name\":\"Maple Regional Transit Authority\",\"industry\":\"Public Sector\",\"notes\":\"Pilot started 2026-01-12. Migration from ProcFlow completed 2026-02-25; post-migration approval failures began 2026-03-05 when a global default policy was applied inadvertently. Primary concern is regulatory SLA for incident approvals in Ontario and Quebec regions.\"}]"}]},{"id":"gold_0036","question":"Give me your read on BeaconOps as a competitor, its strengths and where it's weak.","answer":"BeaconOps is a direct competitor in Incident Intelligence — cloud-native incident correlation and runbook automation, mid-range pricing. **Strengths:** fast agent onboarding and a large playbook library. **Weaknesses:** limited retention controls and weak compliance exports, so we can lean on those gaps in regulated/enterprise deals.","expected":"BeaconOps's main strengths are fast agent onboarding and a large playbook library. Its main weaknesses are limited retention controls and less emphasis on compliance exports.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0.14285714285714285,"precision":1,"mrr":0.5,"perEntity":{"competitors":{"found":1,"gold":1,"recall":1,"precision":1},"artifacts":{"found":0,"gold":6,"recall":0,"precision":0}}},"expectedIds":{"competitors":["cmp_15f3d499e5c7"],"artifacts":["art_0927b1cbb7f4","art_1290f5ea8c04","art_1e14a6be3a7f","art_2432dccbcdcb","art_2a33ad2fe047","art_3138b5cfc288"]},"predicted":{"competitors":["cmp_15f3d499e5c7"]},"toolCallCount":1,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT * FROM competitors WHERE name LIKE '%BeaconOps%'\"}","output":"[{\"competitor_id\":\"cmp_15f3d499e5c7\",\"name\":\"BeaconOps\",\"segment\":\"Direct - Incident Intelligence\",\"description\":\"Incident correlation and runbook automation focused on cloud-native teams; emphasizes lightweight agents and playbook marketplace.\",\"pricing_position\":\"Mid-range\",\"strengths_json\":\"[\\\"Fast agent onboarding\\\", \\\"Large playbook library\\\"]\",\"weaknesses_json\":\"[\\\"Limited retention controls\\\", \\\"Less emphasis on compliance exports\\\"]\"}]"}]},{"id":"gold_sample_01","question":"Which customer's issue started after the 2026-02-20 taxonomy rollout, and what proof plan did we propose to get them comfortable with renewal?","answer":"**BlueHarbor Logistics** — their taxonomy rollout on 2026-02-20 degraded Event Nexus search relevance (duplicates, low-relevance hits, ~6 hrs/day of manual triage). To get them comfortable with renewal/expansion, we proposed a **proof-of-fix plan**: an index re-weighting + taxonomy-mapping layer for their top 20 saved searches, A/B tested in staging to hit ≥80% top-5 accuracy within 7–10 business days, backed by a conditional one-quarter invoice credit if the target isn't met (with a targeted 3-month reindex as fallback and a $48k 90-day PS engagement, 30% off if they sign the Orchestrator expansion).\n\n(Note: other customers—Arcadia, HelioFab, CedarWind, Pioneer—had similar issues, but their rollouts were on later/other dates; only BlueHarbor's matches 2026-02-20.)","expected":"That was BlueHarbor Logistics. Northstar proposed a 7-10 business day proof-of-fix: update index weighting, add a taxonomy mapping layer, and run an A/B test on the top 20 saved searches, with success defined as top-5 correct hit rate of at least 80 percent on prioritized queries.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0.6,"precision":0.3333333333333333,"mrr":0.5,"perEntity":{"customers":{"found":0,"gold":1,"recall":0,"precision":0},"artifacts":{"found":3,"gold":4,"recall":0.75,"precision":0.3333333333333333}}},"expectedIds":{"customers":["cus_10762173c26d"],"artifacts":["art_8b0063fbb3cb","art_bd3560dfe194","art_0bccc580184e","art_3e9031389474"]},"predicted":{"artifacts":["art_8b0063fbb3cb","art_0bccc580184e","art_bd3560dfe194","art_e20b32ed9bb7","art_90991e25335f","art_873d28d96596","art_2014be7c5aa4","art_03d9a25a52e2","art_a504e4c5b6f8"]},"toolCallCount":2,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM sqlite_master WHERE type='table';\"}","output":"[{\"name\":\"company_profile\"},{\"name\":\"products\"},{\"name\":\"competitors\"},{\"name\":\"employees\"},{\"name\":\"scenarios\"},{\"name\":\"customers\"},{\"name\":\"implementations\"},{\"name\":\"artifacts\"},{\"name\":\"artifacts_fts_data\"},{\"name\":\"artifacts_fts_idx\"},{\"name\":\"artifacts_fts_content\"},{\"name\":\"artifacts_fts_docsize\"},{\"name\":\"artifacts_fts_config\"},{\"name\":\"artifacts_fts\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT * FROM artifacts_fts WHERE artifacts_fts MATCH 'taxonomy rollout' LIMIT 10;\"}","output":"[{\"artifact_id\":\"art_8b0063fbb3cb\",\"title\":\"Support ticket: Search relevance degraded after taxonomy rollout on 2026-02-20; saved searches returning poor and duplicate results, increasing manual triage.\",\"summary\":\"Search relevance degraded after taxonomy rollout on 2026-02-20; saved searches returning poor and duplicate results, increasing manual triage.\",\"content_text\":\"Customer reports: since 2026-02-20 taxonomy change, Event Nexus search returns many low-relevance hits and duplicates. SRE suspects schema registry (SI-SCHEMA-REG) entries were not versioned correctly vs EN-ENTITY-GRAPH and EN-RULES-ENGINE mappings. Request: urgent guidance on re-weighting index fields, potential reindex, and timeline/cost estimate for minimal viable fix.\"},{\"artifact_id\":\"art_0bccc580184e\",\"title\":\"Renewal Negotiation call with BlueHarbor Logistics\",\"summary\":\"Renewal/expansion call with VP Ops and SREs. Customer pressed for a short-term plan to restore search relevance within 4 weeks to satisfy an executive mandate to reduce manual work. Northstar team proposed an immediate tuning patch (schema mapping and weight adjustments), scoped a targeted reindex (3 months of data) as contingency, and offered a 90-day professional services engagement for implementation and runbook training. Customer raised pricing and risk objections and asked for a proof-of-fix within 10 business days.\",\"content_text\":\"Liam O'Connor (Northstar Sales): Hi Sofia, thanks for making time. Quick agenda: diagnose impact, present short/medium fixes, and discuss renewal terms tied to delivery. You're on a tight exec clock, I know.\\nSofia Martinez (BlueHarbor VP Ops): Yep. Exec mandate is real — reduce manual triage by 40% in 6 months. Search relevance tanked after our taxonomy push on Feb 20. Our triage team is spending ~6 hours/day on manual sorting. We need to see measurable improvement within four weeks or I get asked why we're spending on platform renewals.\\nEvan Cho (Director SRE): To add, saved searches now surface old host tags and mix endpoints with batch jobs. We looked at schema registry entries and it looks like the field weighting that EN uses didn't get updated; some fields are now high-cardinality and pollute results.\\nJin Park (Northstar Solutions Engineer): Thanks Evan — that maps to what we've seen in the ticket. Short term we can push a tuning patch: update the index weighting and add a mapping layer that translates the new taxonomy terms to the old query terms. That should improve top-K relevance for the most-used queries. Implementation estimate: 3 engineers, ~5 business days to test and validate in staging, then 1 day for prod rollout.\\nSofia Martinez: Five business days to test? Our executives expect a proof within 10 business days. Can you guarantee measurable improvement for critical queries in that window?\\nIsabella Rossi (Data Scientist): We can run an A/B on the mapping and weighting on a subset — pick the top 20 saved searches Priya uses. If we can lift top-5 correct hits to >= 80% for those, would that be acceptable as a proof? It’s feasible in 7-10 business days including validation.\\nSofia Martinez: That could work. Cost is a factor. Last renewal we were at $780k/year. You're proposing professional services on top — how much?\\nLiam O'Connor: We can offer a 90-day targeted PS engagement for $48k (fixed-price) to implement tuning, build the mapping layer, and run the proof. If you commit to expansion of Orchestrator seats now, we can discount the PS by 30% and defer reindex cost discussions until after the proof.\\nEvan Cho: Important to note: if the tuning fails we will likely need to reindex ~3 months (approx 15 TB) of events. That would take an estimated 48 hours of cluster compute and a projected one-time cost of ~$25k for processing and cloud transient resources. Also risk: during reindexing we might need a short ingest throttle window.\\nSofia Martinez: I'm worried about vendor lock-in here: NoiseGuard is cheap and can buy us time with quick dedupe while we decide. Why not take them for 3 months and avoid the upfront PS spend?\\nNoah Becker (Northstar Sales Engineer): NoiseGuard can do dedupe, yes, but it won't solve index weighting or taxonomy mismatches. It will suppress duplicates but still return low-relevance results because the query semantics are wrong. Also that's another integration and more operational overhead for your SREs.\\nPriya Rao (Incident Ops Manager): Practically, we need fewer manual steps now. If NoiseGuard suppresses duplicates but search still returns bad hits, our triage burden may only drop 10-15% — not enough for the exec memo.\\nSofia Martinez: Okay, so what do you need from us to start the 7-10 day proof?\\nJin Park: Access to a snapshot of your schema registry (SI-SCHEMA-REG) and 14 days of anonymized query logs for the top 20 saved searches. Also a staging endpoint with representative sample events. We'll need the SREs to validate acceptance criteria.\\nEvan Cho: We can provide anonymized query logs and the staging endpoint. But we need a firm SLA: if you can't show improvement in 10 business days, we want a credit on renewal or a temporary discount while we evaluate alternatives.\\nLiam O'Connor: We can agree to a conditional credit: if the proof doesn't meet the agreed top-5 accuracy uplift (>=80%) within 10 business days, we'll apply a one-quarter invoice credit prorated against the renewal for the upcoming year. We'll put this in a short SOW addendum.\\nSofia Martinez: That helps. Final concern: will this break any of our existing EN-RULES-ENGINE automations and suppression policies?\\nIsabella Rossi: We'll run compatibility tests against EN-RULES-ENGINE in staging. The mapping layer is read-only for queries and should not change rules logic; we'll validate suppression behavior and share test results.\\nSofia Martinez: Alright. Actions from my side: I'll get schema registry dump and query logs to Jin by EOD Friday (2026-03-19). From Northstar: demo/proof in 7-10 business days, conditional credit clause in SOW draft. If that passes, we proceed with expansion discount as discussed.\\nLiam O'Connor: Thanks, Sofia. We'll follow up with SOW and delivery plan. Any other risks to call out?\\nEvan Cho: Only that if mapping is insufficient, reindex timeline and cost are the fallback; we need a clear escalation path.\\nLiam O'Connor: Noted. We'll assign a PS lead and a technical lead — Jin and Isabella — and circulate a runbook for acceptance testing. Meeting adjourned.\\n\"},{\"artifact_id\":\"art_bd3560dfe194\",\"title\":\"Retro: BlueHarbor taxonomy rollout -> Event Nexus search relevance degradation\",\"summary\":\"Post-incident retro summarizing root cause, short-term mitigations, proof plan, and recommended medium-term fixes for BlueHarbor Logistics following their taxonomy change on 2026-02-20 that impacted Event Nexus search relevance. Primary goal: deliver proof-of-fix within 10 business days to secure renewal/expansion.\",\"content_text\":\"Context\\n- Customer: BlueHarbor Logistics (Large Enterprise, ~8k employees), taxonomy change rolled 2026-02-20 by VP Ops. Trigger: executive mandate to reduce manual work by 40%.\\n- Impact: Saved searches returned low-relevance hits and duplicates; triage increased to ~6 hours/day for Incident Ops.\\n- Products: Event Nexus (EN) for search/correlation; Orchestrator for runbooks.\\nRoot cause analysis\\n- Immediate: EN index weighting still references old schema fields (pre-taxonomy). SI-SCHEMA-REG versions diverged from EN mapping (fields renamed, some tag cardinality rose from ~10k to ~120k). Rules engine hot-mapping didn't receive updated compatibility mapping.\\n- Contributing: No automated backward-compatibility check in CI for schema-to-index weighting. No pre-rollout dry-run of sample queries against staging mapping.\\nShort-term mitigation (Proof-of-Fix plan)\\n- Scope: Update index weighting and add a translation/mapping layer that maps new taxonomy terms to historical query tokens for top 20 saved searches.\\n- Steps & timeline:\\n  1) 2026-03-19: Receive schema registry export + 14 days query logs from customer (responsibility: BlueHarbor).\\n  2) 2026-03-22: Start A/B test in staging (Jin, Isabella). Duration: 5 business days to tune + 2 business days validation = 7-10bd.\\n  3) Validation metrics: top-5 correct hit rate >= 80% for prioritized queries; no regression in EN-RULES-ENGINE suppression logic; incident correlation latency <200ms.\\n  4) If validation passes, 1-day prod rollout and monitoring window for 72 hours.\\n- PS Offer: 90-day block at $48k fixed to do mapping, runbook docs, and handover; 30% discount if Orchestrator expansion signed concurrently.\\nMedium-term fixes\\n- Add schema->index CI check in platform (SI-SCHEMA-REG integration) to validate weighting compatibility ahead of customer taxonomy changes.\\n- Provide a customer-configurable mapping UI to manage taxonomy translations (Q3 roadmap, enterprise SKU).\\nRisks & mitigations\\n- Reindexing (~15 TB) if mapping insufficient: estimate 48h compute, ~$25k transient cost. Mitigate by conservative mapping and progressive backfill.\\n- NoiseGuard adoption: tactical dedupe could mask the semantic problem; recommend discouraging parallel point-tool until proof completes.\\nAction items\\n- Jin Park: send SOW addendum draft with conditional credit to Liam by 2026-03-19 EOD.\\n- Isabella Rossi: design A/B test and acceptance scripts by 2026-03-20.\\n- Olivia Grant: provision staging snapshot on 2026-03-20 once BlueHarbor signs data-transfer form.\\n- Amara Okoro/Carlos Mendes: prepare weekly exec reporting template for BlueHarbor acceptance review.\\nAppendix\\n- Estimated resource usage for reindex: 48h using 8x c5.4xlarge-equivalent instances; transient cost ~$25k.\\n- Data volumes: ~15 TB (3 months), current ingestion rate ~1.2 TB/day on average.\\n- Acceptance criteria template: top-5 accuracy >=80% for prioritized queries; triage time metric (manual hours/day) reduction target to track later.\"},{\"artifact_id\":\"art_e20b32ed9bb7\",\"title\":\"Post-Mortem & Immediate Playbook: HelioFab taxonomy v2 — relevance degradation\",\"summary\":\"Root cause: cache invalidation gap between SI-SCHEMA-REG version bump and EN-CORRELATOR per-tenant weight manifest refresh. Impact: search relevance fell 40-60% beginning 2026-03-11 after HelioFab's taxonomy v2 rollout (03-10). Immediate mitigations, medium-term fix, and process changes outlined.\",\"content_text\":\"Background\\n- HelioFab executed a taxonomy refactor on 2026-03-10 to reduce manual tagging. Changes renamed asset_category->asset_type and error_code->fault_code and removed legacy tags.\\n- Event Nexus consumes normalized events via Signal Ingest and uses a per-tenant weight manifest (index weighting and analyzers) to score query relevance.\\n\\nTimeline\\n- 2026-03-10: HelioFab publishes schema v2 to Schema Registry.\\n- 2026-03-11: Automated suppression and playbook triggers observed to decline; alerts show low relevance scores.\\n- 2026-03-17: Customer opens ticket HFB-1421.\\n- 2026-03-18: Executive escalation call; immediate mitigations agreed.\\n\\nRoot Cause (technical)\\n- SI-SCHEMA-REG registered v2 but did not include compatibility header that our cache-watcher expects. Per-tenant weight manifest cache remained stale and referenced deprecated field names.\\n- EN-CORRELATOR mapping layer lacks a robust fallback for field name aliases and depends on hot-reload by cache invalidation.\\n\\nImmediate Mitigations (actionable)\\n1) Field aliases (short-term, <24h)\\n   - Create mapping aliases at query layer: asset_category -> asset_type, error_code -> fault_code.\\n   - Owner: Noah Becker. Risk: minimal. Rollback: drop aliases.\\n2) Suppression rule adjustments (short-term, <24h)\\n   - Update suppression rules to reference alias fields so playbooks resume matching.\\n   - Owner: Olivia Grant.\\n3) Cache invalidation hotfix (48h)\\n   - Deploy targeted patch to clear per-tenant weight manifest caches on schema registry version increments regardless of compatibility header.\\n   - Owner: Daniel Kim. Risk: increased cache churn; no downtime.\\n4) Weight recalibration & reindex (medium-term, scheduled 03-23)\\n   - Run recalibration job with HelioFab's sample dataset; validate against SRE-provided queries. Reindex tenant-derived indexes and promote candidate weights after validation.\\n   - Owner: Isabella Rossi.\\n\\nTesting & Validation\\n- HelioFab SRE to provide validation queries and expected mappings by 2026-03-20.\\n- Post-alias deployment: measure relevance score increase (target >= +0.25) within 12 hours.\\n- Post-recalibration: overall relevance target >= 0.85 by 2026-04-15.\\n\\nProcess & Product Improvements (post-mortem items)\\n- SDK / Docs: make compatibility header requirement explicit; add automated guide for schema vX -> vY migrations.\\n- Product: add aliasing layer in EN-CORRELATOR to auto-suggest field mappings when registry shows renamed fields.\\n- Ops: add telemetry alert when tenant relevance drops >30% within 48h after a registry change.\\n\\nStakeholder Communication\\n- Weekly executive slide deck starting 2026-03-24 (owner: Carlos Mendes).\\n- Notify procurement escalation path if unresolved by 2026-04-03.\\n\\nAppendix: Steps to Reproduce (internal)\\n1. Publish schema v2 without compatibility header to test registry.\\n2. Observe tenant weight manifest cache remains unchanged.\\n3. Run sample queries; measure drop in SIQ-AD-HOC scores and correlator match rates.\\n\\nContact list\\n- CS: Carlos Mendes (carlos.mendes@northstarsignal.example)\\n- Support: Olivia Grant (olivia.grant@northstarsignal.example)\\n- Eng: Daniel Kim (daniel.kim@northstarsignal.example)\\n- Product: Leah Park (leah.park@northstarsignal.example)\\n\\nDocument version: 1.0\\n\"},{\"artifact_id\":\"art_90991e25335f\",\"title\":\"Support ticket: Search relevance for incident lookup and playbook-trigger matching degraded after taxonomy v2.1 rollout. Users report missing results or low-ranked relevant incidents; playbook trigger misses approximately 28% of expected matches.\",\"summary\":\"Search relevance for incident lookup and playbook-trigger matching degraded after taxonomy v2.1 rollout. Users report missing results or low-ranked relevant incidents; playbook trigger misses approximately 28% of expected matches.\",\"content_text\":\"Support ticket created by Jon Park (Head of Support). Logs attached: sample query results (search_score distributions), schema diff v1->v2.1, index mapping snapshot. Action: Coordinate reindex and rule update with Northstar Signal engineering and Arcadia platform team. Priority: restore search relevance and verify playbook triggers.\"},{\"artifact_id\":\"art_873d28d96596\",\"title\":\"Quarterly Business Review call with Arcadia Cloudworks\",\"summary\":\"QBR with Arcadia leadership and Northstar Signal CSM/solutions/product teams to surface search relevance regression after taxonomy change, agree on immediate remediation (weight mapping patch + controlled reindex), and plan for Orchestrator playbook expansion to automate enrichment and tagging to meet executive mandate.\",\"content_text\":\"Carlos Mendes: Hi everyone — thanks for joining. Quick roll call then we'll dive. From Northstar: Carlos (CSM), Jin Park (SE), Isabella Rossi (Data Science). From Arcadia: Rhea (VP SRE), Marta (Platform), Jon (Head of Support).\\nRhea Banerjee: Thanks. Short version — after our product taxonomy rollout (v2.1) two weeks ago, our incident search in Event Nexus returns poor results: relevant incidents rank low or are omitted entirely. Playbooks that match on service_label no longer trigger reliably. This is blocking our 'reduce manual triage' objective.\\nCarlos Mendes: Understood. Can you quantify the impact for us? How many searches/queries affected and any SLA misses?\\nJon Park: We're seeing about a 28% miss rate on playbook trigger matches across support lookup queries, and mean time to identify incidents has grown from 12m to 28m on average for certain classes. We had two P2 escalations last week directly attributable to search misses.\\nJin Park: Thanks Jon. Do you still have the schema diff? Which fields changed name or cardinality?\\nMarta Ruiz: Yes — v1 had service_label (string), team_owner (string), env (prod/stage). v2.1 renamed service_label -> svc_label, introduced tenant_tag array (new high-cardinality field), and split team_owner into team_owner and team_lead. We rolled this via the Confluent registry on 2026-03-04.\\nIsabella Rossi: From a scoring perspective, our index weighting in Event Nexus assigned heavy weight to service_label and team_owner; the renames mean queries no longer hit those weighted paths. Also tenant_tag being high-cardinality contaminated the top-k retrieval because the index analyzer treated it as primary identifier.\\nRhea Banerjee: So concrete ask: we need search relevance back within 48 hours, and a durable solution so this doesn't repeat when taxonomy changes happen — preferably automated mapping or default fallbacks.\\nCarlos Mendes: Our proposal — short term: a mapping patch that translates svc_label and tenant_tag back into the old service_label-weighted path during query time and a controlled reindex during a 2-hour maintenance window. Medium term: Orchestrator playbooks to automate enrichment and canonical tagging at ingest so schema changes are normalized before indexing. Is Arcadia comfortable with a 2-hour reindex window?\\nMarta Ruiz: 2 hours is acceptable if we throttle reindex and ensure no spike in consumer lag on Kafka. We need explicit CPU/memory caps and an option to run the reindex through a staging worker pool first.\\nJin Park: Technically we can do a phased approach: (1) deploy query-side weight aliasing to restore relevance immediately, (2) run a non-blocking reindex on a shadow index with throttling (we'll provide config for API-based reindexing), (3) once verified, swap aliases. That limits traffic impact.\\nIsabella Rossi: We'll also adjust scoring to discount tenant_tag by setting lower term-frequency weight and map team_lead to team_owner fallback for scoring.\\nJon Park: What about playbooks that depend on service_label? If we only do query-side aliases, will triggers start firing again?\\nJin Park: Yes, the aliasing will make playbook matching observe the expected fields for a short-term fix. But long-term we want enrichers (Orchestrator actions) to produce canonical fields at ingestion so downstream consumers don't need brittle aliases.\\nRhea Banerjee: Cost question — reindex and Orchestrator expansion will add consumption and action cost. What's the estimated incremental spend for a reindex and for moving the 6 pilot playbooks to production (approx 1200 actions/month)?\\nCarlos Mendes: Reindex effort is operational — no product SKU change; it's engineering time. For Orchestrator, 1200 actions/month would map to approximately $4k/month under current pricing bands; we can formalize. There's also an initial implementation fee for playbook templating (~$18k professional services estimate) unless Arcadia wants to do it with our SEs which reduces the fee.\\nRhea Banerjee: We prefer SE partnership to save budget. Two more asks: (1) can we get an evidence export showing matched vs unmatched playbook triggers pre/post change? (2) We're worried about suppression rules inadvertently hiding incidents during reindex — can you coordinate with our on-call rota?\\nIsabella Rossi: We'll prepare an SIQ-AD-HOC export for matched/unmatched events and provide a dashboard. For suppression, we'll set a temporary relaxed suppression window and create a monitoring alert that notifies the on-call Slack channel when suppressed counts spike.\\nMarta Ruiz: Timeline? If we need relevance within 48 hours, what's earliest for the query alias patch and staging reindex?\\nJin Park: Query aliasing can be deployed within 12 hours (config + smoke tests). Shadow reindex we can start within 24 hours and aim to finish within the 2-hour maintenance window on day 2. We'll provide the exact maintenance start/end times and throttle params.\\nRhea Banerjee: Ok — prioritize the alias patch. Walk me through rollback if something goes wrong during swap.\\nCarlos Mendes: Rollback is alias switchback; we keep the original index untouched until swap completes. We also keep a lock so Orchestrator actions won't write to indexes during swap. We'll run canary queries during the swap.\\nJon Park: Any objections on the Arcadia side? Marta?\\nMarta Ruiz: Need a read-only staging run first and a CPU cap for the reindex job — set to 60% of a node's capacity by default. Also we need a short change window approved by our change advisory board (CAB) — can Northstar provide formal change doc?\\nCarlos Mendes: Yes — we'll send a change doc and runbook by EOD today (2026-03-18). Action items and owners will be posted in #revops-war-room.\\nRhea Banerjee: Good. Final note: our exec team wants a plan to avoid this recurring — so please include automation, schema compatibility checks, and pre-deployment simulation in the medium-term plan.\\nCarlos Mendes: Understood. We'll deliver: (A) alias patch within 12 hours, (B) shadow reindex with 2-hour swap in 24–48 hours, (C) medium-term plan for Orchestrator-driven enrichment and schema compatibility checks. We'll follow up in Slack and with a retro memo after the swap.\\nMeeting closed.\\n\"},{\"artifact_id\":\"art_2014be7c5aa4\",\"title\":\"Retro: Arcadia Cloudworks — taxonomy v2.1 impact and remediation plan\",\"summary\":\"Post-incident memo documenting root cause, immediate remediation steps, and medium-term actions to prevent recurrence after Arcadia Cloudworks reported search relevance degradation following taxonomy v2.1 rollout.\",\"content_text\":\"Context:\\n- Customer: Arcadia Cloudworks (Large Enterprise, ~8.2k employees).\\n- Trigger: Executive mandate (Feb 2026) to reduce manual triage work by 40%.\\n- Incident: Search relevance dropped after product taxonomy v2.1 (rolled 2026-03-04). Playbook trigger miss rate ~28%, MTTI increased for classed incidents.\\n\\nRoot cause analysis:\\n- Metadata schema changes renamed critical fields (service_label -> svc_label) and introduced a high-cardinality field tenant_tag.\\n- Event Nexus index weighting and playbook match rules still referenced old field names and weight distribution.\\n- The index analyzer treated tenant_tag as high-signature field causing term-frequency skew and pushing relevant results down.\\n- No pre-deploy compatibility check was run that simulates query hit-rate against weighted indexes.\\n\\nImmediate remediation (completed / in-flight):\\n1) Query-side aliasing (svc_label -> service_label) and scoring adjustments (tenant_tag TF weight 1.0 -> 0.2). Owner: Jin Park. Status: deploy window scheduled within 12 hours from 2026-03-18 18:00 UTC.\\n2) Shadow reindex with throttling and CPU cap (60%): run reindex on shadow index, smoke, then alias swap during 2-hour maintenance window (2026-03-20 02:00-04:00 UTC). Owners: Isabella Rossi & Marta Ruiz.\\n3) Temporary suppression relax and alerting on suppressed count spikes (owner: Olivia Grant).\\n\\nMedium-term mitigation plan:\\n- Orchestrator-driven canonical enrichment: create ingestion playbooks that map incoming event fields to canonical schema (service_label, team_owner) at ingest time. Benefit: consumers see consistent fields and playbooks can rely on stable keys.\\n- Schema compatibility checks: simulate query hit-rate and scoring impact in a pre-deploy test harness when schema registry changes are proposed. Block deployment on >5% expected degradation unless approved.\\n- CI for index mapping: automated checks in product pipelines to verify index weights exist for expected key fields; generate warning tickets when weight mismatch detected.\\n- Operational runbook: detailed steps for alias deploy, reindex throttle parameters, smoke queries, rollback steps (alias revert), and communication template for CAB and execs.\\n\\nMetrics & acceptance criteria:\\n- Search relevance score >= 0.85 post-swap on sampled query set of 500 queries.\\n- Playbook trigger miss rate reduced from 28% -> <5% in 7 days.\\n- No consumer lag increase >10% on Arcadia Kafka clusters during reindex.\\n\\nOpen risks and notes:\\n- Reindex CPU pressure could still cause transient consumer lag — mitigation path: pause reindex, increase throttle, or run reindex on dedicated worker pool.\\n- Cost and timeline sensitivity from Arcadia: favor SE partnership to reduce PS fees.\\n\\nAttachments:\\n- schema_diff_v1_v2.1.json (Arcadia-provided)\\n- index_mapping_snapshot_2026-03-09.json\\n- sample_SIQ_queries_pre_change.csv\\n\\nNext steps:\\n- Post-swap retro and measurements (owner: Carlos Mendes) due 2026-03-25.\\n- Draft Orchestrator enrichment playbook templates for Arcadia (owner: Jin Park) due 2026-03-26.\\n\"},{\"artifact_id\":\"art_03d9a25a52e2\",\"title\":\"Technical Validation call with CedarWind Renewables\",\"summary\":\"Technical validation call to triage degraded search relevance. Confirmed root cause is mismatched index weighting vs updated taxonomy, walked through mapping files, proposed soft reindex and schema-aware weighting adjustments using Event Nexus' Schema Registry integration. Customer pressed on non-disruption, rollback plan, and overlap with NoiseGuard.\",\"content_text\":\"Noah Becker (Northstar): Hey Rhea, thanks for carving out time. Quick agenda: reproduce search issue, inspect mappings, propose fix paths.\\nRhea Martinez (CedarWind): Thanks Noah. We've got pressure from Sophie to show progress — manual triage is killing ops. Searches that used to return the right incident are returning 10x as many irrelevant hits.\\nNoah Becker: Understood. Olivia from Support shared the mapping export you sent. Can you confirm when the taxonomy change rolled? I have 2026-03-05 in notes.\\nRhea Martinez: Yeah March 5 — we split 'service_owner' into 'team_id' and 'service_domain' to match org model. Confluent schema bump went out then. NoiseGuard mapping handled suppression but our Event Nexus trial is now returning poor relevance.\\nJin Park (Northstar SE): When you say poor relevance, any example query or alias you can share?\\nJai Patel (CedarWind): Querying by team name 'OPS-SCADA' used to bubble up the 3 most recent incidents; now results include incidents across unrelated domains — looks like 'service_owner' weight still being applied in the index.\\nNoah Becker: Right — the mapping export shows we still have a legacy index field 'svc_owner' with weight 0.8 in the ranking vector. The new fields 'team_id' and 'service_domain' exist but have weight 0.2 combined. So relevance skews to old field values where present, and falls back to noisy text matches elsewhere.\\nRhea Martinez: So how do we fix without taking Kafka offline? We can't risk event loss.\\nJin Park: Two options: 1) Soft reindex — create a parallel index, apply corrected weights, and replay from archived Kafka partitions (non-disruptive). 2) Live remap — update weighting in-place and run a phased reweighting job with query-time feature flags. Soft reindex is safer but takes ~3-6 hours for your event volume estimate; phased reweight could be near-zero downtime but higher false positives during rollout.\\nRhea Martinez: Replay sounds fine if we can bound it. What's the size we're talking about and cost impact?\\nNoah Becker: Your trial metrics show ~120GB/day ingest. For a 7-day backfill to ensure coverage it's ~840GB roughly. In our multi-tenant pipeline a reindex job using a dedicated reingest path is estimated at 4-5 hours wall time if we throttle to avoid saturating Kafka; CPU/IO footprint will be limited to a controlled worker pool.\\nJai Patel: I have a question around NoiseGuard. We still have suppression being applied upstream. Could differing suppression and dedupe heuristics cause conflicts that explain some of the noise?\\nNoah Becker: Yes — NoiseGuard applies suppression rules and can mutate or flag alerts that then become attributes in Event Nexus. If NoiseGuard normalized 'service_owner' differently before the split, your enrichment looks inconsistent. We should align the mapping: add a mapping layer that transforms NoiseGuard's outgoing attribute to the new 'team_id' convention during ingestion.\\nRhea Martinez: Great. What's the rollback plan if relevance doesn't improve or if we see higher latency?\\nOlivia Grant (Support): Rollback plan: keep legacy index live behind a query-time feature flag. After we bring up parallel index and compare precision/recall via A/B (10% traffic routed), if metrics look good we flip. If degradation, revert traffic and decommission parallel index. We'll cap any reindexing job to 2x normal worker allocation and throttle to keep CPU <= 70% and latency SLAs met.\\nRhea Martinez: Metrics we need to see: precision at 10 (P@10), median query latency, and triage time per incident. Can you instrument those during A/B?\\nJin Park: Yes — we'll instrument P@10, MQL response p95, and provide a dashboard. Also we'll surface the exact weighting vector changes so you can audit them.\\nRhea Martinez: Any security or compliance concerns? We need to ensure audit trails for the reindex and no change to retention policies.\\nOlivia Grant: All reindex jobs will be logged by Orchestrator playbooks and Execution Audit Trail (OR-AUDIT-LOGS). No change to retention; legal-hold untouched. Northstar's SOC2 posture applies.\\nRhea Martinez: Timeline — how quickly can we run a soft reindex and A/B test?\\nNoah Becker: If we get approval today, we can schedule the reindex for 2026-03-22 02:00 UTC (low traffic window). A/B run for 48 hours, then a decision on 2026-03-24. We'll provide scripts and preflight checks by 2026-03-19 COB.\\nSophie Lau: From an ops standpoint, 48 hours A/B is acceptable. We want a short executive summary by 2026-03-25.\\nRhea Martinez: Costs — do we have ballpark additional usage or worker costs?\\nBen Gallagher (revops cc'd): For trial customers, we'll bill reindex compute as usage; estimate for 840GB backfill ~ $1,200 of reindex compute plus 48-hour enhanced support. Exact numbers in a follow-up email.\\nRhea Martinez: Alright. I'm worried about NoiseGuard's retained suppression rules continuing to misalign results after you fix weighting. Can you own an integration mapping change too?\\nNoah Becker: We'll own mapping changes on our ingestion side and provide a spec for NoiseGuard outgoing attributes. If NoiseGuard needs to change, we'll coordinate with your NoiseGuard admin — but we can transform at ingestion so NoiseGuard changes are not a blocker.\\nRhea Martinez: Okay, thanks. Let's proceed with the soft reindex plan. Please send the preflight checklist and A/B dashboard definitions.\\nNoah Becker: We'll send by COB 2026-03-19. Action items recap on the call: preflight checklist, reindex scheduled 03-22, A/B dashboard, mapping transform spec, cost estimate. Any other Qs?\\nRhea Martinez: None right now. Thanks all.\\nNoah Becker: End of call.\"},{\"artifact_id\":\"art_a504e4c5b6f8\",\"title\":\"Renewal Negotiation call with Pioneer Freight Solutions\",\"summary\":\"Renewal negotiation focused on resolving search relevance regression caused by taxonomy change. Customer (Sofia and Evan) pushed for concrete remediation timeline and concessions on pricing if issue not fully resolved before renewal; Northstar (Carlos Mendes - CSM, Jin Park - Solutions Engineer, Leah Park - VP Product) explained technical remediation plan (schema registry check, rebuild index weights, backfill enrichment, rules tuning) and proposed 6-week remediation plan with targeted SLAs and temporary support uplift.\",\"content_text\":\"Sofia Martinez (Pioneer): Hey all — thanks for joining. Quick context: execs demanded fewer manual handoffs; since Feb 18 taxonomy change we've had to add two FTEs on triage. That's not tenable.\\nCarlos Mendes (Northstar CSM): Hi Sofia, sorry to hear that — we logged the support ticket on Mar 12. Jin and Leah are here to run through next steps.\\nJin Park (Solutions Eng): Evan, can you summarize the search failures you're seeing?\\nEvan Rivers (Pioneer SRE): Sure — example: warehouse asset tag changed from \\\"wh_id\\\" to \\\"facility_id.v2\\\". When we search incident history by facility_id.v2 we get lots of older incidents matched on wh_id because Event Nexus index still weights the legacy token higher. Entity graph linking also doesn't surface new relationships. It looks like schema registry version mismatch + index weight table still using old token set.\\nLeah Park (VP Product): That tracks with what we've seen in similar migrations. Two immediate levers: 1) verify SI-SCHEMA-REG versions and compatibility, 2) re-run the enrichment backfill to populate new metadata keys and then recompute index weighting. Both are intrusive to indexing but doable.\\nSofia: How long each? We have a renewal conversation pending and I can't commit to the same contract level if this isn't fixed.\\nJin: Quick checks (schema registry) — 1-2 days. Backfill + index rebuild — estimate 3 weeks of engineering work plus validation (we propose a 2-week validation window) so total 5 weeks. We can add a 2-week rollout/monitoring buffer so 7 weeks end-to-end if you want staged rollout.\\nEvan: 7 weeks is tight but acceptable if there are guarantees. What's the rollback plan if rebuild impacts production search latency?\\nLeah: We'll use a shadow index first in our cluster (no traffic switch) and run weighted scoring comparisons. If baseline shows >10% latency increase, we hold and iterate on weight tuning. Also we can narrow rebuild to high-value indices (warehouse assets) first to reduce scope/time.\\nSofia: Ok, but there's procurement pressure — what's Northstar willing to offer on the renewal if this isn't fully resolved by contract renewal milestone (2026-07-01)?\\nCarlos: For risk mitigation we can offer a one-time credit of 10% of annual contract value if we miss the agreed remediation milestones, plus two weeks of dedicated support (daily standup) during remediation. We want the renewal, so we can be flexible on payment terms.\\nPriya Kapoor (Pioneer Ops): From our side, automation via Orchestrator is critical. If search is fixed, can playbooks auto-generate correct tickets? We don't want ops to do manual lookups.\\nJin: Yes — Orchestrator playbooks rely on entity graph lookups. Once enrichment backfill completes and entity graph is rebuilt, we can enable a validation mode for playbooks (dry-run) within 1 sprint, then enable write mode after sign-off.\\nEvan: Any blockers on our side?\\nJin: We need temporary elevated API quota to re-run enrichment and a snapshot export of the asset taxonomy from your Asset Management service (format mapping doc). Also we need runbook approvals from your security lead for re-run credentials.\\nSofia: I can get the taxonomy snapshot and quota approval. Our security lead Maya is on board but will review the change plan.\\nLeah: We'll ship a remediation plan doc by 2026-03-20 end of day with dates and acceptance criteria. Proposed milestones: schema verification (by 2026-03-22), shadow index build (2026-03-29 to 2026-04-09), backfill + rebuild (2026-04-12 to 2026-04-30), validation window (2026-05-01 to 2026-05-14). If customer wants narrower scope we can compress to 6 weeks targeting only warehouse indices.\\nSofia: That seems reasonable. One ask — we've started a NoiseGuard PoC (tactical) to reduce manual dedupe. If Northstar cannot show full recovery in 6 weeks, procurement will push us to extend NoiseGuard and potentially reduce Northstar scope.\\nCarlos: Understood. We'll include a milestone-based SLA and the 10% credit mention. Any other questions?\\nEvan: For the SLA we need objective metrics: precision@10 for search >=0.8, entity-link hit rate >=90% for facility lookups, and incident grouping false-positive rate <=5%.\\nLeah: We'll agree to those targets in the plan. We'll also schedule daily 30-min standups during the backfill window.\\nSofia: Alright — ship the plan. If we sign the renewal now with those conditions, procurement will accept contract with holdback tied to the credit.\\nCarlos: We'll prepare a redlined renewal term with milestone payments and the remediation attachment. Expect drafts by 2026-03-22. Thanks everyone.\\nSofia: Thanks. Bye.\\n(End)\"}]"}]},{"id":"gold_sample_02","question":"For Verdant Bay, what's the approved live patch window, and exactly how do we roll back if the validation checks fail?","answer":"**Approved patch window:** 2026-03-24, 02:00–04:00 local time (customer-approved maintenance window).\n\n**Rollback if validation fails:** The ruleset is deployed atomically with pre-checks. During the live patch you run validation jobs (50 synthetic approval flows + 50 customer-marked in-flight approvals). If *any* validation check fails, the system executes an **automatic rollback** using `orchestrator rollback --target ruleset=<prior_sha>`, which rehydrates the prior ruleset and re-triggers the cache invalidation hook. Post-rollback: notify Verdant Bay, open an incident for manual remediation, and revert any partial replays.","expected":"The approved live patch window is 2026-03-24 from 02:00 to 04:00 local time. If validation fails, the playbook says to run `orchestrator rollback --target ruleset=<prior_sha>`, which restores the prior ruleset and replays the invalidation hook.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":1,"precision":0.6666666666666666,"mrr":1,"perEntity":{"customers":{"found":1,"gold":1,"recall":1,"precision":1},"artifacts":{"found":3,"gold":3,"recall":1,"precision":0.75},"scenarios":{"found":0,"gold":0,"recall":0,"precision":0}}},"expectedIds":{"customers":["cus_b430f59e0caf"],"artifacts":["art_f60d368c4493","art_fff67d92fe41","art_f893faeda15a"]},"predicted":{"customers":["cus_b430f59e0caf"],"scenarios":["scn_bf54536c2c07"],"artifacts":["art_f893faeda15a","art_f60d368c4493","art_fff67d92fe41","art_4e17804e43b1"]},"toolCallCount":2,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT * FROM customers WHERE name LIKE '%Verdant Bay%'\"}","output":"[{\"customer_id\":\"cus_b430f59e0caf\",\"scenario_id\":\"scn_bf54536c2c07\",\"name\":\"City of Verdant Bay\",\"industry\":\"Public Sector\",\"subindustry\":\"city agency\",\"region\":\"Canada\",\"country\":\"Canada\",\"size_band\":\"Upper Mid-Market\",\"employee_count\":1200,\"annual_revenue_band\":\"$50M-$250M\",\"crm_stage\":\"renewal review\",\"tech_stack_summary\":\"On-prem identity (AD), Atlassian Jira for approvals, legacy BPM (ProcureFlow) recently retired; uses Kafka for municipal event bus; private network segments with strict egress rules. Single-tenant Northstar Orchestrator deployed in Canada region with on-prem worker pool for network tasks.\",\"account_health\":\"at risk\",\"primary_contact_name\":\"Renee Dupont\",\"primary_contact_email\":\"renee.dupont@verdantbay.ca\",\"contacts_json\":\"[{\\\"buying_influence\\\": \\\"Primary decision-maker for renewal; budget owner for automation tooling\\\", \\\"concerns\\\": [\\\"Frequent approval failures increase manual work in Procurement (estimated 3 FTEs triage)\\\", \\\"Potential public procurement audit if approvals are inconsistent\\\", \\\"Vendor responsiveness and risk of recurring misconfigurations after migration\\\"], \\\"department\\\": \\\"IT\\\", \\\"email\\\": \\\"renee.dupont@verdantbay.ca\\\", \\\"full_name\\\": \\\"Renee Dupont\\\", \\\"persona\\\": \\\"Platform / Ops Decision Maker\\\", \\\"priorities\\\": [\\\"Stabilize approval workflows for city-specific policies\\\", \\\"Avoid public-facing service interruptions during municipal fiscal quarter\\\", \\\"Achieve documented rollback and audit trails to satisfy compliance\\\"], \\\"seniority\\\": \\\"Director\\\", \\\"title\\\": \\\"Director, IT Operations\\\"}, {\\\"buying_influence\\\": \\\"Technical sign-off on remediation plan\\\", \\\"concerns\\\": [\\\"Root cause: country-level policy overrides conflicting with global default\\\", \\\"Lack of deterministic evaluation trace in current rules logs\\\"], \\\"department\\\": \\\"SRE\\\", \\\"email\\\": \\\"jamal.ahmed@verdantbay.ca\\\", \\\"full_name\\\": \\\"Jamal Ahmed\\\", \\\"persona\\\": \\\"Technical Evaluator\\\", \\\"priorities\\\": [\\\"Short-term hotfix to avoid failed playbook executions\\\", \\\"Visibility into rule evaluation paths\\\", \\\"Access to per-tenant schema and rule logs\\\"], \\\"seniority\\\": \\\"Manager\\\", \\\"title\\\": \\\"SRE Team Lead\\\"}, {\\\"buying_influence\\\": \\\"Influences renewal through business impact statements\\\", \\\"concerns\\\": [\\\"Auditability of approvals and rollback history\\\", \\\"Costs from manual intervention\\\"], \\\"department\\\": \\\"Procurement\\\", \\\"email\\\": \\\"elena.garcia@verdantbay.ca\\\", \\\"full_name\\\": \\\"Elena Garcia\\\", \\\"persona\\\": \\\"Process Owner\\\", \\\"priorities\\\": [\\\"Ensure approval SLA <= 24 hours for high-priority procurements\\\", \\\"Reduce manual ticket backlog created by failed approvals\\\"], \\\"seniority\\\": \\\"Manager\\\", \\\"title\\\": \\\"Procurement Manager\\\"}]\",\"notes\":\"Migration from ProcureFlow completed 2026-02-10. Since migration, ~22% of approval-triggered playbooks have failed validation due to policy override mismatches between municipal (country/province) policy sets and new global defaults. Renewing contract in April 2026; customer requested price relief and technical remediation plan.\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT rowid, * FROM artifacts_fts WHERE artifacts_fts MATCH 'Verdant Bay' LIMIT 20\"}","output":"[{\"rowid\":47,\"artifact_id\":\"art_f893faeda15a\",\"title\":\"Renewal Negotiation call with City of Verdant Bay\",\"summary\":\"Renewal negotiation call between Verdant Bay leadership and Northstar account team focused on remediation timeline for approval workflow failures, ask for one-quarter contract credit, and agreement on short-term workaround plus scope and timeline for permanent fix.\",\"content_text\":\"Renee Dupont (Verdant Bay): Okay, thanks everyone for joining. We have recurring failed approvals in procurement. This is disrupting 27 active procurements this week alone. We need concrete dates — when is this fixed?\\\\nCarlos Mendes (Customer Success, Northstar): Renee — thanks, and I'm sorry for the disruption. We've identified the rule-order bug and SE replicated it in staging. Jin Park will walk through the fix outline.\\\\nJin Park (Solutions Engineer, Northstar): Hi Renee — technical root cause is policy evaluation order. During migration the global_default rule got a higher priority number. We'll change evaluation so city_override > province_override > global_default and add a policy-version tag to replay decisions. In staging dry-run we saw failures drop from 18% to 1.6%.\\\\nJamal Ahmed (SRE, Verdant Bay): Can you explain the cache behavior? We saw windows where on-prem workers had cached old policies for up to 9 minutes and then resumed with global. That's what causes intermittent skips.\\\\nJin Park: Right. Worker cache currently refreshes on a schedule; we propose: (1) hotfix to add immediate invalidation on policy push, (2) change evaluation order, (3) add telemetry labels for each evaluation path. Hotfix in staging within 48 hours; live patch scheduled next Wednesday 2026-03-24 during the 02:00-04:00 local window.\\\\nRenee: That's fast, but procurement can't accept risk of breaking approvals. What's rollback?\\\\nJin Park: We will deploy as an atomic ruleset change with pre-checks; if any validation check fails, the system will roll back to the prior ruleset automatically. We'll also snapshot OR-AUDIT-LOGS for immediate evidence.\\\\nElena Garcia (Procurement, Verdant Bay): How will this affect current pending approvals? We have 14 approvals already in flight.\\\\nCarlos Mendes: We propose to re-run affected playbooks after the patch using the 'policy-version replay' — which will attempt the approvals in a safe dry-run mode and queue manual human approval for any that still mismatch. That will be a separate job; we estimate 2 engineers from Northstar plus 2 Verdant Bay staff for one business day to clear the backlog.\\\\nRenee: OK. Now about the renewal: our finance team is pushing to re-bid. Given the disruption, we want a 25% credit for next quarter or we won't renew.\\\\nLiam O'Connor (Sales Director, Northstar): Renee, we value Verdant Bay and want to keep you. We can offer a one-time 15% credit for Q2 contingent on signing a 12-month renewal today and we will include two professional services days (no charge) for remediation support.\\\\nRenee: 15% is not adequate — the manual FTE hours are costing us more.\\\\nLiam: Understood. We can do 20% credit if you commit to a 12-month renewal and agree to the remediation schedule we just outlined (hotfix 03/24, replay job 03/25). Alternatively, we can agree to a 6-month bridge renewal with 20% credit and a service-level addendum guaranteeing response times for P1 incidents.\\\\nJamal: Technically, what's the guarantee that the replay won't create duplicated approvals? We must avoid double-authorizing procurements.\\\\nJin Park: The replay job respects idempotency tokens from Jira—if an approval is already recorded, the replay will mark the event as 'already-approved' and skip. We'll run a dry-run first and provide a reconciliation report to Procurement before any automated commits.\\\\nRenee: I need this in writing and a decision by Friday 2026-03-19 COB. Also escalation path if something goes wrong after patch.\\\\nCarlos: We'll send a remediation plan and SLA addendum by EOD today, and include escalation contacts: Olivia Grant (Support Lead) for 24/7 P1, Jin Park for SE on-call during the patch, and Marco Silva (CTO) available for executive escalation if needed.\\\\nRenee: One last thing — compliance wants a signed evidence package for auditors showing the incident and remediation steps. Can you provide that?\\\\nLiam: Yes, we'll include a Compliance Evidence Export (SIQ-EVIDENCE-EXPORT) package after the live patch that includes audit logs and playbook executions.\\\\nRenee: Alright. If you can get to 20% credit and the technical guarantees, I will recommend renewal. Meeting adjourned.\\\\nCarlos: Thanks everyone; we'll follow up with written proposal and schedule.\"},{\"rowid\":48,\"artifact_id\":\"art_f60d368c4493\",\"title\":\"Slack thread: Verdant Bay renewal + hotfix plan (Orchestrator rules evaluation order)\",\"summary\":\"Agree to proposed remediation schedule (staging hotfix within 48h, live patch 2026-03-24 02:00-04:00), offer 20% one-time credit conditional on 12-month renewal or 6-month bridge with SLA addendum; action items assigned.\",\"content_text\":\"liam.oconnor: Renee asking for 25% credit. We can land 20% if they sign.\\\\ncarlos.mendes: Jin can get staging hotfix ready in 48h. Need Ops on-call during live patch.\\\\njin.park: Hotfix changes: (1) eval order fix, (2) immediate cache invalidation on policy push, (3) telemetry tag policy-version. Staging dry-run positive.\\\\nolivia.grant: I'll own P1 support during patch window. On-call number: +1-555-0112 (internal).\\\\ndaniel.kim: Need to confirm worker affinity won't cause stuck executions during rollout. Recommend drain workers in rotation.\\\\nnoah.becker: Add PS days for replay job (2 SE days).\\\\nben.gallagher: Note for billing: apply one-time 20% credit to Q2 invoice if renewal signed before 2026-03-31; otherwise 6-month bridge PO option.\\\\nliam.oconnor: DECISION: Offer 20% credit contingent on either (A) 12-mo renewal signed by 2026-03-19 COB OR (B) 6-mo bridge + SLA addendum. ACTION: Carlos to send written offer EOD 2026-03-18.\\\\nAction items: - Carlos: remediation plan + offer EOD (Done: pending send) - Jin: staging hotfix by 2026-03-20 - Olivia: P1 support roster + escalation contacts - Ben: prepare billing credit flow - Daniel: plan worker drain sequence for 03/24 patch\"},{\"rowid\":49,\"artifact_id\":\"art_fff67d92fe41\",\"title\":\"Orchestrator: Emergency Playbook — Policy Evaluation Order & Cache Invalidation (Verdant Bay)\",\"summary\":\"Step-by-step playbook to remediate approval workflow failures caused by incorrect policy evaluation order after legacy migration. Includes pre-checks, staging validation, live patch steps, rollback process, replay job, and evidence export instructions.\",\"content_text\":\"Purpose\\\\n- Restore deterministic approval evaluation for Verdant Bay by ensuring evaluation order: city_override > province_override > global_default and eliminating stale cache windows that cause skipped approver nodes.\\\\nPrerequisites\\\\n- Granted maintenance window: 2026-03-24 02:00-04:00 local (customer approved)\\\\n- Access: Orchestrator admin + SE with deploy privileges, Verdant Bay Jira service account for replay dry-run, on-prem worker pool access for drain.\\\\nComponents Touched\\\\- OR-RULES-ENGINE (ruleset priority)\\\\n- OR-WORKER-POOL (cache/invalidation)\\\\n- OR-AUDIT-LOGS (snapshot)\\\\n- SI-ETL-FILTER (payload normalization)\\\\nStaging Steps (target: complete within 48h)\\\\1) Branch ruleset: create branch 'verdantbay/eval-order-fix-v1'\\\\2) Modify rules evaluation function to enforce order city_override > province_override > global_default; add policy-version metadata to rule object\\\\3) Implement immediate cache invalidation trigger on policy push (worker-level hook)\\\\4) Run full-suite unit tests and execute replay dry-run against staging dataset from 2026-03-01..2026-03-12; measure failure rate and idempotency behavior\\\\5) Prepare reconciliation report template (fields: playbook_id, approval_token, prior_state, new_state, action_taken)\\\\nLive Patch Steps (2026-03-24 02:00-04:00)\\\\A) Pre-patch snapshot: export OR-AUDIT-LOGS for last 30 days and save to evidence bucket (read-only)\\\\B) Drain worker pool in 10% increments; confirm no running approval executions in drained nodes before patching\\\\C) Deploy ruleset branch atomically; trigger cache invalidation hook; verify telemetry for policy-version tags within 2 minutes\\\\D) Run validation jobs: 50 synthetic approval flows + sample of 50 in-flight approvals marked by customer\\\\E) If validation passes, release; if any validation fails, execute automatic rollback to pre-patch ruleset (playbook included below)\\\\Rollback Procedure\\\\- Use 'orchestrator rollback --target ruleset=<prior_sha>' command which rehydrates prior rules and replays invalidation hook. Post-Rollback Steps: notify Verdant Bay, open incident for manual remediation, revert any partial replays.\\\\Replay Job (2026-03-25)\\\\- Mode: dry-run first; idempotency enforced via Jira approval tokens; report generated to procurement for manual review prior to commit. Required resources: 2 SE days (Northstar) + 2 Verdant Bay ops for reconciliation.\\\\Evidence Export\\\\- Use SIQ-EVIDENCE-EXPORT to bundle: audit logs (OR-AUDIT-LOGS), ruleset diffs, replay reconciliation report, patch runbook, and support incident thread. Deliver signed bundle within 48 hours of successful patch.\\\\Contacts\\\\- SE on-call: jin.park@northstarsignal.example\\\\- Support lead: olivia.grant@northstarsignal.example\\\\- CSM: carlos.mendes@northstarsignal.example\\\\- Sales: liam.oconnor@northstarsignal.example\\\\Testing & Acceptance Criteria\\\\- Approval playbook failure rate <2% over 7-day window after patch\\\\- No duplicate approvals from replay; reconciliation report shows zero unintended commits in dry-run\\\\- Procurement confirms backlog cleared to <=10 items within 48 hours\\\\Notes & Risks\\\\- If worker caches are managed by customer network rules that prevent invalidation RPC, require coordination with Verdant Bay networking to allow certificate-based invalidation call.\\\\- Any change to SI-ETL-FILTER mapping for Jira payloads must be tested separately to avoid downstream schema drift.\\\\Appendix: CLI Commands & Validation Scripts (omitted here)\\\\n\"},{\"rowid\":50,\"artifact_id\":\"art_4e17804e43b1\",\"title\":\"Competitor report: SignalFlow\",\"summary\":\"SignalFlow (primary competitor) is strong at high-throughput streaming and offers stream-native integration attractive to municipal infrastructures using Kafka. For Verdant Bay's issue (rules evaluation and approval orchestration), SignalFlow's strength is less relevant because the failure mode is in orchestration/approval ordering and on-prem worker cache behavior — areas where Northstar's Orchestrator has pre-built role-based approval flows, audit trails, and replay capabilities. SignalFlow claims enterprise-grade throughput; their complexities and smaller integration ecosystem present an opportunity for Northstar to lean on easier remediation and compliance evidence exports.\",\"content_text\":\"Context\\\\n- Customer: City of Verdant Bay experiencing approval workflow failures post-migration; problem localized to evaluation order and cache invalidation in orchestration layer.\\\\nSignalFlow positioning\\\\n- Strengths: High throughput, stream-native integrations (Kafka), low-latency correlation.\\\\n- Weaknesses: Complex configuration, smaller ecosystem of remediation integrations (fewer chatops/playbook connectors), less emphasis on role-based approval flows or built-in audit evidence exports.\\\\nPricing Claims Seen\\\\n- \\\"Enterprise throughput pricing\\\" — typically positions licensing on ingestion/stream units (SignalFlow may be higher cost at scale).\\\\n- Claims of better streaming performance for heavy Kafka topologies; may argue lower processing latency.\\\\nDifferentiators (Northstar vs SignalFlow)\\\\n- Orchestrator offers OR-ROLE-BASED approval flows, OR-AUDIT-LOGS, and OR-PLAYBOOKS with replay and idempotency support — features critical to Procurement and Compliance use cases.\\\\- Northstar provides SIQ-EVIDENCE-EXPORT to assemble signed export bundles for audits; SignalFlow lacks turnkey evidence export for orchestration runs.\\\\- Northstar has on-prem worker pool with built-in affinity and safe rollback patterns (OR-SAFE-ROLLBACK) oriented to regulated customers.\\\\nRisks & Tactical Notes\\\\n- SignalFlow could counter by offering lower-latency streaming and claim their stream-native rules reduce evaluation order headaches. Prepare to counter with demonstration: (1) audit export for compliance, (2) replay idempotency, (3) safe rollback pattern — these are differentiators SignalFlow cannot easily match without additional engineering.\\\\nRecommended Sales Moves\\\\n- Emphasize operational guarantees: rollback, audit bundle, and replay idempotency.\\\\- Offer 20% one-time credit + PS days to close renewal and highlight faster remediation path compared to rip-and-replace with a streaming-centric vendor.\\\\n\"}]"}]}];

function verdictOf(r) {
  if (!r.answerScore) return { label: "-", cls: "" };
  if (r.answerScore.correct === null) return { label: "judge", cls: "judge" };
  return r.answerScore.correct ? { label: "pass", cls: "pass" } : { label: "FAIL", cls: "fail" };
}
const pct = (n) => n == null ? "-" : Math.round(n * 100) + "%";

const rows = DATA.map((r) => {
  const v = verdictOf(r);
  return {
    id: r.id, match: r.answerScore?.match_type ?? "-", verdict: v.label, verdictCls: v.cls,
    recall: r.retrievalScore?.scored ? r.retrievalScore.recall : null,
    precision: r.retrievalScore?.scored ? r.retrievalScore.precision : null,
    mrr: r.retrievalScore?.scored ? r.retrievalScore.mrr : null,
    toolCallCount: r.toolCallCount, raw: r,
  };
});

const graded = rows.filter((r) => r.verdict !== "-" && r.verdict !== "judge");
const passed = graded.filter((r) => r.verdict === "pass").length;
const passRate = graded.length ? Math.round((passed / graded.length) * 100) : null;
const scored = rows.filter((r) => r.recall != null);
const mean = (xs) => xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
const avgCalls = mean(rows.map((r) => r.toolCallCount));
const maxCalls = Math.max(...rows.map((r) => r.toolCallCount));

document.getElementById("summary").innerHTML =
  `<span id="passrate" class="${passRate != null && passRate >= 50 ? "pass" : "fail"}">${passRate == null ? "-" : passRate + "%"} pass</span>` +
  `<span class="detail">answer: ${passed}/${graded.length} deterministic pass (${rows.length - graded.length} judge/deferred)<br>` +
  (scored.length ? `retrieval: recall ${pct(mean(scored.map((r) => r.recall)))} · precision ${pct(mean(scored.map((r) => r.precision)))} · mrr ${(mean(scored.map((r) => r.mrr)) ?? 0).toFixed(2)} (${scored.length} scored)<br>` : "") +
  `tool calls: avg ${avgCalls.toFixed(1)} · max ${maxCalls}</span>`;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// Renders grouped ids, comparing against the other side per entity_type (matching scoreRetrieval).
// mode "expected": gold ids, green if retrieved (hit) else red (miss).
// mode "retrieved": predicted ids, green if relevant (hit) else amber (false positive).
function idsHtml(groups, other, mode) {
  const entities = Object.keys(groups || {});
  if (!entities.length) return '<span class="muted">none</span>';
  return entities.map((e) => {
    const otherSet = new Set((other && other[e]) || []);
    const ids = (groups[e] || []).map((id) => {
      const hit = otherSet.has(id);
      const cls = hit ? "hit" : mode === "expected" ? "miss" : "fp";
      return `<span class="${cls}">${escapeHtml(id)}</span>`;
    }).join(", ");
    return `<div><span class="ent">${escapeHtml(e)}:</span> ${ids}</div>`;
  }).join("");
}

// tools column: a clamped one-line-per-call preview (collapsed) plus the full trace with id
// breakdown (revealed in place when the row expands) — same column, two views.
function toolsPreviewHtml(r) {
  if (!r.toolCalls.length) return '<span class="muted">none</span>';
  return escapeHtml(r.toolCalls.map((t) => `${t.name}: ${t.input}`).join("\n"));
}
function toolsFullHtml(r) {
  const tools = r.toolCalls.length
    ? r.toolCalls.map((t) =>
        `<div class="tool"><b>${escapeHtml(t.name)}</b> <code>${escapeHtml(t.input)}</code><pre class="muted">${escapeHtml(t.output.slice(0, 400))}</pre></div>`
      ).join("")
    : '<span class="muted">none</span>';
  return `
    <div class="ids"><b>expected ids:</b> ${idsHtml(r.expectedIds, r.predicted, "expected")}</div>
    <div class="ids"><b>retrieved ids:</b> ${idsHtml(r.predicted, r.expectedIds, "retrieved")}</div>
    ${tools}`;
}

let sortKey = "id", sortDir = 1;
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const v = document.getElementById("verdict").value;
  const sorted = [...rows].sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (av == null) return 1;
    if (bv == null) return -1;
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  const tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = "";
  for (const r of sorted) {
    if (v && r.verdict !== v) continue;
    if (q && !r.id.toLowerCase().includes(q) && !r.raw.question.toLowerCase().includes(q)) continue;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.id}</td>
      <td class="${r.verdictCls}">${r.verdict}</td>
      <td>${r.match}</td>
      <td class="q"><div class="clamp">${escapeHtml(r.raw.question)}</div></td>
      <td class="trunc"><div class="clamp">${escapeHtml(r.raw.answer)}</div></td>
      <td class="trunc exp-col">${r.raw.expected == null ? '<span class="muted">-</span>' : `<div class="clamp">${escapeHtml(r.raw.expected)}</div>`}</td>
      <td>${pct(r.recall)}</td>
      <td>${pct(r.precision)}</td>
      <td>${r.mrr == null ? "-" : r.mrr.toFixed(2)}</td>
      <td class="tools">
        <div class="clamp tools-preview">${toolsPreviewHtml(r.raw)}</div>
        <div class="tools-full">${toolsFullHtml(r.raw)}</div>
      </td>
      <td class="toggle"><span class="toggle-btn">▸</span></td>`;
    tr.querySelector(".toggle-btn").addEventListener("click", () => {
      tr.classList.toggle("expanded");
      tr.querySelector(".toggle-btn").textContent = tr.classList.contains("expanded") ? "▾" : "▸";
    });
    tbody.appendChild(tr);
  }
}
document.querySelectorAll("th[data-k]").forEach((th) => {
  th.addEventListener("click", () => {
    const k = th.dataset.k;
    sortDir = sortKey === k ? -sortDir : 1;
    sortKey = k;
    render();
  });
});
document.getElementById("search").addEventListener("input", render);
document.getElementById("verdict").addEventListener("change", render);
render();
</script>
</body>
