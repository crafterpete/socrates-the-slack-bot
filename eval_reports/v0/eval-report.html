 \\\"Increase automated routing adoption from 28% to >75% in 90 days\\\", \\\"Preserve single-tenant private cloud controls and data residency\\\"], \\\"seniority\\\": \\\"Director\\\", \\\"title\\\": \\\"Head of Travel Operations\\\"}, \\\"resolution_summary\\\": \\\"Pending: Coordinate rule transparency improvements, add override metadata to ServiceNow payload, and schedule training + confidence threshold recalibration. Action items assigned in internal Slack thread.\\\", \\\"root_cause\\\": \\\"Frontline teams are overriding automated exception routing because confidence thresholds are opaque and perceived false positives have increased after ruleset changes; ServiceNow mapping inconsistent for override metadata leading to incomplete evidence exports.\\\", \\\"severity\\\": \\\"low\\\", \\\"status\\\": \\\"open\\\"}\"}]"}],"suite":"semantic_stress"},{"id":"gold_semantic_05","question":"Which customers had new hires or contractors wait an unusually long time to get system access after a company reorganization or acquisition?","answer":"Mainly **Catalyst Careers Pty Ltd**, where new hires and role changes were taking 24 hours to 3 days to get system access after their Feb 2026 reorg (SCIM role-mapping gaps and manual approval delays). **LedgerBright Analytics** had a related post-acquisition issue, but that was about duplicate incident paging, not access provisioning delays.","expected":"Northpoint Apparel, Aureum Payments, Harbourline Regional Transit Authority, Harborline Hospitality Group, Catalyst Careers, and Hearthline Marketplace. Each reported role or permission provisioning delays tied to an organizational event: Northpoint saw an 18-hour median delay, Aureum a 30-120 minute lag after an org change, Harbourline had late and missing provisioning events, Harborline's lag followed a February 2026 restructuring, Catalyst Careers saw lag plus duplicative accounts, and Hearthline had lag with intermittent failures. Different specific numbers and symptoms, same underlying provisioning-lag-after-reorg pattern.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0,"precision":0,"mrr":0,"perEntity":{"customers":{"found":0,"gold":6,"recall":0,"precision":0},"artifacts":{"found":0,"gold":6,"recall":0,"precision":0}}},"expectedIds":{"customers":["cus_4ccee8936f0c","cus_413dd8966d80","cus_4637d32c1def","cus_1df01c3ac48e","cus_4a3287c05574","cus_fdcb13df93e1"],"artifacts":["art_fceed52dcb35","art_50bd0ea1c439","art_a0ed9f935d3e","art_948a65eb617b","art_d11447325b44","art_9d3bef4ff8f4"]},"predicted":{"artifacts":["art_ba1f8dc34f90","art_360fbceaca6a","art_a6f6e1be35af","art_9f973773f4fb","art_e6d67dfd5f1a"]},"toolCallCount":3,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM sqlite_master WHERE type='table';\"}","output":"[{\"name\":\"company_profile\"},{\"name\":\"products\"},{\"name\":\"competitors\"},{\"name\":\"employees\"},{\"name\":\"scenarios\"},{\"name\":\"customers\"},{\"name\":\"implementations\"},{\"name\":\"artifacts\"},{\"name\":\"artifacts_fts_data\"},{\"name\":\"artifacts_fts_idx\"},{\"name\":\"artifacts_fts_content\"},{\"name\":\"artifacts_fts_docsize\"},{\"name\":\"artifacts_fts_config\"},{\"name\":\"artifacts_fts\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT * FROM artifacts_fts WHERE artifacts_fts MATCH 'access AND (reorganization OR acquisition OR reorg OR merger)' LIMIT 20;\"}","output":"[{\"artifact_id\":\"art_ba1f8dc34f90\",\"title\":\"Discovery call with Catalyst Careers Pty Ltd\",\"summary\":\"Discovery call with Head of People Systems and IT Ops to triage role provisioning lag. Identified SCIM mapping gaps, manual approval handoffs in Learning Ops, and need for evidence export for board. Agreed next steps: mapping audit, Event Nexus pilot for approval instrumentation, and timeline for private-cloud deployment kickoff.\",\"content_text\":\"Eleanor Reed (Head of People Systems): Hi Jin, thanks for taking the time. We’re under pressure from the board — they want hard metrics for time-to-provision. Since the reorg in Feb, new hires and role changes are taking anywhere from 24 hours to three days. That’s not acceptable.\\nJin Park (Solutions Engineer): Thanks Eleanor — can you walk me through the flow? HRIS -> SCIM -> IdP -> apps? Any intermediate approvals?\\nEleanor: Yes. WorkforceOne sends SCIM payloads to Azure AD. For some roles, Learning Ops require manager approval before course access is granted — that approval is a manual ticket in ServiceNow. Sometimes managers don’t see the ticket for 48 hours.\\nTariq Malik (Director of IT Ops): To add, we found duplicated owner mappings: the same role name exists in two naming spaces: \\\"course_access:trainer\\\" and \\\"role_course_trainer\\\". WorkforceOne team created new role aliases during the restructure and no one updated the SCIM map. So the SCIM receiver returns a 'role_map_missing' and the downstream connector flags it as pending manual mapping.\\nJin: That explains events with 'scim:role_map_missing'. We can use Signal Ingest's Schema Registry (SI-SCHEMA-REG) to capture those variants and create a canonical mapping. How are you currently storing events — do you have Kafka? \\nTariq: Yes, we use an internal Kafka bus for event telemetry. We also run ObservaGrid for tracing and performance — but its identity traces don't show the SCIM payload details we need. That’s why we're looking at Signal Insights for the SLA visibility.\\nEleanor: Two asks from the board: 1) show median time-to-provision for the last quarter, and 2) show the top 10 failure modes with owner. Can Signal Insights do that without blowing up our private cloud costs? \\nJin: Yes, SIQ-SLA-REPORT in Signal Insights can compute median time-to-provision and attribute by failure tags. We’ll pull events via the private-cloud Signal Ingest connectors (SI-KAFKA-SINK) and normalize with SI-ETL-FILTER. For costs — ingestion is GB/day; we estimate the identity stream will be small (50–200MB/day) so impact should be modest. We’ll provide a usage estimate in the follow-up.\\nEleanor: Good. Also, can Event Nexus help reduce the manual approvals? \\nJin: Event Nexus (Event Nexus) can instrument approval chains using Suppression & Escalation Policies (EN-SUPPRESSION-POLICY) and tie into ServiceNow via Integration Hub (EN-INTEGRATION-HUB). We can detect 'approval:pending_manual' and trigger a ChatOps escalation to the manager after X hours, or auto-assign to an alternate approver after SLA breach. But we need to be cautious about automation — payroll access is sensitive.\\nEleanor: That’s a concern — payroll or finance roles must go through Corporate HR only. We cannot auto-assign those. How do we exclude them? \\nJin: We’ll set role attribute filters in the rules engine so only non-finance role types are eligible for auto-escalation. For finance/payroll roles we'll build dashboards and an evidence export flow so Corporate HR can show the board they’re handling them manually.\\nTariq: What’s the timeline? We need something for the board meeting on 2026-04-22. \\nJin: We propose: Week 1 (starting 2026-03-25) — SCIM mapping audit & schema registry baseline; Week 2–3 — deploy Signal Insights dashboards and SLA reports; Week 4 — pilot Event Nexus rules for non-finance roles and ServiceNow integration; Week 6 — first evidence export and review. That gets a board-ready package before 2026-04-22 if we stay on schedule.\\nEleanor: Ok. Objection: I’m worried about the custom WorkforceOne mapping work — do you have examples from other customers? \\nJin: We do. We’ve done two similar WorkforceOne integrations in private cloud customers — one required a small transformation layer in SI-ETL-FILTER (about 120 lines of mapping rules) and a minor patch to the SCIM connector. We’ll include a reusable mapping template.\\nEleanor: Great. Any security requirements? Maya (Security Lead) will want mTLS and certificate rotation. \\nJin: Private cloud uses SI-MTLS and supports per-collector cert rotation. We'll coordinate with your Security team and Hector if needed.\\nTariq: Also, note ObservaGrid is trying to upsell tracing to help with this. Their tracing is deep, but they don't capture identity schemas. We’ll want a note on tradeoffs.\\nJin: Understood — we’ll prepare a comparison. Next steps: mapping audit kickoff 2026-03-25, Jin to send statement of work and usage estimate by 2026-03-20 EOD. Action owner: Jin. Action owner (Customer): Eleanor/Tariq to grant read access to Kafka topic and SCIM sample payloads by 2026-03-24.\\nEleanor: I’ll get that access and loop in Maya. Thanks everyone.\\nJin: Thanks — we'll follow up with the SOW and project plan.\"},{\"artifact_id\":\"art_360fbceaca6a\",\"title\":\"Decision Memo: Catalyst Careers — Remediation for Role Provisioning Lag\",\"summary\":\"Recommendation to deploy Signal Insights (private cloud) for SLA reporting and Schema Registry, and pilot Event Nexus for approval-chain instrumentation and automated escalations (excluding finance/payroll roles). Timeline structured to meet customer board date 2026-04-22.\",\"content_text\":\"Background:\\n- Catalyst Careers (Enterprise, ~1800 FTE) experienced role provisioning lag after Feb 2026 reorg. Root signals: 'scim:role_map_missing' and 'approval:pending_manual'. Board requested operating metrics.\\n\\nFindings from discovery (2026-03-18):\\n- Multiple role namespaces introduced during restructure; SCIM map not updated.\\n- WorkforceOne sends variable role attributes; Azure AD rejects unrecognized role codes -> manual mapping tickets in ServiceNow.\\n- ObservaGrid traces exist but lack payload-level SCIM schema visibility, limiting attribution for identity failures.\\n\\nProposal:\\n1) SCIM Mapping Audit (kickoff 2026-03-25)\\n   - Deliverable: canonical role mapping table, SI-SCHEMA-REG entries, and SI-ETL-FILTER transformation script (estimated 120 lines of rules).\\n   - Resources: Jin (SE, owner), Amara (onboarding), Olivia (support). Estimated effort: 4 engineer-days.\\n2) Signal Insights Dashboards (Week 2–3)\\n   - Two dashboards: 'Median Time-to-Provision' and 'Top Failure Modes by Owner'. Use SIQ-SLA-REPORT and SIQ-AD-HOC for exports.\\n   - Data source: private-cloud Signal Ingest using SI-KAFKA-SINK.\\n3) Event Nexus Pilot (Week 4)\\n   - Implement EN-SUPPRESSION-POLICY rules for 'approval:pending_manual' events; integrate with ServiceNow via EN-INTEGRATION-HUB and ChatOps for manager escalation.\\n   - Exclude finance/payroll roles via rule filters. Define auto-escalation threshold at 8 hours, alternate-approver assignment at 24 hours for eligible roles.\\n4) Compliance Evidence Export (Week 6)\\n   - Use SIQ-EVIDENCE-EXPORT to bundle incidents, audit logs (OR-AUDIT-LOGS), and runbook executions for board package.\\n\\nTimeline (high-level):\\n- 2026-03-20: SOW & usage estimate delivered (Jin)\\n- 2026-03-24: Customer provides Kafka read access and SCIM samples (Customer)\\n- 2026-03-25: Kickoff mapping audit\\n- 2026-04-05: SLA dashboards ready for review\\n- 2026-04-15: Event Nexus pilot completed; evidence export test\\n- 2026-04-20: Final board package assembled\\n\\nCosts & Licensing:\\n- Contract estimate: AUD 540,000 over 12 months (includes private-cloud licensing for Signal Insights and Event Nexus pilot, professional services). Negotiable; baseline in contract_value field set to 360,000 USD equivalent for internal tracking.\\n\\nRisks & Mitigations:\\n- WorkforceOne custom fields may require iterative mapping; mitigate with sample payload triage and a staging environment to test SI-ETL-FILTER rules.\\n- ServiceNow workflow changes may require change control; keep all automation off for finance/payroll roles; present manual mitigation plan for those.\\n- Private cloud maintenance windows could delay rollout; schedule weekend appliance updates and pre-load mapping rules where possible.\\n\\nDecision:\\n- Proceed with the proposed plan. Approve SOW delivery and mapping audit kickoff on 2026-03-25.\\n\\nAction owners:\\n- Jin Park: SOW, mapping rules, pilot orchestration\\n- Amara Okoro / Olivia Grant: private-cloud ops, cert rotation coordination\\n- Eleanor Reed / Tariq Malik: data access and internal approvals\\n\\nAppendix: Technical notes\\n- Use SI-ETL-FILTER to normalize role aliases: map 'course_access:trainer' and 'role_course_trainer' -> canonical 'trainer'.\\n- SI-SCHEMA-REG to add 'identity.role_aliases' schema version v1.2 and enable compatibility check.\\n- Event Nexus rule example (pseudo):\\n  when event.type == 'approval:pending_manual' and event.identity.role_type != 'finance' and time_since(event.created) > 8h then post to ServiceNow escalation queue / send ChatOps ping\\n- Evidence export config: include OR-AUDIT-LOGS, SIQ-SLA-REPORT CSV snapshot, and top-10 failure-mode incident bundle.\\n\\nPrepared by: Jin Park (Solutions Engineer)\\nContact: jin.park@northstarsignal.example\\n\"},{\"artifact_id\":\"art_a6f6e1be35af\",\"title\":\"Quarterly Business Review call with LedgerBright Analytics\",\"summary\":\"Discovery-focused QBR where LedgerBright's SREs described deduplication drift tied to idempotency header mismatch after acquisition. Northstar SEs walked through Event Nexus features (Temporal Correlator, Schema Registry, Integration Hub) and proposed a 90-day PoV including Kafka connectors and header-normalization transforms. Client raised integration effort concerns and asked about evidence export for compliance.\",\"content_text\":\"Renee Kline (LedgerBright): ok everyone, thanks for joining. Quick context — since the consolidation in Nov our reconciler pipeline has started generating duplicate incidents. Pages at 2:43am last Tuesday were basically the same root cause but three different systems paged. It's killing our on-call rotation.\\nJin Park (Northstar SE): thanks Renee — sorry to hear that. Can you describe what 'duplicate' means in your pipeline? Same error id, same trace id, or different keys?\\nMarcus Vega (LedgerBright): different keys — we traced it back to a stitched 'message-hub' service that sits between the old monolith and new microservices. That hub rewrites headers. Old services send an 'idempotency_key' header; the hub maps it to 'x-msg-id' and sometimes truncates the uid after a pipeline retry.\\nJin Park: that explains why dedupe windows fail — Event Nexus's EN-DEDUPE by default keys off header fields configured in the Correlator. If keys are inconsistent across sources, groupings split. We can normalize during ingest with SI-ETL-FILTER to map 'x-msg-id' back to 'idempotency_key'. Also SI-SCHEMA-REG plus Kafka connectors can enforce canonical schema.\\nRenee: what's the effort to stand up SI-ETL-FILTER transforms and Kafka Sink? We're on managed EKS with an internal Confluent cluster — we don't want a long migration.\\nDaniel Kim (LedgerBright, joined): we run Confluent 7.2, TLS enabled. We need mTLS for any collector talking to prod topics. Also cannot change downstream topic formats without a maintenance window.\\nJin Park: we support Kafka Sink & Source (beta) and can run the connector in consumer mode without changing topics. For mTLS we use SI-MTLS; certificate rotation can be automated. Typical connector install and transform deployment in PoV takes 2-4 weeks, depending on access to dev Kafka and schema samples.\\nPriya Shah (LedgerBright): another question — will dedupe changes affect our runbooks? We use a mix of chat-triggered actions. If Event Nexus groups differently, will Orchestrator playbooks trigger incorrectly?\\nNoah Becker (Northstar Sales Engineer): good point Priya. Correlation changes shouldn't alter playbook bindings — we map correlated incident IDs to playbook triggers via the Integration Hub; mapping is idempotent if the incident ID is stable. If IDs change, we can stage a dry-run mode to preview grouping and playbook triggers without firing actions.\\nRenee: cost question — PoV pricing? Liam O'Connor (Northstar Sales): PoV priced at $180k for 90 days for the scope we've discussed (Kafka connectors, EN-CORRELATOR tuning, SI-SCHEMA-REG alignment, Integration Hub Slack+PagerDuty). Pricing is usage-based but capped for PoV.\\nMarcus: performance — median latency must be <250ms for our critical pipeline. Can Event Nexus hit that?\\nJin: yes — with Cloud Ingest Router and in-line rules evaluation (EN-RULES-ENGINE) we commonly see 80-120ms median in similar topologies; we'll provide benchmarks from an existing comparable customer in the next 48 hours.\\nRenee: what's the evidence story — our compliance team needs an audit package of incidents and playbook runs for acquisitions.\\nJin: Compliance Evidence Export (beta) can compile incidents, raw events, and runbook audit trails. We'll include that in the PoV and run a simulated audit export before go/no-go.\\nPriya: objections from execs — BeaconOps is lower cost and has a large playbook library. Why choose Northstar?\\nLeah Park (Northstar VP Product): BeaconOps is good at playbooks, but doesn't give you per-tenant retention controls or evidence exports. You said auditors require packages that contain immutable runbook logs — that's our SIQ-EVIDENCE-EXPORT capability (beta) tied with OR-AUDIT-LOGS.\\nRenee: okay — I'd like a concrete plan: two-week ingest validation, then 4-week tuning, then a 4-week controlled live phase. Can you commit to that timeline?\\nJin: yes — conditional on access to dev Kafka, sample events, and a test service to emulate the message-hub. We'll deliver an ingestion normalization plan within 5 business days and a detailed schedule within 3 days after that.\\nRenee: action items?\\nMarcus: collect sample events by EOD Friday (Mar 20).\\nRenee: we'll provision a dev Kafka topic and service account by Mar 25.\\nJin: Northstar will deliver transform recipes and preliminary correlator rules by Mar 26.\\nLiam: we'll send the PoV contract and SOW today.\\nRenee: thanks. We'll reconvene after the ingest validation. End call.\"},{\"artifact_id\":\"art_9f973773f4fb\",\"title\":\"RCA: Deduplication Drift for LedgerBright — post-acquisition header mismatch\",\"summary\":\"Investigation into LedgerBright's duplicate incidents: primary root cause is inconsistent idempotency header names and value truncation introduced by acquired message-hub. Proposed mitigations: ingest-time header normalization using SI-ETL-FILTER, schema registry alignment via SI-SCHEMA-REG, and correlator tuning (EN-CORRELATOR + EN-DEDUPE). PoV plan included.\",\"content_text\":\"Background:\\n- Customer: LedgerBright Analytics (Upper Mid-Market, ~520 employees).\\n- Trigger: Post-acquisition consolidation (Nov 2025) introduced a message-hub that rewrites headers.\\n- Symptom: 3x increase in duplicate paged incidents for the reconciler pipeline starting late Feb 2026.\\nEvidence Collected:\\n- Sample events (dev) show header 'x-msg-id' present only for messages routed through message-hub; legacy services publish 'idempotency_key'.\\n- Observed truncated values: when the message-hub retries, it truncates the UUID after 32 chars producing collisions.\\n- Kafka topic offsets: duplicate events have disjoint keys, preventing EN-DEDUPE grouping by default.\\nRoot Cause:\\n- Idempotency keys differ in header name and sometimes in value length due to hub rewrite and retry logic. Correlator is keying on 'idempotency_key' and misses messages where header is 'x-msg-id'; truncated values produce false distinct keys.\\nImpact:\\n- On-call fatigue: paging increased 3x for reconciler service.\\n- Operational risk: missed grouping causes manual reconciliation, longer MTTA.\\nRemediation Options (ranked):\\n1) Ingest normalization (preferred, low-impact): deploy SI-ETL-FILTER rule to map 'x-msg-id' -> 'idempotency_key' and canonicalize/truncate/validate length. Quick to implement; no topic changes.\\n2) Runtime transform in message-hub (requires customer dev effort): change hub to preserve original header names and values; needs release window.\\n3) Correlator change (less preferred): allow EN-DEDUPE to check alternate header fields, but this is brittle across services.\\nPoV Plan (90 days):\\n- Week 0-2: Ingest validation — obtain sample events, provision dev Kafka, deploy Kafka connector in consumer mode, implement SI-ETL-FILTER transforms in staging, run simulated traffic.\\n- Week 3-6: Correlator tuning — adjust EN-CORRELATOR window sizes, configure EN-DEDUPE patterns, run dry-run group preview to validate playbook bindings.\\n- Week 7-12: Controlled live — enable correlation for a subset of reconciler topics, monitor duplicate rate and latency, run evidence export for simulated audit.\\nDependencies & Constraints:\\n- Requires dev Kafka access and ability to run connectors with mTLS (customer constraint).\\n- Performance target: median rule-to-action latency <=250ms.\\n- Compliance export will use SIQ-EVIDENCE-EXPORT (beta); may require additional retention config.\\nRisks & Mitigations:\\n- If hub truncation continues, canonicalization function must include hash fallback to avoid collisions.\\n- Connector beta status: have contingency to run preprocessing as an edge agent using SI-AGENT-1 and local buffering.\\nAppendix:\\n- Sample transform snippet (SI-ETL-FILTER pseudo):\\n  if header('idempotency_key') == null & header('x-msg-id') != null then set header('idempotency_key') = normalize(header('x-msg-id'))\\n- Acceptance criteria: duplicate paged incidents reduced by >=60% in scoped topics; successful evidence export package created for compliance with OR-AUDIT-LOGS included.\\nPrepared by: Amara Okoro (Customer Onboarding Specialist)\\nContact: amara.okoro@northstarsignal.example\\n\"},{\"artifact_id\":\"art_e6d67dfd5f1a\",\"title\":\"Competitor report: BeaconOps\",\"summary\":\"BeaconOps (primary competitor) is a credible alternative for LedgerBright because of fast agent onboarding and a large playbook library. However, BeaconOps lacks per-tenant retention controls and robust compliance evidence export, which are critical for LedgerBright's auditor requirements post-acquisition. Northstar's Event Nexus plus Signal Ingest + Signal Insights provide stronger controls for header normalization, schema registry enforcement, and evidence packaging — key differentiators in this deal.\",\"content_text\":\"Context:\\n- Customer need: canonical deduplication across a merged environment where a message-hub rewrites idempotency headers and truncates values.\\n- Buying requirement: dedupe correctness, low latency, and ability to produce audit-grade evidence exports.\\nBeaconOps (cmp_15f3d499e5c7) — strengths relevant to LedgerBright:\\n- Fast agent onboarding: quick to install collectors on service hosts; good for capturing events local to monoliths.\\n- Large playbook marketplace: reduces runbook development time and may appeal to Priya (Runbook owner).\\nBeaconOps — gaps relative to Northstar for this scenario:\\n- Retention controls: BeaconOps has limited per-tenant retention and legal-hold features; LedgerBright explicitly needs exportable evidence for audits of merged systems.\\n- Evidence export: BeaconOps lacks an integrated compliance export package; would require ad-hoc log pulls or external SIEMing, increasing operational overhead.\\n- Schema enforcement: BeaconOps does not have the same Schema Registry tightness and in-line preprocessing controls; header normalization would likely require code changes in the message-hub or additional bespoke transforms.\\nNorthstar advantages (Event Nexus + Signal Ingest + Signal Insights):\\n- Ingest-time schema/transforms (SI-ETL-FILTER + SI-SCHEMA-REG) allow header normalization without touching customer code — lower customer effort and lower risk.\\n- EN-DEDUPE + EN-CORRELATOR support multi-field correlator keys and sliding windows; combined with SI-ETL-FILTER this produces deterministic grouping.\\n- SIQ-EVIDENCE-EXPORT (beta) and OR-AUDIT-LOGS provide an integrated path to create signed audit bundles.\\nPotential customer objections and responses:\\n- Objection: BeaconOps is cheaper and has more playbooks.\\n  Response: For LedgerBright the gating requirement is auditable evidence and retention controls; Northstar reduces forensic effort and risk in audits. We can run playbook parity checks and provide dry-run triggers to prove playbook bindings will behave post-correlation.\\n- Objection: BeaconOps may be faster to stand up.\\n  Response: We propose a 2-week ingest validation and a 90-day PoV with clear rollback and dry-run steps to limit risk and speed time-to-value. Provide benchmark references (latency numbers) to address performance concern.\\nWin Themes to emphasize in sales motions:\\n- \\\"Normalize at ingest, not in app\\\" — reduces change windows for LedgerBright's engineering teams.\\n- \\\"Evidence-first correlation\\\" — built-in exportability for audits reduces total cost of compliance.\\nRecommended ask:\\n- Secure dev Kafka access and sample events for the PoV; show a side-by-side preview of grouping (Northstar vs. BeaconOps) with sample dataset as part of technical evaluation.\\n\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT sql FROM sqlite_master WHERE name IN ('artifacts','customers','scenarios');\"}","output":"[{\"sql\":\"CREATE TABLE scenarios (\\n  scenario_id TEXT PRIMARY KEY,\\n  created_at TEXT NOT NULL,\\n  blueprint_seed INTEGER NOT NULL,\\n  uniqueness_key TEXT NOT NULL UNIQUE,\\n  industry TEXT NOT NULL,\\n  region TEXT NOT NULL,\\n  company_size_band TEXT NOT NULL,\\n  primary_product_id TEXT NOT NULL,\\n  secondary_product_id TEXT,\\n  primary_competitor_id TEXT NOT NULL,\\n  trigger_event TEXT NOT NULL,\\n  pain_point TEXT NOT NULL,\\n  scenario_summary TEXT NOT NULL,\\n  blueprint_json TEXT NOT NULL,\\n  status TEXT NOT NULL DEFAULT 'planned',\\n  FOREIGN KEY (primary_product_id) REFERENCES products(product_id),\\n  FOREIGN KEY (secondary_product_id) REFERENCES products(product_id),\\n  FOREIGN KEY (primary_competitor_id) REFERENCES competitors(competitor_id)\\n)\"},{\"sql\":\"CREATE TABLE customers (\\n  customer_id TEXT PRIMARY KEY,\\n  scenario_id TEXT NOT NULL UNIQUE,\\n  name TEXT NOT NULL UNIQUE,\\n  industry TEXT NOT NULL,\\n  subindustry TEXT NOT NULL,\\n  region TEXT NOT NULL,\\n  country TEXT NOT NULL,\\n  size_band TEXT NOT NULL,\\n  employee_count INTEGER NOT NULL,\\n  annual_revenue_band TEXT NOT NULL,\\n  crm_stage TEXT NOT NULL,\\n  tech_stack_summary TEXT NOT NULL,\\n  account_health TEXT NOT NULL,\\n  primary_contact_name TEXT NOT NULL,\\n  primary_contact_email TEXT NOT NULL,\\n  contacts_json TEXT NOT NULL,\\n  notes TEXT NOT NULL,\\n  FOREIGN KEY (scenario_id) REFERENCES scenarios(scenario_id)\\n)\"},{\"sql\":\"CREATE TABLE artifacts (\\n  artifact_id TEXT PRIMARY KEY,\\n  scenario_id TEXT NOT NULL,\\n  customer_id TEXT,\\n  product_id TEXT,\\n  competitor_id TEXT,\\n  artifact_type TEXT NOT NULL,\\n  title TEXT NOT NULL,\\n  created_at TEXT NOT NULL,\\n  summary TEXT NOT NULL,\\n  content_text TEXT NOT NULL,\\n  token_estimate INTEGER NOT NULL,\\n  content_fingerprint TEXT NOT NULL UNIQUE,\\n  metadata_json TEXT NOT NULL,\\n  FOREIGN KEY (scenario_id) REFERENCES scenarios(scenario_id),\\n  FOREIGN KEY (customer_id) REFERENCES customers(customer_id),\\n  FOREIGN KEY (product_id) REFERENCES products(product_id),\\n  FOREIGN KEY (competitor_id) REFERENCES competitors(competitor_id)\\n)\"}]"}],"suite":"semantic_stress"}];

function verdictOf(r) {
  if (!r.answerScore) return { label: "-", cls: "" };
  if (r.answerScore.correct === null) return { label: "judge", cls: "judge" };
  return r.answerScore.correct ? { label: "pass", cls: "pass" } : { label: "FAIL", cls: "fail" };
}
const pct = (n) => n == null ? "-" : Math.round(n * 100) + "%";
const mean = (xs) => xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;

const rows = DATA.map((r) => {
  const v = verdictOf(r);
  return {
    id: r.id, suite: r.suite, match: r.answerScore?.match_type ?? "-", verdict: v.label, verdictCls: v.cls,
    recall: r.retrievalScore?.scored ? r.retrievalScore.recall : null,
    precision: r.retrievalScore?.scored ? r.retrievalScore.precision : null,
    mrr: r.retrievalScore?.scored ? r.retrievalScore.mrr : null,
    toolCallCount: r.toolCallCount, raw: r,
  };
});

function summaryLine(rs) {
  const graded = rs.filter((r) => r.verdict !== "-" && r.verdict !== "judge");
  const passed = graded.filter((r) => r.verdict === "pass").length;
  const scored = rs.filter((r) => r.recall != null);
  const bits = [`${passed}/${graded.length} pass`];
  if (scored.length) bits.push(`recall ${pct(mean(scored.map((r) => r.recall)))}`);
  return `${bits.join(" · ")} (${rs.length})`;
}

const suiteOrder = ["core_deterministic", "adversarial", "canonical_sample", "semantic_stress", "regression"];
const suites = [...new Set(rows.map((r) => r.suite))].sort((a, b) => {
  const ai = suiteOrder.indexOf(a), bi = suiteOrder.indexOf(b);
  return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
});
document.getElementById("suite").innerHTML =
  '<option value="">all suites</option>' + suites.map((s) => `<option value="${s}">${s}</option>`).join("");

document.getElementById("summary").innerHTML =
  `<span class="detail">${suites.map((s) => `${s}: ${summaryLine(rows.filter((r) => r.suite === s))}`).join("<br>")}<br>` +
  `<b>overall: ${summaryLine(rows)}</b></span>`;

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// Renders grouped ids, comparing against the other side per entity_type (matching scoreRetrieval).
// mode "expected": gold ids, green if retrieved (hit) else red (miss).
// mode "retrieved": predicted ids, green if relevant (hit) else amber (false positive).
function idsHtml(groups, other, mode) {
  const entities = Object.keys(groups || {});
  if (!entities.length) return '<span class="muted">none</span>';
  return entities.map((e) => {
    const otherSet = new Set((other && other[e]) || []);
    const ids = (groups[e] || []).map((id) => {
      const hit = otherSet.has(id);
      const cls = hit ? "hit" : mode === "expected" ? "miss" : "fp";
      return `<span class="${cls}">${escapeHtml(id)}</span>`;
    }).join(", ");
    return `<div><span class="ent">${escapeHtml(e)}:</span> ${ids}</div>`;
  }).join("");
}

// tools column: a clamped one-line-per-call preview (collapsed) plus the full trace with id
// breakdown (revealed in place when the row expands) — same column, two views.
function toolsPreviewHtml(r) {
  if (!r.toolCalls.length) return '<span class="muted">none</span>';
  return escapeHtml(r.toolCalls.map((t) => `${t.name}: ${t.input}`).join("\n"));
}
function toolsFullHtml(r) {
  const tools = r.toolCalls.length
    ? r.toolCalls.map((t) =>
        `<div class="tool"><b>${escapeHtml(t.name)}</b> <code>${escapeHtml(t.input)}</code><pre class="muted">${escapeHtml(t.output.slice(0, 400))}</pre></div>`
      ).join("")
    : '<span class="muted">none</span>';
  return `
    <div class="ids"><b>expected ids:</b> ${idsHtml(r.expectedIds, r.predicted, "expected")}</div>
    <div class="ids"><b>retrieved ids:</b> ${idsHtml(r.predicted, r.expectedIds, "retrieved")}</div>
    ${tools}`;
}

let sortKey = "id", sortDir = 1;
function render() {
  const q = document.getElementById("search").value.toLowerCase();
  const v = document.getElementById("verdict").value;
  const s = document.getElementById("suite").value;
  const sorted = [...rows].sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (av == null) return 1;
    if (bv == null) return -1;
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
  const tbody = document.querySelector("#tbl tbody");
  tbody.innerHTML = "";
  for (const r of sorted) {
    if (v && r.verdict !== v) continue;
    if (s && r.suite !== s) continue;
    if (q && !r.id.toLowerCase().includes(q) && !r.raw.question.toLowerCase().includes(q)) continue;
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${r.id}</td>
      <td class="muted">${r.suite}</td>
      <td class="${r.verdictCls}">${r.verdict}</td>
      <td>${r.match}</td>
      <td class="q"><div class="clamp">${escapeHtml(r.raw.question)}</div></td>
      <td class="trunc"><div class="clamp">${escapeHtml(r.raw.answer)}</div></td>
      <td class="trunc exp-col">${r.raw.expected == null ? '<span class="muted">-</span>' : `<div class="clamp">${escapeHtml(r.raw.expected)}</div>`}</td>
      <td>${pct(r.recall)}</td>
      <td>${pct(r.precision)}</td>
      <td>${r.mrr == null ? "-" : r.mrr.toFixed(2)}</td>
      <td class="tools">
        <div class="tools-count">${r.toolCallCount} call${r.toolCallCount === 1 ? "" : "s"}</div>
        <div class="clamp tools-preview">${toolsPreviewHtml(r.raw)}</div>
        <div class="tools-full">${toolsFullHtml(r.raw)}</div>
      </td>
      <td class="toggle"><span class="toggle-btn">▸</span></td>`;
    tr.querySelector(".toggle-btn").addEventListener("click", () => {
      tr.classList.toggle("expanded");
      tr.querySelector(".toggle-btn").textContent = tr.classList.contains("expanded") ? "▾" : "▸";
    });
    tbody.appendChild(tr);
  }
}
document.querySelectorAll("th[data-k]").forEach((th) => {
  th.addEventListener("click", () => {
    const k = th.dataset.k;
    sortDir = sortKey === k ? -sortDir : 1;
    sortKey = k;
    render();
  });
});
document.getElementById("search").addEventListener("input", render);
document.getElementById("verdict").addEventListener("change", render);
document.getElementById("suite").addEventListener("change", render);
render();
</script>
</body>
</html>
