xecutions into signed export bundles for audits.\\\"}, {\\\"capability_type\\\": \\\"Performance\\\", \\\"code\\\": \\\"SIQ-PERF-OPT\\\", \\\"dependencies\\\": [\\\"SIQ-TSDB\\\"], \\\"keywords\\\": [\\\"optimizer\\\", \\\"query\\\", \\\"caching\\\"], \\\"maturity\\\": \\\"Beta\\\", \\\"name\\\": \\\"Query Performance Optimizer\\\", \\\"sku_tier\\\": \\\"Enterprise\\\", \\\"summary\\\": \\\"Automatic query plan caching and hints for heavy dashboards and scheduled reports with cost-based tuning.\\\"}, {\\\"capability_type\\\": \\\"Reporting\\\", \\\"code\\\": \\\"SIQ-SLA-REPORT\\\", \\\"dependencies\\\": [\\\"SIQ-TSDB\\\"], \\\"keywords\\\": [\\\"sla\\\", \\\"reporting\\\", \\\"evidence\\\"], \\\"maturity\\\": \\\"GA\\\", \\\"name\\\": \\\"SLA Reporting\\\", \\\"sku_tier\\\": \\\"Enterprise\\\", \\\"summary\\\": \\\"Automated SLA calculation engine with scheduleable reports, anomaly attribution, and exportable evidence bundles.\\\"}, {\\\"capability_type\\\": \\\"Storage\\\", \\\"code\\\": \\\"SIQ-TSDB\\\", \\\"dependencies\\\": [\\\"Signal Ingest\\\"], \\\"keywords\\\": [\\\"timeseries\\\", \\\"storage\\\", \\\"compression\\\"], \\\"maturity\\\": \\\"GA\\\", \\\"name\\\": \\\"Time-Series Store\\\", \\\"sku_tier\\\": \\\"Standard\\\", \\\"summary\\\": \\\"High-cardinality time-series store optimized for event-derived metrics with tiered storage and compression.\\\"}]\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM pragma_table_info('customers')\"}","output":"[{\"name\":\"customer_id\"},{\"name\":\"scenario_id\"},{\"name\":\"name\"},{\"name\":\"industry\"},{\"name\":\"subindustry\"},{\"name\":\"region\"},{\"name\":\"country\"},{\"name\":\"size_band\"},{\"name\":\"employee_count\"},{\"name\":\"annual_revenue_band\"},{\"name\":\"crm_stage\"},{\"name\":\"tech_stack_summary\"},{\"name\":\"account_health\"},{\"name\":\"primary_contact_name\"},{\"name\":\"primary_contact_email\"},{\"name\":\"contacts_json\"},{\"name\":\"notes\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT customer_id, name, region, country, account_health, tech_stack_summary, notes FROM customers WHERE region LIKE '%North America West%' OR region LIKE '%NA West%' OR region='NA-West'\"}","output":"[{\"customer_id\":\"cus_10762173c26d\",\"name\":\"BlueHarbor Logistics\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"at risk\",\"tech_stack_summary\":\"Kafka event bus for telemetry, on-prem data lake (S3-compatible), Splunk for legacy logs, Okta SSO, Terraform-managed infra; uses Northstar Signal Event Nexus (multi-tenant SaaS) + Orchestrator for automated remediation. Recent org-wide taxonomy change pushed by VP Ops.\",\"notes\":\"Executive mandate (VP Ops) to reduce manual work by 40% over 6 months. Customer reports search relevance drop after metadata/taxonomy update rolled last month; suspected index weighting mismatch with new schema. Considering NoiseGuard for temporary dedupe if Nexus search can't be stabilized quickly.\"},{\"customer_id\":\"cus_70abe320fe35\",\"name\":\"LedgerPeak Software\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"expanding\",\"tech_stack_summary\":\"Microservices on Kubernetes (EKS), Kafka 2.8 backbone between acquired services, centralized identity via Okta, proprietary billing service from recently acquired startup 'ChargeCore' (running in separate VPC), PagerDuty for paging, Jira for tickets. Uses Event Nexus (prd_f8d861694bac) for correlation and Orchestrator (prd_28d2947423c7) for automation. Edge collectors deployed to on-prem customer data centers for legacy systems.\",\"notes\":\"Post-acquisition consolidation of two product teams (Billing and Core Platform) completed Jan–Feb 2026. Several integration adapters were deployed to map legacy event schemas to LedgerPeak canonical schema. SRE team reported dedupe drift starting 2026-03-03 after cutover of ChargeCore event bridge.\"},{\"customer_id\":\"cus_95ba616f39b7\",\"name\":\"HelioFab Systems\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"watch list\",\"tech_stack_summary\":\"Hybrid: on-prem PLCs and factory edge gateways, Kafka event bus for telemetry, Splunk for legacy logs, Okta SSO, internal data catalog. Event Nexus deployed in multi-tenant SaaS mode with Signal Ingest agents on edge gateways and Kafka Sink integration.\",\"notes\":\"Executive mandate (03-2026) to reduce manual triage work by 50% drove a taxonomy refactor across asset and fault codes. Post-change search relevance dropped, impacting runbook triggering and automated suppression.\"},{\"customer_id\":\"cus_24d45026f273\",\"name\":\"Pioneer Grid Retail LLC\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"recovering\",\"tech_stack_summary\":\"Hybrid cloud: Kafka event bus (self-managed), two billing platforms (AcquiBill v2 and LegacyCharge), internal order management (OMS), and a centralized orchestration layer replaced during recent acquisition. Uses On-prem Edge collectors in substations, TLS mutual auth to cloud ingest. Previously onboarded BeaconOps for lightweight playbooks in the acquired unit.\",\"notes\":\"Post-acquisition consolidation (Dec 2025) merged two billing/event sources. Since Feb 2026, customers report duplicated remediation workflows and missed suppression windows. Priority: stop duplicated playbook executions and restore stable dedupe behavior before quarter-end compliance run (2026-04-15).\"},{\"customer_id\":\"cus_bd59d0368d39\",\"name\":\"Pacific Health Network\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"healthy\",\"tech_stack_summary\":\"Hybrid cloud (AWS us-west-2 primary), on-prem EHR clusters at 18 sites, Kafka event bus for facility telemetry, LDAP SSO (Okta), ServiceNow for ticketing. Using Event Nexus for correlation, Orchestrator for runbook automation, Signal Ingest for edge collection; some legacy alert suppression via NoiseGuard.\",\"notes\":\"Implementing Event Nexus (prd_f8d861694bac) and Orchestrator (prd_28d2947423c7). Executive mandate to reduce manual work after operations cost review on 2026-02-10. Recently performed taxonomy update on 2026-03-02 which coincided with observed degradation in search relevance and incident grouping.\"},{\"customer_id\":\"cus_37e1826806c9\",\"name\":\"Peregrine Logistics Group\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"at risk\",\"tech_stack_summary\":\"Hybrid: AWS accounts per BU, Kafka-based event bus between WMS/TMS, a mix of legacy Oracle apps and a newly adopted cloud-native TMS. Uses Event Nexus (Event Nexus: prd_f8d861694bac) for event correlation and Signal Ingest for collectors. Post-acquisition stack consolidation completed 2026-02-15; some acquired units still route events via BeaconOps-run playbooks.\",\"notes\":\"Trigger: post-acquisition systems consolidation caused inconsistent idempotency keys. Renewal negotiation flagged for Q2 2026; customer reporting high alert volume and duplicate runbook executions increasing operational load by estimated 18% on ops team.\"},{\"customer_id\":\"cus_ce2defcf5292\",\"name\":\"Arcadia Cloudworks\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"expanding\",\"tech_stack_summary\":\"Kafka event bus (self-hosted), Elasticsearch for legacy search, Kubernetes (EKS) for services, Slack, Jira, and Datadog for metrics. Uses multi-tenant SaaS for observability; integrates Northstar Signal Event Nexus for correlation and Orchestrator for remediation playbooks. Schema registry (Confluent) in place.\",\"notes\":\"Executive mandate in Feb 2026 to reduce manual triage hours by 40% across SRE and support. Recently updated product taxonomy and metadata schema (v2.1) across services which coincided with search relevance drop in Event Nexus incident search and playbook triggers. Considering expansion to Orchestrator actions for automated tagging and playbook-driven enrichment. Renewal Q4 2026; current ARR ~$1.8M (Event Nexus + Signal Ingest).\"},{\"customer_id\":\"cus_2a8c1063d782\",\"name\":\"Helix Assemblies Inc.\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"watch list\",\"tech_stack_summary\":\"Hybrid: on-prem MES and ERP (AcqERP v2) connected to cloud services via Kafka bridges; uses Event Nexus (prd_f8d861694bac) for correlation and Orchestrator (prd_28d2947423c7) for runbooks. Recent acquisition (Q1 2026) introduced a second ERP with different event id schema. Uses on-prem edge collectors and private Kafka clusters for plant telemetry.\",\"notes\":\"Post-acquisition consolidation completed 2026-02-28. Observed deduplication drift across plant A and newly onboarded plant D after integration. Customer on standard enterprise agreement; multi-tenant SaaS with on-prem workers for Orchestrator actions.\"},{\"customer_id\":\"cus_92ab48a64476\",\"name\":\"CedarWind Renewables\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"recovering\",\"tech_stack_summary\":\"Hybrid cloud infra (AWS primary, Azure DR), Kafka-based event bus, internal CMDB (proprietary), Elasticsearch 7.10 for search, Jira for incident tracking. Uses NoiseGuard for tactical alert suppression; evaluating Event Nexus for correlation + search-driven incident grouping. Schema registry (Confluent) in use.\",\"notes\":\"Executive mandate (COO) to reduce manual triage by 40% within 6 months; recent metadata taxonomy change (service/team tags) preceded search relevance drop. Trial started 2026-02-15; technical validation in progress.\"},{\"customer_id\":\"cus_024887cce9f1\",\"name\":\"MedLogix Distribution\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"healthy\",\"tech_stack_summary\":\"Hybrid cloud: AWS (EKS, MSK), on-prem Oracle ERP for legacy distribution, custom order-management service (Node.js) for recently acquired subsidiary, Splunk for logs, PagerDuty for paging, Kafka for internal event bus.\",\"notes\":\"Post-acquisition consolidation started Q4 2025; integrating acquired subsidiary's order-management service caused higher duplicate incident rate in Event Nexus. Customer uses Event Nexus (EN) Standard + Orchestrator Enterprise worker pool for critical on-prem actions. Interested in deeper schema registry controls and Orchestrator playbook to normalize idempotency keys.\"},{\"customer_id\":\"cus_fe2c64f4608d\",\"name\":\"Pioneer Freight Solutions\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"at risk\",\"tech_stack_summary\":\"Kafka-based event bus, MySQL metadata store, homegrown asset/taxonomy service, Splunk for archived logs, Okta SSO. Using Northstar Signal: Event Nexus (rules + correlator) + Orchestrator for runbooks; Signal Ingest for collectors in edge warehouses.\",\"notes\":\"Executive mandate (Feb 2026) to reduce manual work across operations; recent taxonomy change (2026-02-18) by Asset Management team caused search relevance degradation in Event Nexus incident lookups. Primary competitor in noise reduction is NoiseGuard (deployed in parallel in a tactical PoC). Renewal negotiation in progress for enterprise agreement covering Event Nexus + Orchestrator; implementation still active with several open engineering tasks and a medium-severity support ticket about knowledge retrieval.\"},{\"customer_id\":\"cus_51012198e623\",\"name\":\"LedgerBright Analytics\",\"region\":\"North America West\",\"country\":\"United States\",\"account_health\":\"expanding\",\"tech_stack_summary\":\"Microservices on Kubernetes (EKS), Kafka event backbone, two legacy monoliths (acquired), Postgres clusters, Splunk for historical logs, Okta SSO. Recent acquisition (Q4 2025) introduced a message-hub glue service written in Go that rewrites event headers.\",\"notes\":\"Recently consolidated two product lines after acquisition in Nov 2025. SRE team reports duplicate incidents and missed dedupe leading to noisy paging and increased toil. Interested in Event Nexus with Schema Registry and Kafka connectors; evaluating BeaconOps in parallel.\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT DISTINCT region FROM customers\"}","output":"[{\"region\":\"ANZ\"},{\"region\":\"Canada\"},{\"region\":\"Nordics\"},{\"region\":\"North America West\"}]"}],"suite":"canonical_sample"},{"id":"gold_sample_07","question":"Do we have a recurring Canada approval-bypass pattern across accounts, or is MapleBridge basically a one-off? Give me the customer names and the shared failure pattern in plain English.","answer":"It's a recurring pattern. Let me confirm the MapleFork failure mechanism matches MapleBridge (rule precedence + schema after migration) — it clearly does. Let me check the two more closely to distinguish the true Canada approval-bypass cases from the unrelated \"low adoption\" tickets.\n\nThe distinction is clear from the summaries above.\n\n**It's a recurring pattern, not a one-off.** Two Canada accounts hit the same failure:\n\n- **MapleBridge Insurance** (`cus_c44f952abde6`)\n- **MapleFork Franchise Systems** (`cus_8ac7338d1b68`)\n\n**Shared failure in plain English:** After a data migration, the Orchestrator evaluated country-specific approval rules (Canada‑ON/QC) in the wrong order — global rules outranked the local overrides — because a schema-registry sync lag created a rule‑precedence race. The result: automated approvals behaved incorrectly (bypassed/blocked), forcing manual escalations. Both were remediated the same way: a temporary human‑in‑the‑loop/override playbook, a rules‑precedence hotfix, a rollback plan, and a signed audit evidence export.\n\n(The other \"approval\" hits — Southern Cross and HarborHome — are a *different* problem, low adoption/manual reassignment, not the migration precedence bug.)","expected":"It is definitely a recurring pattern, not a MapleBridge one-off. The clearest accounts are MapleBridge Insurance, City of Verdant Bay, Maple Regional Transit Authority, MapleBay Marketplace, MapleFork Franchise Systems, MaplePath Career Institute, and MapleWest Bank. In plain English, after migration from older workflow systems, Northstar ends up with some mix of bad precedence metadata, stale caches, field alias mismatches, or delayed schema propagation, so global or country-default rules win when province, city, or Canada-specific approval rules should win. The result is approvals getting bypassed, denied, stuck, or routed to the wrong approver, with audit trails becoming incomplete.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":1,"precision":0.2962962962962963,"mrr":0.41666666666666663,"perEntity":{"customers":{"found":7,"gold":7,"recall":1,"precision":0.4666666666666667},"artifacts":{"found":1,"gold":1,"recall":1,"precision":0.08333333333333333}}},"expectedIds":{"customers":["cus_c44f952abde6","cus_b430f59e0caf","cus_e98688cf78bc","cus_77aa5a39cb6d","cus_8ac7338d1b68","cus_f662b40a432a","cus_1a6ee5ed7a31"],"artifacts":["art_e697b3abe158"]},"predicted":{"customers":["cus_f79f21403ec4","cus_c44f952abde6","cus_132325786388","cus_b430f59e0caf","cus_8ac7338d1b68","cus_03024c35baa8","cus_f662b40a432a","cus_e1ae80e00362","cus_77aa5a39cb6d","cus_89afdd8799a7","cus_1a6ee5ed7a31","cus_5b5cffc18a6e","cus_e98688cf78bc","cus_dda0081884eb","cus_cf752f66a5c3"],"artifacts":["art_6376b15b1c33","art_54e35e2cb431","art_e697b3abe158","art_21f0c5c0ad34","art_ec2da332dc02","art_92227f51f6d3","art_e9c20e0a23e0","art_c6df5a6551d3","art_3497f365d58e","art_ad58f3ce1afd","art_142ab459c9c1","art_e856d122eeda"]},"toolCallCount":4,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM pragma_table_info('customers')\"}","output":"[{\"name\":\"customer_id\"},{\"name\":\"scenario_id\"},{\"name\":\"name\"},{\"name\":\"industry\"},{\"name\":\"subindustry\"},{\"name\":\"region\"},{\"name\":\"country\"},{\"name\":\"size_band\"},{\"name\":\"employee_count\"},{\"name\":\"annual_revenue_band\"},{\"name\":\"crm_stage\"},{\"name\":\"tech_stack_summary\"},{\"name\":\"account_health\"},{\"name\":\"primary_contact_name\"},{\"name\":\"primary_contact_email\"},{\"name\":\"contacts_json\"},{\"name\":\"notes\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM pragma_table_info('artifacts')\"}","output":"[{\"name\":\"artifact_id\"},{\"name\":\"scenario_id\"},{\"name\":\"customer_id\"},{\"name\":\"product_id\"},{\"name\":\"competitor_id\"},{\"name\":\"artifact_type\"},{\"name\":\"title\"},{\"name\":\"created_at\"},{\"name\":\"summary\"},{\"name\":\"content_text\"},{\"name\":\"token_estimate\"},{\"name\":\"content_fingerprint\"},{\"name\":\"metadata_json\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT customer_id, name, country, region FROM customers WHERE name LIKE '%Maple%' OR country LIKE '%Canada%'\"}","output":"[{\"customer_id\":\"cus_f79f21403ec4\",\"name\":\"MapleHarvest Grocers\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_c44f952abde6\",\"name\":\"MapleBridge Insurance\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_132325786388\",\"name\":\"Aurora University System\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_b430f59e0caf\",\"name\":\"City of Verdant Bay\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_8ac7338d1b68\",\"name\":\"MapleFork Franchise Systems\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_03024c35baa8\",\"name\":\"Maple River Regional Bank\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_f662b40a432a\",\"name\":\"MaplePath Career Institute\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_e1ae80e00362\",\"name\":\"Province of Laurentia — Department of Public Works\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_77aa5a39cb6d\",\"name\":\"MapleBay Marketplace\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_89afdd8799a7\",\"name\":\"Northbound Travel Network Inc.\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_1a6ee5ed7a31\",\"name\":\"MapleWest Bank\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_5b5cffc18a6e\",\"name\":\"Maple Ridge University System\",\"country\":\"Canada\",\"region\":\"Canada\"},{\"customer_id\":\"cus_e98688cf78bc\",\"name\":\"Maple Regional Transit Authority\",\"country\":\"Canada\",\"region\":\"Canada\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT a.artifact_id, a.customer_id, c.name, a.artifact_type, a.title, a.summary\\nFROM artifacts_fts f\\nJOIN artifacts a ON a.artifact_id = f.artifact_id\\nLEFT JOIN customers c ON c.customer_id = a.customer_id\\nWHERE artifacts_fts MATCH 'approval AND bypass' LIMIT 30\"}","output":"[{\"artifact_id\":\"art_6376b15b1c33\",\"customer_id\":\"cus_c44f952abde6\",\"name\":\"MapleBridge Insurance\",\"artifact_type\":\"customer_call\",\"title\":\"Technical Validation call with MapleBridge Insurance\",\"summary\":\"Technical validation call between MapleBridge platform and policy teams and Northstar Signal Solutions Engineering and SREs to reproduce the approval bypass, review root-cause (rule precedence + schema sync), agree on a hotfix to Orchestrator rules evaluation precedence, and outline verification and audit export steps. Action items assigned and timeline set for hotfix, rollback plan, and evidence package.\"},{\"artifact_id\":\"art_54e35e2cb431\",\"customer_id\":\"cus_c44f952abde6\",\"name\":\"MapleBridge Insurance\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: MapleBridge approval bypass - override rule + hotfix plan\",\"summary\":\"Team agreed to immediate override rule, schedule engine hotfix for 2026-03-17, and generate evidence export by 2026-03-16. Implementation playbook to be delivered 2026-03-16. Monitoring ticket created for schema-registry lag detection.\"},{\"artifact_id\":\"art_e697b3abe158\",\"customer_id\":\"cus_c44f952abde6\",\"name\":\"MapleBridge Insurance\",\"artifact_type\":\"internal_document\",\"title\":\"Playbook: MapleBridge Canada Approval Fix & Prevention\",\"summary\":\"Step-by-step playbook to remediate the Canada approval bypass observed after the 2026-03-12 migration. Contains immediate mitigations, hotfix deployment plan for EN-RULES-ENGINE, validation procedures, rollback plan, evidence export instructions, and monitoring recommendations to prevent future SI-SCHEMA-REG propagation races.\"},{\"artifact_id\":\"art_21f0c5c0ad34\",\"customer_id\":\"cus_c44f952abde6\",\"name\":\"MapleBridge Insurance\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: SignalFlow\",\"summary\":\"SignalFlow (primary competitor) offers a high-throughput, stream-native correlation engine which excels in large-scale streaming environments. For MapleBridge's failure mode—rules precedence and schema propagation races—SignalFlow's strengths (throughput, stream-native integrations) would not by themselves prevent semantic rule conflicts between global and country overrides. Northstar's Orchestrator differentiates with built-in role-based approvals, audit trails, and runbook integrations that are critical for regulated insurers. Recommended positioning: emphasize Orchestrator's approval workflows, audit evidence exports (SIQ-EVIDENCE-EXPORT + OR-AUDIT-LOGS), and single-tenant controls; acknowledge SignalFlow's throughput advantage but highlight operational complexity and integration surface area required to match our approval governance.\"},{\"artifact_id\":\"art_ec2da332dc02\",\"customer_id\":\"cus_dda0081884eb\",\"name\":\"Southern Cross University Network\",\"artifact_type\":\"customer_call\",\"title\":\"Discovery call with Southern Cross University Network\",\"summary\":\"Discovery call with Southern Cross University Network stakeholders to understand low adoption of automated exception routing after an audit escalation. Northstar team (Jin Park - Solutions Engineer; Carlos Mendes - CSM) probed rule config, confidence scoring, and evidence export needs. Customer emphasized need for transparent scoring, supervised override flow, and a signed evidence bundle for audit remediation. Agreed next steps: pilot transparency dashboard, implement supervised-override playbook, deliver signed export by 2026-04-10.\"},{\"artifact_id\":\"art_92227f51f6d3\",\"customer_id\":\"cus_dda0081884eb\",\"name\":\"Southern Cross University Network\",\"artifact_type\":\"internal_document\",\"title\":\"Enablement Brief — Southern Cross University Network: Confidence Transparency + Supervised Override Pilot\",\"summary\":\"Practical enablement for L1/L2 teams at Southern Cross University Network to increase trust in automated exception routing. Contains step-by-step guidance for the transparency dashboard, supervised-override flow, runbook snippets, and KPI definitions for the 90-day pilot.\"},{\"artifact_id\":\"art_e9c20e0a23e0\",\"customer_id\":\"cus_8ac7338d1b68\",\"name\":\"MapleFork Franchise Systems\",\"artifact_type\":\"support_ticket\",\"title\":\"Support ticket: Multiple region-specific approval workflows (Canada-ON, Canada-QC) evaluated incorrectly after migration, causing automated approvals to be blocked and manual escalations to increase. Affects payroll approval pipeline for ~38/320 franchises (~12%).\",\"summary\":\"Multiple region-specific approval workflows (Canada-ON, Canada-QC) evaluated incorrectly after migration, causing automated approvals to be blocked and manual escalations to increase. Affects payroll approval pipeline for ~38/320 franchises (~12%).\"},{\"artifact_id\":\"art_c6df5a6551d3\",\"customer_id\":\"cus_8ac7338d1b68\",\"name\":\"MapleFork Franchise Systems\",\"artifact_type\":\"customer_call\",\"title\":\"Executive Escalation call with MapleFork Franchise Systems\",\"summary\":\"Escalation call between MapleFork executives and Northstar Signal execs/engineers to triage failed approval workflows after migration. Agreement to implement temporary playbook bypass, rollback plan for rule evaluation ordering, and deliver audit evidence export. Timeline: 48-72 hour remediation window with checkpoints.\"},{\"artifact_id\":\"art_3497f365d58e\",\"customer_id\":\"cus_8ac7338d1b68\",\"name\":\"MapleFork Franchise Systems\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: MapleFork escalation - approval workflow precedence and temporary payroll bypass\",\"summary\":\"Decision: deploy temporary ChatOps approval playbook immediately; feature-flag precedence fix in canary tenant, validate, then promote. Action owner assignments and daily checkpoints established.\"},{\"artifact_id\":\"art_ad58f3ce1afd\",\"customer_id\":\"cus_8ac7338d1b68\",\"name\":\"MapleFork Franchise Systems\",\"artifact_type\":\"internal_document\",\"title\":\"Playbook: Emergency Approval Bypass & Rules-Precedence Recovery — MapleFork\",\"summary\":\"Step-by-step playbook to (A) deploy a temporary ChatOps human-in-the-loop approval bypass for blocked payouts and (B) perform a scoped precedence fix for Orchestrator rule evaluation. Includes validation steps, rollback, and evidence export notes.\"},{\"artifact_id\":\"art_142ab459c9c1\",\"customer_id\":\"cus_cf752f66a5c3\",\"name\":\"HarborHome Marketplace Pty Ltd\",\"artifact_type\":\"support_ticket\",\"title\":\"Support ticket: Customer reports low adoption of automated exception routing; many incidents manually reassigned after alert creation. Requesting configuration changes to enforce justification fields on manual overrides and a pilot that increases confidence transparency.\",\"summary\":\"Customer reports low adoption of automated exception routing; many incidents manually reassigned after alert creation. Requesting configuration changes to enforce justification fields on manual overrides and a pilot that increases confidence transparency.\"},{\"artifact_id\":\"art_e856d122eeda\",\"customer_id\":\"cus_e1ae80e00362\",\"name\":\"Province of Laurentia — Department of Public Works\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: Laurentia-East ingest failures + renewal negotiation follow-up\",\"summary\":\"Decision: push permissive mapping within 24-48 hrs, prepare SOW offering 160 complimentary hours contingent on renewal by 2026-04-15. Action items assigned with owners and deadlines.\"}]"}],"suite":"canonical_sample"},{"id":"gold_semantic_01","question":"Are any of our customers currently being pulled toward a competitor by a better price?","answer":"Yes — one clearly fits: **NorrLog Freight AB** (cus_6a81c89143a3, at risk), where procurement is evaluating **EdgeCollector Co.** for *cheaper* collectors.\n\nSeveral others face pricing pressure but it's mostly procurement pushing for concessions/cost reduction rather than a competitor's better price specifically (e.g., NordChemica, City of Verdant Bay, NordMed, Fyrkrona, NordicChem).","expected":"NordFryst AB: procurement is pushing to reduce vendor count, and Patchway offered a 15 percent discount to move ingestion elsewhere. NordFryst is staying with Signal Ingest for now because of the Kafka connectors and buffering, but noisy alerts remain a real problem.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0,"precision":0,"mrr":0,"perEntity":{"customers":{"found":0,"gold":1,"recall":0,"precision":0},"competitors":{"found":0,"gold":1,"recall":0,"precision":0},"artifacts":{"found":0,"gold":4,"recall":0,"precision":0}}},"expectedIds":{"customers":["cus_c017e831b967"],"competitors":["cmp_87cff0644d63"],"artifacts":["art_57ab871c2b35","art_f92d6a99f322","art_49f5fae5a1cf","art_6f285c2f3219"]},"predicted":{"customers":["cus_92bc8f749347","cus_4ccee8936f0c","cus_b430f59e0caf","cus_2e9db31d7902","cus_6a81c89143a3","cus_dda0081884eb","cus_bd59d0368d39","cus_8ab143fe5705","cus_77aa5a39cb6d","cus_4a3287c05574","cus_7355bb61ec30","cus_6c4f1fa8e909","cus_fe2c64f4608d","cus_90a9a1301cc4"]},"toolCallCount":2,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM pragma_table_info('customers')\"}","output":"[{\"name\":\"customer_id\"},{\"name\":\"scenario_id\"},{\"name\":\"name\"},{\"name\":\"industry\"},{\"name\":\"subindustry\"},{\"name\":\"region\"},{\"name\":\"country\"},{\"name\":\"size_band\"},{\"name\":\"employee_count\"},{\"name\":\"annual_revenue_band\"},{\"name\":\"crm_stage\"},{\"name\":\"tech_stack_summary\"},{\"name\":\"account_health\"},{\"name\":\"primary_contact_name\"},{\"name\":\"primary_contact_email\"},{\"name\":\"contacts_json\"},{\"name\":\"notes\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT customer_id, name, account_health, crm_stage, notes FROM customers WHERE notes LIKE '%price%' OR notes LIKE '%cost%' OR notes LIKE '%cheaper%' OR notes LIKE '%competitor%' OR notes LIKE '%pricing%'\"}","output":"[{\"customer_id\":\"cus_92bc8f749347\",\"name\":\"NordChemica AB\",\"account_health\":\"watch list\",\"crm_stage\":\"implementation\",\"notes\":\"Renewal negotiation ongoing; procurement pressing for cost reduction and consolidation. Customer reports 20-30x alert volume spikes during morning handoffs; many alerts originate from pilot-tuned thresholds and syslog sources. They are evaluating Patchway for on-prem remediation and secrets controls; procurement requested formal service review and remediation plan by 2026-03-27.\"},{\"customer_id\":\"cus_4ccee8936f0c\",\"name\":\"Northpoint Apparel Pty Ltd\",\"account_health\":\"expanding\",\"crm_stage\":\"renewal review\",\"notes\":\"Board asked for improved operational metrics (Feb 2026). Recent HR-led org restructuring (effective 2026-02-15) increased role changes; provisioning lag now affecting store access and runbook approvals. Primary competitor in deal history: ObservaGrid (pre-existing APM/tracing provider in infra). Private cloud deployment due to APAC data residency.\"},{\"customer_id\":\"cus_b430f59e0caf\",\"name\":\"City of Verdant Bay\",\"account_health\":\"at risk\",\"crm_stage\":\"renewal review\",\"notes\":\"Migration from ProcureFlow completed 2026-02-10. Since migration, ~22% of approval-triggered playbooks have failed validation due to policy override mismatches between municipal (country/province) policy sets and new global defaults. Renewing contract in April 2026; customer requested price relief and technical remediation plan.\"},{\"customer_id\":\"cus_2e9db31d7902\",\"name\":\"NordMed Distribution AB\",\"account_health\":\"healthy\",\"crm_stage\":\"expansion cycle\",\"notes\":\"Negotiation with procurement increased price sensitivity during renewal window (Q2 2026). Primary pain: noisy alerting originated from production-scale volume mismatch — thresholds set during pilot (Q4 2024) never adjusted. Customer currently on hybrid deployment (cloud ingest + two single-tenant appliances for sensitive sites). Has active contract for Signal Ingest + pilot of Signal Insights. Primary competitor in account: Patchway (orchestration-first with on-prem workers).\"},{\"customer_id\":\"cus_6a81c89143a3\",\"name\":\"NorrLog Freight AB\",\"account_health\":\"at risk\",\"crm_stage\":\"implementation\",\"notes\":\"Pilot expanded to second BU (contract logistics) on 2026-02-15. Since expansion, executive dashboards show 30–45 minute lag on hourly scheduled reports; customer concerned about SLAs for C-suite reporting. Procurement evaluating EdgeCollector Co. for cheaper collectors; security and compliance need SOC2 alignment evidence. Primary pain: reporting latency for executive dashboards; root cause traced to slow enrichment stage and repeated reprocessing in ingestion pipeline.\"},{\"customer_id\":\"cus_dda0081884eb\",\"name\":\"Southern Cross University Network\",\"account_health\":\"healthy\",\"crm_stage\":\"renewal review\",\"notes\":\"Triggered by audit finding: one high-severity incident escalated due to manual override bypassing automated exception routing. Primary product: Signal Insights (prd_29a3d7cb61e9). Primary competitor: ComplianceStream. Concern: frontline staff distrust of confidence thresholds; want measurable uplift in automated routing adoption before renewal.\"},{\"customer_id\":\"cus_bd59d0368d39\",\"name\":\"Pacific Health Network\",\"account_health\":\"healthy\",\"crm_stage\":\"implementation\",\"notes\":\"Implementing Event Nexus (prd_f8d861694bac) and Orchestrator (prd_28d2947423c7). Executive mandate to reduce manual work after operations cost review on 2026-02-10. Recently performed taxonomy update on 2026-03-02 which coincided with observed degradation in search relevance and incident grouping.\"},{\"customer_id\":\"cus_8ab143fe5705\",\"name\":\"Fyrkrona Renewables AB\",\"account_health\":\"recovering\",\"crm_stage\":\"implementation\",\"notes\":\"Negotiating renewal (term: 2026-05-01) after procurement pushed for price concessions due to perceived noise. Pilot completed Q4 2025; production ramp in Jan-Feb 2026 exposed noisy alert volumes. Customer runs 24 wind and 8 solar sites with remote edge gateways requiring hybrid collectors. Root cause analysis points to thresholds left at pilot volume and missing suppression policy updates at production scale.\"},{\"customer_id\":\"cus_77aa5a39cb6d\",\"name\":\"MapleBay Marketplace\",\"account_health\":\"expanding\",\"crm_stage\":\"renewal review\",\"notes\":\"Migrated from legacy workflow tooling 2026-02-20 -> intermittent approval failures beginning 2026-03-02. Primary competitor previously used: SignalFlow for event pipeline. Renewal due 2026-04-30; evaluating expansion of Orchestrator playbook count and worker pool seats.\"},{\"customer_id\":\"cus_4a3287c05574\",\"name\":\"Catalyst Careers Pty Ltd\",\"account_health\":\"healthy\",\"crm_stage\":\"escalation recovery\",\"notes\":\"Board requested tighter operating metrics on time-to-role-assignment after recent org restructuring (Feb 2026). Customers report 24–72 hour lag in role provisioning across departments. Root cause appears to be inconsistent SCIM mappings and diverging approval chains between Learning Ops and Corporate HR. Using Northstar Signal's Signal Insights (dashboards, SLA reporting) and piloting Event Nexus for incident grouping and suppression. Primary competitor in procurement evaluation: ObservaGrid (trace-first vendor).\"},{\"customer_id\":\"cus_7355bb61ec30\",\"name\":\"Department of Regional Services (DRS)\",\"account_health\":\"at risk\",\"crm_stage\":\"renewal review\",\"notes\":\"Trigger event: high-severity escalation after quarterly audit (Q4 FY25) where three exceptions routed automatically were overridden manually and later caused delayed reconciliations. Frontline teams distrust confidence thresholds; they prefer manual overrides. Customer demands stronger auditability and a staged rollback of automated rules. Primary competitor in discussions: ComplianceStream (audit packaging) — customer previously evaluated ComplianceStream for compliance exports but chose Northstar for insights; now using ComplianceStream connectors for evidence bundles.\"},{\"customer_id\":\"cus_6c4f1fa8e909\",\"name\":\"NordicChem AB\",\"account_health\":\"watch list\",\"crm_stage\":\"new logo pursuit\",\"notes\":\"Procurement has signaled price pushback during renewal window. Engineering reports >32,000 alerts/day from pilot rules; SRE wants thresholds retuned and suppression policies.\"},{\"customer_id\":\"cus_fe2c64f4608d\",\"name\":\"Pioneer Freight Solutions\",\"account_health\":\"at risk\",\"crm_stage\":\"implementation\",\"notes\":\"Executive mandate (Feb 2026) to reduce manual work across operations; recent taxonomy change (2026-02-18) by Asset Management team caused search relevance degradation in Event Nexus incident lookups. Primary competitor in noise reduction is NoiseGuard (deployed in parallel in a tactical PoC). Renewal negotiation in progress for enterprise agreement covering Event Nexus + Orchestrator; implementation still active with several open engineering tasks and a medium-severity support ticket about knowledge retrieval.\"},{\"customer_id\":\"cus_90a9a1301cc4\",\"name\":\"Harvest Table Group\",\"account_health\":\"watch list\",\"crm_stage\":\"escalation recovery\",\"notes\":\"Quarterly compliance audit flagged gaps in exception routing evidence; internal ops teams routinely override automated routing resulting in manual ticket churn and inconsistent runbook execution. Primary competitor referenced in audit: ComplianceStream.\"}]"}],"suite":"semantic_stress"},{"id":"gold_semantic_02","question":"Which customers sound like they're running out of patience with how long our fixes are taking?","answer":"The clearest ones showing impatience specifically about slow fixes/resolution turnaround are these at-risk/escalation accounts:\n\n- **Department of Regional Services (DRS)** – at risk, renewal review; escalated after an audit and now demanding a staged rollback and stronger auditability (distrust in automated handling).\n- **Province of Laurentia — Dept. of Public Works** – at risk, in escalation recovery, with implementation stalled over unresolved schema ownership.\n- **Pioneer Freight Solutions** – at risk, open engineering tasks and an unresolved support ticket dragging during renewal.\n- **Maple Regional Transit Authority** – at risk, unresolved post-migration approval failures against a regulatory SLA.\n- **NorrLog Freight AB** – at risk over unresolved reporting-latency SLAs and now shopping a cheaper competitor.\n\nNote: most complaints here are about latency/root-cause resolution rather than an explicit \"your fixes take too long\" — but these are the accounts whose patience is clearly wearing thin.","expected":"At least BlueHarbor Logistics (exec mandate to cut manual triage 40% in 6 months, needs measurable improvement within four weeks or the VP gets asked why they're paying for the platform) and Harbourline Regional Transit Authority (board wants metrics by next quarter, called last week's provisioning-lag spikes 'unacceptable'). Both express urgency in their own words rather than a shared keyword like 'patience' or 'frustrated'.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0,"precision":0,"mrr":0,"perEntity":{"customers":{"found":0,"gold":2,"recall":0,"precision":0},"artifacts":{"found":0,"gold":2,"recall":0,"precision":0},"scenarios":{"found":0,"gold":0,"recall":0,"precision":0}}},"expectedIds":{"customers":["cus_10762173c26d","cus_4637d32c1def"],"artifacts":["art_0bccc580184e","art_776ba299d576"]},"predicted":{"customers":["cus_f79f21403ec4","cus_413dd8966d80","cus_6a81c89143a3","cus_c31fbf7dd7e7","cus_1df01c3ac48e","cus_ce2defcf5292","cus_e1ae80e00362","cus_c9295aba1003","cus_4a3287c05574","cus_89afdd8799a7","cus_8482837f3e7b","cus_7355bb61ec30","cus_fdcb13df93e1","cus_fe2c64f4608d","cus_b45b9112b7c0","cus_e98688cf78bc"],"scenarios":["scn_91829878b845"]},"toolCallCount":2,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT * FROM customers LIMIT 1\"}","output":"[{\"customer_id\":\"cus_f79f21403ec4\",\"scenario_id\":\"scn_91829878b845\",\"name\":\"MapleHarvest Grocers\",\"industry\":\"Retail\",\"subindustry\":\"grocery chain\",\"region\":\"Canada\",\"country\":\"Canada\",\"size_band\":\"Large Enterprise\",\"employee_count\":8200,\"annual_revenue_band\":\"$1B-$10B\",\"crm_stage\":\"active pilot\",\"tech_stack_summary\":\"Hybrid data stack: on-prem POS/fulfillment systems in regional data centers (Quebec, Ontario), central Kafka bus for analytics, existing MetricLens dashboards fed from a regional ETL. Uses Active Directory + VPN for regional admin. Wants single-tenant cloud deployment for Northstar with on-prem collectors for edge stores.\",\"account_health\":\"expanding\",\"primary_contact_name\":\"Sophie Tremblay\",\"primary_contact_email\":\"sophie.tremblay@mapleharvest.example\",\"contacts_json\":\"[{\\\"buying_influence\\\": \\\"Economic + Technical\\\", \\\"concerns\\\": [\\\"Who owns canonical POS event fields vs. store-app transformations\\\", \\\"Compatibility with existing MetricLens dashboards\\\", \\\"Security posture for single-tenant cloud and mTLS collector certs\\\"], \\\"department\\\": \\\"IT / Platform\\\", \\\"email\\\": \\\"sophie.tremblay@mapleharvest.example\\\", \\\"full_name\\\": \\\"Sophie Tremblay\\\", \\\"persona\\\": \\\"Platform engineering leader\\\", \\\"priorities\\\": [\\\"Stabilize Quebec region store telemetry ingestion\\\", \\\"Reduce incident handoffs between Store Ops and IT\\\", \\\"Demonstrate automated remediation with Orchestrator within 90 days\\\"], \\\"seniority\\\": \\\"Director\\\", \\\"title\\\": \\\"Director, Platform Engineering\\\"}, {\\\"buying_influence\\\": \\\"Operational\\\", \\\"concerns\\\": [\\\"Playbooks causing store disruption\\\", \\\"Data ownership for sensor vs. POS alerts\\\"], \\\"department\\\": \\\"Operations\\\", \\\"email\\\": \\\"marc.gauthier@mapleharvest.example\\\", \\\"full_name\\\": \\\"Marc Gauthier\\\", \\\"persona\\\": \\\"Operations leader\\\", \\\"priorities\\\": [\\\"Minimize manual escalations for register failures\\\", \\\"Enable playbook-triggered on-site checks for high-severity alerts\\\"], \\\"seniority\\\": \\\"Head\\\", \\\"title\\\": \\\"Head of Store Operations\\\"}, {\\\"buying_influence\\\": \\\"Technical + Compliance\\\", \\\"concerns\\\": [\\\"How evidence exports will be produced for audits\\\", \\\"Overlap between MetricLens time-series and Northstar derived incidents\\\"], \\\"department\\\": \\\"Analytics\\\", \\\"email\\\": \\\"ellen.park@mapleharvest.example\\\", \\\"full_name\\\": \\\"Ellen Park\\\", \\\"persona\\\": \\\"Analytics / Compliance\\\", \\\"priorities\\\": [\\\"Preserve existing MetricLens reporting contracts\\\", \\\"Ensure retention and audit traces for high-value incidents\\\"], \\\"seniority\\\": \\\"Manager\\\", \\\"title\\\": \\\"Compliance & Analytics Lead\\\"}]\",\"notes\":\"Pilot started 2026-01-12 focused on Orchestrator playbooks for incident automation and Signal Ingest for normalized events from POS and store sensors. Primary friction: ambiguous source-of-truth boundaries between Store Ops and IT/Platform teams after Quebec launch (trigger event). Pilot covers ~320 stores in Quebec region first phase.\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT customer_id, name, account_health, crm_stage, notes FROM customers\\nWHERE lower(notes) LIKE '%fix%' OR lower(notes) LIKE '%slow%' OR lower(notes) LIKE '%delay%'\\nOR lower(notes) LIKE '%patience%' OR lower(notes) LIKE '%wait%' OR lower(notes) LIKE '%resolution%'\\nOR lower(notes) LIKE '%turnaround%' OR lower(notes) LIKE '%too long%' OR lower(notes) LIKE '%frustrat%'\\nOR lower(notes) LIKE '%sla%' OR lower(notes) LIKE '%bug%' OR lower(notes) LIKE '%support%'\\nOR lower(contacts_json) LIKE '%frustrat%' OR lower(contacts_json) LIKE '%slow%' OR lower(contacts_json) LIKE '%delay%'\"}","output":"[{\"customer_id\":\"cus_413dd8966d80\",\"name\":\"Aureum Payments Pty Ltd\",\"account_health\":\"recovering\",\"crm_stage\":\"escalation recovery\",\"notes\":\"Board requested operating metrics tightening on 2026-03-10. Reported symptom: role provisioning lag (30-120 minutes) after restructure; primary root cause suspected: mismatched SCIM attribute mappings + approval-chain branching across Payments Ops, Fraud, and Merchant Services.\"},{\"customer_id\":\"cus_6a81c89143a3\",\"name\":\"NorrLog Freight AB\",\"account_health\":\"at risk\",\"crm_stage\":\"implementation\",\"notes\":\"Pilot expanded to second BU (contract logistics) on 2026-02-15. Since expansion, executive dashboards show 30–45 minute lag on hourly scheduled reports; customer concerned about SLAs for C-suite reporting. Procurement evaluating EdgeCollector Co. for cheaper collectors; security and compliance need SOC2 alignment evidence. Primary pain: reporting latency for executive dashboards; root cause traced to slow enrichment stage and repeated reprocessing in ingestion pipeline.\"},{\"customer_id\":\"cus_c31fbf7dd7e7\",\"name\":\"Svenska PolyChem AB\",\"account_health\":\"watch list\",\"crm_stage\":\"expansion cycle\",\"notes\":\"Pilot (R&D business unit) expanded to Production Chemistry BU on 2026-02-15. Since expansion, scheduled hourly aggregation jobs feeding executive dashboards have grown from 120k to 420k enriched events per hour; dashboards now take 8–12 minutes to refresh (target < 90s). Root cause traced to enrichment microservice saturation and repeated reprocessing of same batches due to idempotency gaps. Contract includes hybrid deployment with private data residency in Sweden and enterprise retention policies. CSM: Carlos Mendes assigned; escalation involved VP Engineering and CFO due to exec visibility of KPIs.\"},{\"customer_id\":\"cus_1df01c3ac48e\",\"name\":\"Harborline Hospitality Group\",\"account_health\":\"watch list\",\"crm_stage\":\"renewal review\",\"notes\":\"Board requested monthly operational KPIs tied to staff rostering and access SLAs. Recent regional org restructure (2026-02) introduced new departments and multiple Okta org mappings; customers reported delays in role-based access assignments to property systems. Historically evaluated ObservaGrid during initial purchase; renewal coming Q2 2026.\"},{\"customer_id\":\"cus_ce2defcf5292\",\"name\":\"Arcadia Cloudworks\",\"account_health\":\"expanding\",\"crm_stage\":\"expansion cycle\",\"notes\":\"Executive mandate in Feb 2026 to reduce manual triage hours by 40% across SRE and support. Recently updated product taxonomy and metadata schema (v2.1) across services which coincided with search relevance drop in Event Nexus incident search and playbook triggers. Considering expansion to Orchestrator actions for automated tagging and playbook-driven enrichment. Renewal Q4 2026; current ARR ~$1.8M (Event Nexus + Signal Ingest).\"},{\"customer_id\":\"cus_e1ae80e00362\",\"name\":\"Province of Laurentia — Department of Public Works\",\ _sql","input":"{\"sql\":\"SELECT a.artifact_id, a.title, a.customer_id, c.name AS customer_name, a.summary, a.content_text FROM artifacts_fts fts JOIN artifacts a ON a.rowid = fts.rowid LEFT JOIN customers c ON c.customer_id = a.customer_id WHERE artifacts_fts MATCH 'exception override compliance evidence audit tracked' LIMIT 10;\"}","output":"[]"},{"name":"run_sql","input":"{\"sql\":\"SELECT a.artifact_id, a.title, a.customer_id, c.name AS customer_name, a.summary FROM artifacts_fts fts JOIN artifacts a ON a.rowid = fts.rowid LEFT JOIN customers c ON c.customer_id = a.customer_id WHERE artifacts_fts MATCH 'exception override audit compliance' LIMIT 10;\"}","output":"[{\"artifact_id\":\"art_e962952c9d23\",\"title\":\"Support ticket: Low adoption of automated exception routing after quarterly audit; overrides create gaps in compliance evidence export.\",\"customer_id\":\"cus_cf83c453e08c\",\"customer_name\":\"Southern Cross Travel Network\",\"summary\":\"Low adoption of automated exception routing after quarterly audit; overrides create gaps in compliance evidence export.\"},{\"artifact_id\":\"art_25a4e8969ede\",\"title\":\"Executive Escalation call with Southern Cross Travel Network\",\"customer_id\":\"cus_cf83c453e08c\",\"customer_name\":\"Southern Cross Travel Network\",\"summary\":\"Executive escalation with Southern Cross Travel Network leadership and Northstar Signal account and engineering leads to triage audit evidence gaps and agree on immediate remediation (enhanced transparency, ServiceNow payload changes, pilot timeline).\"},{\"artifact_id\":\"art_d0e7c55f63b4\",\"title\":\"Southern Cross Travel Network — Remediation & Enablement Brief: Exception Routing Adoption\",\"customer_id\":\"cus_cf83c453e08c\",\"customer_name\":\"Southern Cross Travel Network\",\"summary\":\"Tactical plan and technical notes to remediate low adoption of automated exception routing for Southern Cross pilot. Focus areas: payload mapping, correlation window, UI transparency, training rrides) while delivering the required signed export. Recommendation: Lead with transparency and supervised-override capability and frame export as enterprise-grade add-on—position as a single-vendor solution vs. ComplianceStream + a separate orchestration tool.\"},{\"artifact_id\":\"art_142ab459c9c1\",\"title\":\"Support ticket: Customer reports low adoption of automated exception routing; many incidents manually reassigned after alert creation. Requesting configuration changes to enforce justification fields on manual overrides and a pilot that increases confidence transparency.\",\"customer_id\":\"cus_cf752f66a5c3\",\"customer_name\":\"HarborHome Marketplace Pty Ltd\",\"summary\":\"Customer reports low adoption of automated exception routing; many incidents manually reassigned after alert creation. Requesting configuration changes to enforce justification fields on manual overrides and a pilot that increases confidence transparency.\"},{\"artifact_id\":\"art_9985f7bb84ff\",\"title\":\"Competitor report: ComplianceStream\",\"customer_id\":\"cus_cf752f66a5c3\",\"customer_name\":\"HarborHome Marketplace Pty Ltd\",\"summary\":\"ComplianceStream focuses on audit packaging and SIEM exports but lacks real-time correlation and built-in remediation. HarborHome's need (reduce manual overrides and prove audit trails) sits at the intersection: ComplianceStream is strong on evidence packaging but would not address real-time trust issues which Signal Insights and Event Nexus can handle together.\"},{\"artifact_id\":\"art_8107dc8eb87c\",\"title\":\"Support ticket: Low adoption of automated exception routing: operators override automated route decisions for PCI-adjacent settlement exceptions. Need configuration, runbook linking, and evidence export for compliance review.\",\"customer_id\":\"cus_ee4ccc28e9c7\",\"customer_name\":\"TransPac Payments Pty Ltd\",\"summary\":\"Low adoption of automated exception routing: operators override automated route decisions for PCI-adjacent sett
