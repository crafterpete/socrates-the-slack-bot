itor_research\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT content_text FROM artifacts WHERE artifact_id = 'art_6c5bb3a4b89f'\"}","output":"[{\"content_text\":\"amar a.okoro: QBR notes posted — schema rejects blocking EN-CORRELATOR. Recommending temp transform.\\njin.park: Agree. I can push transform config to staging and validate. Need Sophie/Platform to approve field mapping doc (txn_id -> transaction_id, total_amount -> amount_cents) + type coercion rules.\\nomar.farouk: Security note — must log transforms to OR-AUDIT-LOGS and rotate keys for the mirror topic. Hector, can you confirm?\\nhector.alvarez: Confirmed. Will provide audit template and CA enrollment steps. Estimated cert timeline 10 business days for Quebec pool.\\ncarlos.mendes: Action: I'll create the technical approval doc and tag Sophie/Ellen. Due EOD 2026-03-19. Owner: Carlos.\\namara.okoro: Jin to provision transform in SI-CLOUD-ROUTER once doc approved. Target deploy: 2026-03-21. Owner: Jin.\\nolivia.grant: Support: will watch SI-SCHEMA-REG logs during deploy and open hotline for Platform. Owner: Olivia.\\nnoah.becker: We'll create mirrored topic config (map: original->mirror) and enable SI-KAFKA-SINK to push to MetricLens. Owner: Noah. Target same day as transform.\\nben.gallagher: Sales ops: capture any scope changes for contract amendment. Owner: Ben. \\namar a.okoro: Decision logged: proceed with temp router transform + mirror. Action items created. Next sync after workshop on 2026-03-23.\\n\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT content_text FROM artifacts WHERE artifact_id = 'art_5a91258f4056'\"}","output":"[{\"content_text\":\"Background:\\n- Pilot kickoff: 2026-01-12. Quebec launch (phase 1) deployed 2026-02-22 across ~320 stores. Current problem: SI-SCHEMA-REG rejecting messages due to mixed field names/types introduced by store-level preprocessing.\\n\\nKey Constraints:\\n- MapleHarvest requires MetricLens dashboards to remain uninterrupted for store managers.\\n- Platform team cannot rework 320 producers within acceptable time (6-8 weeks). Budget and staffing limit immediate producer changes.\\n- Security: single-tenant cloud deployment requires per-collector mTLS certs; enrollment estimated at 10 business days for Quebec pool.\\n\\nRecommended Immediate Actions (72-hour window):\\n1) Deploy SI-CLOUD-ROUTER transformation (Temporary)\\n   - Owner: Jin Park\\n   - Tasks: implement mapping rules (txn_id -> transaction_id; total_amount -> amount_cents), type coercion (string->int), preserve key fields (store_id, register_id), and output to canonical topic.\\n   - Safety: enable OR-AUDIT-LOGS for each transformed event; add transformation flag field _ns_transform=true.\\n   - Rollback: disable transform and resume original topics.\\n2) Create mirrored Kafka topic for MetricLens\\n   - Owner: Noah Becker\\n   - Tasks: mirror original pre-processed stream to a dedicated topic and configure SI-KAFKA-SINK to push to MetricLens ingest path.\\n3) Schema Signoff Workshop\\n   - Owner: Carlos Mendes\\n   - Attendees: Sophie Tremblay, Marc Gauthier, Ellen Park, Platform engineers, Northstar SE/Ing teams\\n   - Agenda: agree canonical schema for payment/register_events/sensor_thermo; define alias mapping and producer migration plan.\\n   - Deliverable: Signed schema doc uploaded to SI-SCHEMA-REG and change control ticket with producer migration milestones.\\n4) mTLS Certificate Enrollment\\n   - Owner: Hector Alvarez\\n   - Tasks: provide CA enrollment steps, issue per-collector certs for Quebec, test rotation with 10 pilot stores.\\n   - ETA: start 2026-03-23, complete ~2026-04-06.\\n5) Acceptance Test Plan for Orchestrator Playbooks\\n   - Owner: Jin Park + Sophie Tremblay\\n   - Tasks: run remediation playbook tests against 10 stores, verify EN-CORRELATOR grouping and OR-AUDIT-LOGS traces.\\n   - Success Criteria: playbooks execute end-to-end <3 minutes, no false triggers for unrelated events.\\n\\nRisks and Mitigations:\\n- Risk: Temporary transform masks root producer issues. Mitigation: record _ns_transform events and include in workshop to schedule producer fixes within 8 weeks.\\n- Risk: Mirror topic lag or duplication. Mitigation: configure TTL on mirror, idempotent producer settings, and monitor throughput.\\n- Risk: Compliance concern with transforms. Mitigation: enable OR-AUDIT-LOGS and provide exportable evidence package via SIQ-EVIDENCE-EXPORT for audits.\\n\\nNext Steps & Timeline:\\n- 2026-03-19: Publish tech approval doc (Carlos) — due EOD.\\n- 2026-03-21: Deploy transform + mirrored topic (Jin/Noah). Olivia to monitor SI-SCHEMA-REG.\\n- 2026-03-23: Schema signoff workshop (90 minutes). Deliver signed schema.\\n- 2026-03-23 to 2026-04-06: mTLS cert enrollment and pilot tests.\\n\\nContact Roster (Northstar):\\n- Carlos Mendes (CSM) — carlos.mendes@northstarsignal.example — overall owner\\n- Jin Park (Solutions Eng) — jin.park@northstarsignal.example — transform implementation\\n- Noah Becker (Sales Eng) — noah.becker@northstarsignal.example — Kafka mirror + SI-KAFKA-SINK\\n- Hector Alvarez (Security) — hector.alvarez@northstarsignal.example — cert enrollment + audit\\n- Olivia Grant (Support) — olivia.grant@northstarsignal.example — monitoring during deploy\\n\\nDocument Version: v1.0 (project reset). Please append comments with approvals or concerns. Signed: Carlos Mendes, 2026-03-19 09:00 PT\"}]"}],"suite":"canonical_sample"},{"id":"gold_sample_04","question":"What SCIM fields were conflicting at Aureum, and what fast fix did Jin propose so we don't have to wait on Okta change control?","answer":"The conflicting SCIM fields at Aureum were **`department` vs `businessUnit`** — Merchant Services used `businessUnit=merchant` while Payments Ops used `department=payments`, and Northstar's ingestion wasn't collapsing them into one canonical attribute, so the Rules Engine failed to match on the routing tag. Jin Park's fast fix: add a **hot-reloadable preprocessing rule in Signal Ingest (SI-ETL-FILTER)** to map `businessUnit → department` (publishing a normalized canonical field), a config-only change requiring no Okta change control (which would've taken 2–4 weeks).","expected":"Aureum was sending both department and businessUnit variants. Jin's fast fix was a hot-reloadable Signal Ingest preprocessing rule to normalize those attributes into one canonical field, plus SCIM tracing so the team can see where approval latency is happening.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0.8,"precision":0.8,"mrr":0.5,"perEntity":{"customers":{"found":0,"gold":1,"recall":0,"precision":0},"artifacts":{"found":4,"gold":4,"recall":1,"precision":0.8}}},"expectedIds":{"customers":["cus_413dd8966d80"],"artifacts":["art_50bd0ea1c439","art_545110f843dc","art_e60697c15fce","art_79f625aafa16"]},"predicted":{"artifacts":["art_50bd0ea1c439","art_79f625aafa16","art_545110f843dc","art_e60697c15fce","art_fb836b38496a"]},"toolCallCount":1,"toolCalls":[{"name":"run_sql","input":"{\"sql\":\"SELECT rowid, * FROM artifacts_fts WHERE artifacts_fts MATCH 'SCIM AND Aureum' LIMIT 10;\"}","output":"[{\"rowid\":56,\"artifact_id\":\"art_50bd0ea1c439\",\"title\":\"Support ticket: Aureum reports role provisioning lag (30-120m) after org restructure; approvals split across Payments Ops, Merchant Services, and Fraud leading to queued state transitions. Observability gaps in SCIM event flow prevent clear handoff visibility.\",\"summary\":\"Aureum reports role provisioning lag (30-120m) after org restructure; approvals split across Payments Ops, Merchant Services, and Fraud leading to queued state transitions. Observability gaps in SCIM event flow prevent clear handoff visibility.\",\"content_text\":\"Customer: provisioning lag started 2026-03-02 post restructure. Okta emits SCIM with department=’Payments Ops’ vs businessUnit=’payments’ in Merchant tenant. Approvals route to different Jira projects; several events stalled waiting for human approval. Northstar to instrument SCIM pipeline trace, provide mapping recommendations, and propose a staged roll-forward for approval consolidation. Customer request: technical validation call and evidence pack for board by 2026-04-02.\"},{\"rowid\":57,\"artifact_id\":\"art_79f625aafa16\",\"title\":\"Technical Validation call with Aureum Payments Pty Ltd\",\"summary\":\"Technical validation between Aureum platform/identity leads and Northstar Signal (Solutions Engineer + Customer Success) to reproduce provisioning lag, share tracing data, agree on next remediation steps: (1) deploy SCIM trace probes in Signal Ingest, (2) canonical mapping table for SCIM attributes, (3) short-term runbook to auto-clear stuck events via Orchestrator worker. Customer asked for evidence bundle for board by 2026-04-02.\",\"content_text\":\"Sanjay (Aureum Head of Platform): Okay, thanks everyone. To be clear — this started after we reorganised teams on March 1st and by March 2nd we started seeing delay spikes. We're seeing 30 to 120 minute waits between Okta push and role activation in downstream services.\\nJin Park (Northstar SE): Thanks Sanjay. We reviewed the sample trace you sent yesterday. At a glance there are SCIM payload variants. Some include \\\"department\\\" and others include \\\"businessUnit\\\"; our ingestion normalization isn't collapsing those into a single canonical attribute in your tenant config. That can cause the Rules Engine to fail matching on the entity tag used to route approvals.\\nTess (Aureum Dir, Identity): That checks out. Merchant Services uses businessUnit=merchant while Payments Ops used department=payments. We didn't know both fields were being used. How fast a change can we make without touching Okta flows?\\nJin: Two approaches. Fast: add a preprocessing rule in Signal Ingest to map businessUnit -> department (or vice versa) and publish a normalized field for the correlator. That is a config-only change and can be hot-reloaded, low risk. Longer: standardize at the identity source (Okta) but that needs change control and may take 2–4 weeks.\\nSanjay: We'll need the hot-fix. But my concern: approvals. Events are queued waiting for human approvals in three different Jira projects. Even if we normalize attributes, approvals could still hold events. Any way to see which approval path is the slow one?\\nJin: Yes — if we enable the SCIM pipeline trace (SI-ETL-FILTER + SI-SCHEMA-REG tracking headers) we'll get event-by-event routing metadata into Signal Insights and can surface median times per approval queue. We can also instrument event augmentations that record which Jira project the approval task was created in.\\nTess: Will that require an appliance restart? We are private-cloud and sensitive to restarts in settlement windows.\\nDaniel Kim (Aureum Eng Manager - Ingest): We can't restart any appliances during settlement windows; we need rolling, zero-downtime updates.\\nJin: The preprocessing rule is hot-reloadable; the SCIM tracing uses the Local Disk Buffering (SI-LOCAL-BUFFER) to stamp tracing headers and emit to a dedicated topic. That requires config push to the collector and restarting the collector process only on non-settlement nodes — we can target the worker pool to avoid peak times. No full appliance reboot.\\nSanjay: Ok good. What's the expected timeline for results once tracing is on?\\nJin: We should see useful diagnostics within 24–48 hours. For remediation, we propose three steps: 1) deploy mapping rule (hot), 2) enable SCIM trace and create dashboard in Signal Insights for approval queue latency (SLA reporting widget), 3) author a short Orchestrator playbook to auto-resubmit or escalate events stuck >30 minutes. Steps 1–2 can be done in 48 hours; step 3 could take 3–5 business days to test in private cloud with safe rollback.\\nTess: The board wants a snapshot by April 2nd. Can you commit to having the SLA widget and an evidence bundle by then?\\nJin: Yes — Signal Insights SLA Reporting (SIQ-SLA-REPORT) can generate scheduled snapshots and the Compliance Evidence Export (SIQ-EVIDENCE-EXPORT) beta can package traces and runbook audit logs. We'll need runbook test logs to include in the bundle.\\nOliver (VP Payments Ops): If we auto-resubmit, are we risking double-provisioning? We can't have duplicate role grants.\\nJin: The Orchestrator playbook will use idempotent checks — it calls the identity API with a conditional create/check and uses Execution Audit Trail (OR-AUDIT-LOGS). We'll design safe rollback and prechecks (OR-SAFE-ROLLBACK) so duplicates are avoided.\\nSanjay: Pricing question — will the tracing and evidence export be extra charges? We need to know for approvals.\\nCarlos Mendes (Customer Success): For this remediation we'll cover mapping rules and temporary trace topics under existing contract—small additional usage for Event Nexus correlated incident volume may apply but we'll provide an estimate. Leah (VP Product) can follow up on commercial specifics.\\nTess: One more — ObservaGrid is still running some of our tracing. Any risk in running both? ObservaGrid claims deeper tracing but less orchestration.\\nJin: No technical conflict; we'll correlate events from ObservaGrid as an additional ingest path. The main gap is automation — ObservaGrid won't run our Orchestrator playbooks. Our plan integrates ObservaGrid traces into Signal Insights via SI-HTTP-PUSH or Kafka Sink to get a unified dashboard.\\nSanjay: Ok let's prioritise mapping + tracing. Action items please.\\nJin: Action items: 1) Northstar to push mapping rule and enable SCIM trace probe targeting non-peak nodes by 2026-03-20 EOD (AUS). 2) Aureum to provide list of Jira project keys and Okta app IDs by 2026-03-19 COB. 3) Northstar to deliver SLA dashboard draft by 2026-03-22. 4) Orchestrator playbook prototype by 2026-03-26 for dry run. 5) Evidence bundle draft for board by 2026-03-30; final by 2026-04-02.\\nSanjay: Good. Also include a risk note on certificate rotation windows.\\nJin: Noted. Any objections?\\nTess: Concern about auto-resubmit complexity; need to see playbook checklist before dry run.\\nJin: We'll share the checklist with Tess and Daniel 48 hours before dry run.\\nSanjay: Thanks team. End of call.\"},{\"rowid\":58,\"artifact_id\":\"art_545110f843dc\",\"title\":\"Slack thread: Aureum provisioning lag — mapping + tracing plan / board deliverable 2026-04-02\",\"summary\":\"Agreed to hot-reload SCIM mapping rule and enable SCIM tracing; dashboard and evidence bundle timeline approved. Decision to avoid appliance restarts during settlement window; target non-peak nodes for collector config push. Action owner assignments made.\",\"content_text\":\"Jin Park (Northstar SE) 03/18 04:10\\nPushing mapping rule + SCIM trace probe to Aureum non-peak nodes. ETA: config push by 2026-03-20 EOD (AUS). Will create SLA dashboard template in Signal Insights.\\n\\nSanjay Reddy (Aureum) 03/18 04:12\\nConfirmed — Aureum will deliver Jira keys + Okta app IDs by COB 2026-03-19. No restarts during settlement. Use worker affinity to avoid AZ-B nodes during settlement window.\\n\\nCarlos Mendes (CSM) 03/18 04:15\\nI'll own commercial estimate for Event Nexus extra usage; deliver by 2026-03-21.\\n\\nOlivia Grant (Support Lead) 03/18 04:19\\nI'll schedule the dry-run window for Orchestrator playbook with Aureum for 2026-03-26; need checklist 48h prior.\\n\\nLeah Park (VP Product) 03/18 04:21\\nDecision: proceed with hot mapping + tracing. Action: Northstar to provide evidence bundle draft 2026-03-30. Owner: Jin Park. Blocking: Aureum Jira/Okta data.\\n\\nAction Items:\\n- Northstar: mapping rule + SCIM trace probe -> 2026-03-20 EOD (Jin)\\n- Aureum: Jira project keys + Okta app IDs -> 2026-03-19 COB (Sanjay)\\n- Northstar: SLA dashboard draft -> 2026-03-22 (Jin)\\n- Northstar: Orchestrator playbook prototype -> 2026-03-26 (Olivia/Jin)\\n- Northstar: evidence draft -> 2026-03-30 (Leah/Carlos)\\n\\nDecision: Do not restart appliances during settlement window; use rolling collector restart. (DECIDED by @leah.park)\"},{\"rowid\":59,\"artifact_id\":\"art_e60697c15fce\",\"title\":\"Aureum Payments — Escalation Recovery Plan: SCIM Mapping, Tracing, and Safe Auto-Remediate Playbook\",\"summary\":\"Recommended technical plan to resolve role-provisioning lag at Aureum Payments. Focus on immediate observability (hot mapping + SCIM tracing), a short-term safe remediation playbook via Orchestrator, and an evidence bundle for board review. Timeline aligns to board deliverable on 2026-04-02.\",\"content_text\":\"Problem statement\\n- After a March 1st org restructure, Aureum observed role provisioning lag ranging 30–120 minutes. Root cause analysis points to inconsistent SCIM attributes (department vs businessUnit) and approval routing spread across multiple Jira projects.\\n\\nGoal\\n- Restore median provisioning time to <=15 minutes and provide deterministic SLA reporting for board by 2026-04-02.\\n\\nProposed actions (priority order)\\n1) Hot mapping rule (Signal Ingest)\\n   - Implement SI-ETL-FILTER mapping to normalize SCIM attributes into a single canonical field (e.g., identity.canonical_business_unit).\\n   - Hot-reloadable; no appliance restart required for collector on targeted nodes.\\n   - Estimated effort: 2 hours dev + 1 hour validation.\\n\\n2) SCIM pipeline tracing\\n   - Enable tracing headers at Signal Ingest and publish tracing events to a dedicated topic (uses SI-LOCAL-BUFFER and SI-KAFKA-SINK if Aureum prefers Kafka).\\n   - Create Signal Insights dashboard (SIQ-SLA-REPORT widget) showing median time from Okta push -> approval creation -> approval completion -> downstream role activation.\\n   - Estimated effort: 1 day to enable + 1 day to build dashboard.\\n\\n3) Safe auto-remediate Orchestrator playbook\\n   - Playbook must be idempotent: check role existence via identity API before resubmit; include OR-SAFE-ROLLBACK prechecks.\\n   - Execution Audit Trail (OR-AUDIT-LOGS) to capture who/what triggered remediation for the evidence bundle.\\n   - Test plan: dry-run in staging, then scheduled dry-run in production window with manual approval.\\n   - Estimated effort: 3–5 business days including tests.\\n\\n4) Evidence & reporting\\n   - Use SIQ-EVIDENCE-EXPORT to collect traces, incidents, and Orchestrator audit logs. Produce signed bundle for board.\\n   - Draft due 2026-03-30; final by 2026-04-02.\\n\\nRisks & mitigations\\n- Approval fragmentation: mitigate by surfacing per-Jira-project latencies and recommending consolidation as a business change (not technical). Short term: escalation policies to route stalled events to an on-call queue after X minutes.\\n- Certificate rotation impact: schedule config pushes outside rotation windows; coordinate with Aureum security (Maya Johnson on Northstar side) for any mTLS adjustments.\\n- Commercial: Event Nexus correlated incident volume may increase during tracing ramp; Finance to provide estimate.\\n\\nDecision requested\\n- Approve hot mapping + tracing immediate work and greenlight Orchestrator playbook prototype. Approve allocation of a small temporary Event Nexus evaluation allowance to instrument traces.\\n\\nAppendix\\n- Timeline (key milestones): mapping + trace enabled 2026-03-20; SLA dashboard draft 2026-03-22; playbook prototype 2026-03-26; evidence draft 2026-03-30; final evidence 2026-04-02.\\n- Contacts: Jin Park (SE), Carlos Mendes (CSM), Olivia Grant (Support), Ben Gallagher (RevOps owner of memo).\"},{\"rowid\":60,\"artifact_id\":\"art_fb836b38496a\",\"title\":\"Competitor report: ObservaGrid\",\"summary\":\"ObservaGrid is the incumbent at Aureum for deeper tracing and APM. ObservaGrid offers superior distributed tracing and performance diagnostics but lacks orchestration-first automation and integrated compliance evidence exports. Northstar's Signal Insights + Event Nexus combination addresses Aureum's immediate need to instrument SCIM flows and apply automated remediation with auditable runbooks — a differentiated operational outcome for identity lifecycle problems.\",\"content_text\":\"Context\\n- Customer: Aureum Payments (enterprise payments processor, ANZ).\\n- Primary issue: role provisioning lag after org restructure; problem spans SCIM mapping inconsistencies and approval chain fragmentation.\\n\\nObservaGrid (cmp_233938499802)\\n- Strengths relevant to Aureum:\\n  - Deep distributed tracing and APM; good at code-path-level latency analysis.\\n  - Rich performance diagnostics for microservices and synthetic tracing.\\n- Weaknesses relevant to Aureum:\\n  - Less emphasis on automation orchestration and runbooks; no native idempotent remediation playbooks comparable to Northstar Orchestrator.\\n  - Weaker compliance evidence packaging; ObservaGrid integrates into SIEMs but doesn't produce signed evidence bundles with runbook audit trails.\\n  - Premium pricing at scale; shifting more observability into ObservaGrid risks higher cost.\\n\\nNorthstar Signal positioning vs ObservaGrid\\n- Signal Insights (prd_29a3d7cb61e9) + Event Nexus (prd_f8d861694bac) offer:\\n  - Rapid normalization and tracing of SCIM events via Signal Ingest (SI-ETL-FILTER + SI-SCHEMA-REG) and pipeline tracing features.\\n  - Correlation of approval queue latencies with Event Nexus correlator + suppression policies to reduce false escalations during remediation.\\n  - Orchestrator runbooks with execution audit trails (OR-AUDIT-LOGS) enabling safe auto-remediate flows and providing evidence for audits and board reviews (SIQ-EVIDENCE-EXPORT).\\n\\nTactical recommendation for Aureum\\n1) Use Northstar mapping + tracing to get immediate visibility; ingest ObservaGrid traces into Signal Insights to keep continuity in diagnostics.\\n2) Implement Orchestrator idempotent playbooks to remove queued events >30 minutes while preserving audit trail; reduce mean provisioning time quickly without requiring ObservaGrid rework.\\n3) Offer a time-limited usage allowance for Event Nexus correlated incident volume during the tracing ramp to remove commercial objections.\\n\\nRisks to call out\\n- If Aureum perceives ObservaGrid's tracing as superior in root-cause depth, they'll push to consolidate there. Counter with a plan to ingest ObservaGrid traces into Signal Insights and show end-to-end remediation time improvements.\\n- Premium pricing objection: prepare clear usage estimate for Event Nexus and emphasize value of reduced escalations and board-grade evidence exports.\\n\\nDifferentiators to highlight in customer conversations\\n- Integrated automation + evidence export (unique combination for identity lifecycle issues).\\n- Hot-reloadable ingestion rules enabling low-risk immediate fixes without Okta changes.\\n- Idempotent playbooks with rollback and audit trail for regulated environments.\"}]"}],"suite":"canonical_sample"},{"id":"gold_sample_05","question":"Which customer looks most likely to defect to a cheaper tactical competitor if we miss the next promised milestone, and what exactly is that milestone?","answer":"**BlueHarbor Logistics** is the standout — an at-risk, $780K renewal-review account where NoiseGuard (low-mid, tactical noise-reduction) is the named threat, and the customer explicitly tied renewal to a hard deadline.\n\nThe milestone: deliver a **proof-of-fix for Event Nexus search relevance — top-5 correct hit rate ≥80% on the ~20 prioritized saved searches (via the taxonomy index re-weighting + query mapping layer) — within the executive's ~10-business-day window** (A/B starting ~2026-03-22). If that measurable relevance improvement slips, VP Ops Sofia Martinez signaled they'll question the renewal, and NoiseGuard is positioned as the cheaper tactical fallback.\n\n(NorrLog Freight and Svenska PolyChem are similar risks vs. the cheaper EdgeCollector Co., but their competitor pressure is at the collector layer rather than a renewal-gating milestone like BlueHarbor's.)","expected":"BlueHarbor Logistics. It is the clearest cheaper tactical competitor risk because NoiseGuard is explicitly framed as a low-cost, tactical dedupe layer that can buy time if Northstar misses. The next promised milestone is the 7-10 business day proof-of-fix for search relevance: BlueHarbor sends schema export and 14 days of query logs by 2026-03-19, Northstar starts the A/B test on 2026-03-22, and success means top-5 correct hit rate of at least 80 percent for the top 20 saved searches with no suppression regression.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":0.7142857142857143,"precision":0.033783783783783786,"mrr":0.18888888888888888,"perEntity":{"customers":{"found":1,"gold":1,"recall":1,"precision":0.02},"competitors":{"found":1,"gold":1,"recall":1,"precision":0.125},"artifacts":{"found":3,"gold":5,"recall":0.6,"precision":0.08571428571428572},"scenarios":{"found":0,"gold":0,"recall":0,"precision":0},"implementations":{"found":0,"gold":0,"recall":0,"precision":0},"products":{"found":0,"gold":0,"recall":0,"precision":0}}},"expectedIds":{"customers":["cus_10762173c26d"],"competitors":["cmp_88dc528f7db7"],"artifacts":["art_c9970c1dc932","art_0bccc580184e","art_bd3560dfe194","art_8b0063fbb3cb","art_3e9031389474"]},"predicted":{"customers":["cus_f79f21403ec4","cus_c44f952abde6","cus_92bc8f749347","cus_4ccee8936f0c","cus_10762173c26d","cus_132325786388","cus_f410db93383a","cus_cf83c453e08c","cus_70abe320fe35","cus_b430f59e0caf","cus_2e9db31d7902","cus_413dd8966d80","cus_95ba616f39b7","cus_409b142bc439","cus_6a81c89143a3","cus_dda0081884eb","cus_24d45026f273","cus_8ac7338d1b68","cus_3947ca8f01f5","cus_4637d32c1def","cus_bd59d0368d39","cus_03024c35baa8","cus_c31fbf7dd7e7","cus_cf752f66a5c3","cus_37e1826806c9","cus_f662b40a432a","cus_8ab143fe5705","cus_1df01c3ac48e","cus_ce2defcf5292","cus_e1ae80e00362","cus_c9295aba1003","cus_ee4ccc28e9c7","cus_2a8c1063d782","cus_77aa5a39cb6d","cus_c017e831b967","cus_4a3287c05574","cus_92ab48a64476" \":\"cmp_3c1aa248d11c\",\"name\":\"EdgeCollector Co.\",\"segment\":\"Adjacent - Edge Collection\",\"pricing_position\":\"Low-mid\"},{\"competitor_id\":\"cmp_be550ede2596\",\"name\":\"MetricLens\",\"segment\":\"Indirect - Analytics & Dashboards\",\"pricing_position\":\"Mid-range\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT artifact_id, customer_id, artifact_type, title FROM artifacts LIMIT 5\"}","output":"[{\"artifact_id\":\"art_229ec90559fb\",\"customer_id\":\"cus_f79f21403ec4\",\"artifact_type\":\"support_ticket\",\"title\":\"Support ticket: Multiple schema compatibility failures when onboarding Quebec POS streams into Signal Ingest; duplicate fields (transaction_id vs txn_id) and conflicting timestamp sources break EN-CORRELATOR grouping rules.\"},{\"artifact_id\":\"art_d1d599719fb2\",\"customer_id\":\"cus_f79f21403ec4\",\"artifact_type\":\"customer_call\",\"title\":\"Quarterly Business Review call with MapleHarvest Grocers\"},{\"artifact_id\":\"art_6c5bb3a4b89f\",\"customer_id\":\"cus_f79f21403ec4\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: MapleHarvest Quebec pilot — schema transform + MetricLens mirror\"},{\"artifact_id\":\"art_5a91258f4056\",\"customer_id\":\"cus_f79f21403ec4\",\"artifact_type\":\"internal_document\",\"title\":\"MapleHarvest Quebec Pilot — Project Reset & Mitigation Plan\"},{\"artifact_id\":\"art_d907a0a1032a\",\"customer_id\":\"cus_f79f21403ec4\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: MetricLens\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT name FROM pragma_table_info('artifacts')\"}","output":"[{\"name\":\"artifact_id\"},{\"name\":\"scenario_id\"},{\"name\":\"customer_id\"},{\"name\":\"product_id\"},{\"name\":\"competitor_id\"},{\"name\":\"artifact_type\"},{\"name\":\"title\"},{\"name\":\"created_at\"},{\"name\":\"summary\"},{\"name\":\"content_text\"},{\"name\":\"token_estimate\"},{\"name\":\"content_fingerprint\"},{\"name\":\"metadata_json\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT a.artifact_id, a.customer_id, c.name AS customer, c.account_health, a.artifact_type, a.title, substr(a.content_text,1,900) AS snippet\\nFROM artifacts_fts f JOIN artifacts a ON a.rowid=f.rowid JOIN customers c ON c.customer_id=a.customer_id\\nWHERE artifacts_fts MATCH 'NoiseGuard OR BeaconOps OR EdgeCollector OR cheaper OR \\\"walk away\\\" OR defect OR \\\"switch to\\\"'\\nLIMIT 30\"}","output":"[{\"artifact_id\":\"art_0bccc580184e\",\"customer_id\":\"cus_10762173c26d\",\"customer\":\"BlueHarbor Logistics\",\"account_health\":\"at risk\",\"artifact_type\":\"customer_call\",\"title\":\"Renewal Negotiation call with BlueHarbor Logistics\",\"snippet\":\"Liam O'Connor (Northstar Sales): Hi Sofia, thanks for making time. Quick agenda: diagnose impact, present short/medium fixes, and discuss renewal terms tied to delivery. You're on a tight exec clock, I know.\\nSofia Martinez (BlueHarbor VP Ops): Yep. Exec mandate is real — reduce manual triage by 40% in 6 months. Search relevance tanked after our taxonomy push on Feb 20. Our triage team is spending ~6 hours/day on manual sorting. We need to see measurable improvement within four weeks or I get asked why we're spending on platform renewals.\\nEvan Cho (Director SRE): To add, saved searches now surface old host tags and mix endpoints with batch jobs. We looked at schema registry entries and it looks like the field weighting that EN uses didn't get updated; some fields are now high-cardinality and pollute results.\\nJin Park (Northstar Solutions Engineer): Thanks Evan — that maps to what we've se\"},{\"artifact_id\":\"art_bd3560dfe194\",\"customer_id\":\"cus_10762173c26d\",\"customer\":\"BlueHarbor Logistics\",\"account_health\":\"at risk\",\"artifact_type\":\"internal_document\",\"title\":\"Retro: BlueHarbor taxonomy rollout -> Event Nexus search relevance degradation\",\"snippet\":\"Context\\n- Customer: BlueHarbor Logistics (Large Enterprise, ~8k employees), taxonomy change rolled 2026-02-20 by VP Ops. Trigger: executive mandate to reduce manual work by 40%.\\n- Impact: Saved searches returned low-relevance hits and duplicates; triage increased to ~6 hours/day for Incident Ops.\\n- Products: Event Nexus (EN) for search/correlation; Orchestrator for runbooks.\\nRoot cause analysis\\n- Immediate: EN index weighting still references old schema fields (pre-taxonomy). SI-SCHEMA-REG versions diverged from EN mapping (fields renamed, some tag cardinality rose from ~10k to ~120k). Rules engine hot-mapping didn't receive updated compatibility mapping.\\n- Contributing: No automated backward-compatibility check in CI for schema-to-index weighting. No pre-rollout dry-run of sample queries against staging mapping.\\nShort-term mitigation (Proof-of-Fix plan)\\n- Scope: Update index weighting a\"},{\"artifact_id\":\"art_c9970c1dc932\",\"customer_id\":\"cus_10762173c26d\",\"customer\":\"BlueHarbor Logistics\",\"account_health\":\"at risk\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: NoiseGuard\",\"snippet\":\"Background\\n- NoiseGuard positioning: tactical alert deduplication and suppression; easy to deploy; low-mid pricing.\\nObserved strengths (NoiseGuard)\\n- Fast deployment; can be operational in hours for basic suppression rules.\\n- Simple UI and low ops overhead for basic dedupe use cases.\\nObserved weaknesses (NoiseGuard)\\n- Not schema-aware: does not reconcile taxonomy mismatches or re-weight search indexes.\\n- Limited automation: minimal runbook/orchestration features compared to Orchestrator.\\n- Integration surface smaller: may require custom plumbing to feed dedupe decisions back into EN or downstream ticketing.\\nComparison to Northstar Event Nexus + Orchestrator\\n- Event Nexus: provides index/query control, entity graph, and rules engine integration (EN-RULES-ENGINE) — capable of addressing semantics and relevance with mapping and reindexing.\\n- Orchestrator: gives chatops and runbook automatio\"},{\"artifact_id\":\"art_fcba81a726f5\",\"customer_id\":\"cus_f410db93383a\",\"customer\":\"FrostGrid Energi AB\",\"account_health\":\"recovering\",\"artifact_type\":\"support_ticket\",\"title\":\"Support ticket: Executive dashboards showing hourly snapshots are delayed (currently averaging 18 minutes post-hour). Investigation shows bursts of duplicate records and repeated enrichment attempts during retail peak (05:00-07:00 CET) following pilot expansion to second business unit.\",\"snippet\":\"Customer reports executive dashboards lagging. Logs show enrichment worker CPU spikes at hour boundaries and repeated job submissions for same hour window. Likely duplicate ingestion from EdgeCollector Co. appliance plus new SI-AGENT-1 instances. Recommend dedupe at ingest (SI-ETL-FILTER) and tune enrichment concurrency; disable redundant EdgeCollector output for sites migrated.\"},{\"artifact_id\":\"art_ccf5fa253d75\",\"customer_id\":\"cus_f410db93383a\",\"customer\":\"FrostGrid Energi AB\",\"account_health\":\"recovering\",\"artifact_type\":\"customer_call\",\"title\":\"Technical Validation call with FrostGrid Energi AB\",\"snippet\":\"Jin Park (Solutions Engineer, Northstar): Hi Erik — thanks for making time. Quick agenda: confirm ingestion topology, reproduce the enrichment bottleneck evidence, and validate the hybrid agent + cloud-router approach. Can you confirm which substations started shipping to us after the expansion? \\n\\nErik Löfström (Head of Platform): Hi Jin. We expanded on 2026-03-01 to the commercial retail BU. That put ~120 new devices across 18 retail-edge sites into the pipeline. We left the EdgeCollector appliance in place for 28 substations and added new agents to 12. After that the hourly dashboards started slipping. \\n\\nJin: OK — that matches the ingestion volume spike we saw. Sara, do you have the timeline for when the hourly job starts and the observed delay? \\n\\nSara Berg (BI Lead): Hourly snapshot job runs at HH:00 and aggregates the last hour. Previously the job finished and dashboards updated with\"},{\"artifact_id\":\"art_e50d76c5b3e9\",\"customer_id\":\"cus_f410db93383a\",\"customer\":\"FrostGrid Energi AB\",\"account_health\":\"recovering\",\"artifact_type\":\"internal_document\",\"title\":\"Design Review: FrostGrid Hybrid Ingest & Dedupe Plan\",\"snippet\":\"1) Background\\n- Pilot expansion into retail BU (2026-03-01) created ~120 new devices across 18 retail-edge sites. Duplicate flows observed where EdgeCollector Co. appliances and SI-AGENT-1 both forward overlapping events, causing enrichment reprocessing and hourly dashboard delays (median 18m).\\n\\n2) Root cause hypothesis\\n- Duplicate ingestion + enrichment worker concurrency limits. EdgeCollector sends buffered backfill bursts at hour boundaries; SI-AGENT-1 also sends local backfills. Enrichment engine treats duplicates as new events and triggers re-enrichment and downstream re-ingestion.\\n\\n3) Proposed staged mitigation\\n- Stage 0 (Immediate, <72h): Deploy SI-ETL-FILTER dedupe rule in staging tenant. Rule signature: dedupe_key = sha256(source_id || event_ts || payload_schema_hash). TTL window = 5 minutes. Metric to track: duplicate_count_per_minute.\\n- Stage 1 (Short term, 3–7 days): Manual c\"},{\"artifact_id\":\"art_8e8c5e2be8ee\",\"customer_id\":\"cus_f410db93383a\",\"customer\":\"FrostGrid Energi AB\",\"account_health\":\"recovering\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: EdgeCollector Co.\",\"snippet\":\"Context\\n- Customer: FrostGrid Energi AB. Problem: post-expansion reporting latency due to duplicate ingestion and enrichment spikes.\\n\\nEdgeCollector Co. (cmp_3c1aa248d11c) — Key traits\\n- Strengths: Robust offline buffering; tiny agent/appliance footprint; well-suited for constrained networks (remote substations). Low-mid pricing makes it attractive for large numbers of small sites.\\n- Weaknesses: Minimal downstream processing; lacks an inbuilt dedupe/enrichment pipeline; no native orchestration or runbook capabilities. Appliances can batch-forward large backfills at hour boundaries causing downstream overload.\\n\\nImplications for sales/engineering\\n- Competitive risk: EdgeCollector is low friction to keep in place; customer reluctant to perform full appliance replacement across 40+ sites. That means Northstar must plan for hybrid coexistence and demonstrate value without requiring immediate w\"},{\"artifact_id\":\"art_4f1200ae5a1f\",\"customer_id\":\"cus_70abe320fe35\",\"customer\":\"LedgerPeak Software\",\"account_health\":\"expanding\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: BeaconOps\",\"snippet\":\"Context\\n- Primary competitor: BeaconOps (cmp_15f3d499e5c7). LedgerPeak evaluated BeaconOps earlier for incident automation and liked the playbook marketplace.\\n\\nObserved BeaconOps strengths\\n- Fast agent onboarding: BeaconOps can get agents running quickly across dev and prod clusters, which appeals to acquisitive customers wanting speed.\\n- Large playbook library: Many pre-built remediation playbooks reduce time-to-value for teams with common automation needs.\\n\\nObserved BeaconOps weaknesses (relevant to current LedgerPeak issue)\\n- Limited retention controls: BeaconOps provides shorter default retention and fewer fine-grained retention policies. LedgerPeak needs evidence for audits related to the ChargeCore acquisition; they require per-tenant retention windows and legal-hold support offered by Northstar's EN-RETENTION-POLICY and SIQ-EVIDENCE-EXPORT.\\n- Less emphasis on compliance exports: B\"},{\"artifact_id\":\"art_4dd3f81e5e57\",\"customer_id\":\"cus_95ba616f39b7\",\"customer\":\"HelioFab Systems\",\"account_health\":\"watch list\",\"artifact_type\":\"customer_call\",\"title\":\"Executive Escalation call with HelioFab Systems\",\"snippet\":\"Rajesh Patel (HelioFab): Thanks everyone for joining. We're seeing the automation drop off — playbooks not matching incidents and manual triage spiking. This came right after our taxonomy change. We have executives asking for progress. What's the status?\\nCarlos Mendes (Customer Success, Northstar): Hi Rajesh — Carlos here. We validated the taxonomy change timeline with Marta. Our logs show a schema v2 published on 2026-03-10 and Event Nexus queries started returning low-scoring hits from 03-11 onward. Olivia and Daniel have root-cause notes.\\nMarta Ruiz (HelioFab): To confirm — we merged the new asset_type and fault_code fields, and we removed several legacy tags. That was the executive-mandated push to reduce manual tagging.\\nOlivia Grant (Technical Support Lead, Northstar): We ran a quick diagnostic. The schema registry shows v2, but the index weight table used by the correlator still re\"},{\"artifact_id\":\"art_3fbda14b69dd\",\"customer_id\":\"cus_95ba616f39b7\",\"customer\":\"HelioFab Systems\",\"account_health\":\"watch list\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: HelioFab search relevance after taxonomy v2 — triage and mitigation\",\"snippet\":\"olivia.grant: opened ticket HFB-1421 for schema mismatch. logs show index-weight mismatch.\\nnoah.becker: alias plan — create aliases: asset_category -> asset_type, error_code -> fault_code; low risk. I'll schedule.\\ndaniel.kim: will prepare cache invalidation patch (target 48h). Need windows for tenant-level ops.\\nisabella.rossi: need sample CV set from customer (min 100k events) for recalibration.\\ncarlos.mendes: coordinate with customer for change board times; Rajesh expects exec update Friday.\\nleah.park: include short note about NoiseGuard limitations; customer asked about competitor capabilities.\\nDecision: implement aliases + suppression tweak immediately (owner: Noah). Cache hotfix next (owner: Daniel). Reindex scheduled 2026-03-23 (owner: Isabella).\\nAction Items:\\n- create_aliases: owner=noah.becker@northstarsignal.example due=2026-03-19T20:00:00Z\\n- suppression_tweak: owner=olivia.grant\"},{\"artifact_id\":\"art_e2727db588de\",\"customer_id\":\"cus_95ba616f39b7\",\"customer\":\"HelioFab Systems\",\"account_health\":\"watch list\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: NoiseGuard\",\"snippet\":\"Context\\n- Customer problem: relevance degradation after taxonomy refactor; automated suppression and playbook triggers failing.\\n- Competitor: NoiseGuard (cmp_88dc528f7db7) — positioned as low-mid pricing, tactical noise reduction.\\n\\nNoiseGuard: capabilities relevant to this case\\n- Strengths:\\n  - Fast, easy deployment for simple dedupe and suppression rules.\\n  - Low operational overhead and quick time-to-value for tactical noise reduction.\\n- Weaknesses vs HelioFab needs:\\n  - No schema registry awareness; does not maintain versioned weight manifests or field aliasing.\\n  - Lacks entity graph / cross-entity correlation, so root-cause grouping across heterogeneous factory assets is weak.\\n  - Limited automation/runbook integrations compared to Orchestrator/Integration Hub.\\n\\nEvent Nexus (Northstar)\\n- Strengths:\\n  - Temporal Correlator + Entity Graph (EN-ENTITY-GRAPH beta) supports richer groupin\"},{\"artifact_id\":\"art_769fb1a3b020\",\"customer_id\":\"cus_409b142bc439\",\"customer\":\"NordGrid Services AB\",\"account_health\":\"recovering\",\"artifact_type\":\"internal_document\",\"title\":\"NordGrid Services AB — Service Review & Remediation Plan\",\"snippet\":\"1) Background\\n- Customer: NordGrid Services AB (SE), enterprise grid services operator. Production ingestion ~= 2.4 TB/day; pilot was ~200 GB/day.\\n- Trigger: Renewal negotiation with procurement pressure (Procurement requires measurable alert noise reduction or switch to Patchway).\\n- Issue: High alert duplication across event streams causing 18 pager floods in 48h (support ticket opened 2026-03-17).\\n\\n2) Root cause\\n- Thresholds and dedupe keys were not updated after scale-up. Dedupe key used low-cardinality fields from pilot; at production cardinality identical logical events appear as unique.\\n- Kafka lag spikes during maintenance windows created bursty retries increasing duplicates.\\n- Patchway receives pre-dedupe webhooks and may execute runbooks in parallel — leads to duplicate actions.\\n\\n3) Immediate remediation (0-72h)\\n- Deploy suppression + correlator config to staging (owner: daniel.\"},{\"artifact_id\":\"art_35148df5b41b\",\"customer_id\":\"cus_6a81c89143a3\",\"customer\":\"NorrLog Freight AB\",\"account_health\":\"at risk\",\"artifact_type\":\"customer_call\",\"title\":\"Renewal Negotiation call with NorrLog Freight AB\",\"snippet\":\"Carlos Mendes (CSM): Hi everyone — thanks for joining. Henrik, Elsa, Karl — appreciate you making time. Quick round: what is the current impact on exec reporting?\\nHenrik Svensson (Head Platform): Thanks. It's pretty direct — our scheduled hourly dashboards are coming in 30–45 minutes late. Execs noticed last Friday and they're asking why. The problem got worse after we turned on the contract-logistics BU on Feb 15.\\nElsa Berg (BI Lead): Right — the dashboard snapshot job (top-12 widgets) times out sometimes or returns partial. It's reproducible on the 00:00 and 04:00 runs when batch volumes peak.\\nCarlos: Understood. Jin, Daniel — can you walk through what you see server-side?\\nDaniel Kim (Eng Mgr - Ingest): Sure. We traced it to the enrichment stage that's part of Signal Ingest's preprocessing rules. For NorrLog the enrichment does an external ERP lookup and entity mapping. The work used t\"},{\"artifact_id\":\"art_a516a7b0deb6\",\"customer_id\":\"cus_6a81c89143a3\",\"customer\":\"NorrLog Freight AB\",\"account_health\":\"at risk\",\"artifact_type\":\"internal_document\",\"title\":\"Design Review: Mitigations for Enrichment Bottleneck & Reprocessing (NorrLog Freight AB)\",\"snippet\":\"Context\\n- Customer: NorrLog Freight AB (pilot expanded to second BU on 2026-02-15)\\n- Symptoms: Hourly executive dashboard snapshots delayed 30–45 minutes; ingest.reprocess.count rose from ~0.6% to ~18%.\\n- Root causes identified: (1) enrichment stage performs synchronous external ERP lookups for certain event types introduced by contract-logistics BU; (2) schema compatibility checks in Preprocessing Rules Engine (SI-ETL-FILTER + SI-SCHEMA-REG) mark events for reprocessing rather than forward-compat handling.\\n\\nProposed mitigation plan\\nShort-term (spike; 10 business days total, engineering spike window 2026-03-22 to 2026-04-02)\\n- Implement async enrichment pattern: convert synchronous lookup calls into batched async requests with local in-memory LRU cache on ingest workers + optional edge-agent read-through cache (SI-LOCAL-BUFFER modification). Estimate: 3 days to deploy config + 2 days val\"},{\"artifact_id\":\"art_b50b72e5837c\",\"customer_id\":\"cus_6a81c89143a3\",\"customer\":\"NorrLog Freight AB\",\"account_health\":\"at risk\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: EdgeCollector Co.\",\"snippet\":\"Scope\\n- Customer: NorrLog Freight AB (differentiators: hybrid deployment, ERP lookups in enrichment)\\n- Competitor: EdgeCollector Co. (cmp_3c1aa248d11c)\\n\\nEdgeCollector Co. — strengths relevant to procurement\\n- Low-mid pricing on collector seats (~30% lower per NorrLog's procurement note)\\n- Robust offline buffering and small footprint agents suited for remote depots\\n- Simple deployment model focused on collection layer\\n\\nEdgeCollector Co. — weaknesses vs Northstar Signal for this situation\\n- No built-in enrichment or deterministic inline enrichment behavior: they'd require a separate processing layer to implement ERP lookups and schema normalization.\\n- No schema registry (SI-SCHEMA-REG equivalent) — increases risk of reprocessing due to schema drift.\\n- Lacks orchestration and runbook integration (Orchestrator) which Northstar uses for audit trails and remediation actions.\\n\\nImplications for \"},{\"artifact_id\":\"art_bf47226fbfc2\",\"customer_id\":\"cus_dda0081884eb\",\"customer\":\"Southern Cross University Network\",\"account_health\":\"healthy\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: ComplianceStream\",\"snippet\":\"Context\\n- Customer pain: low adoption of automated exception routing after a high-severity escalation called out in a quarterly audit.\\n- Customer priority: signed evidence export + demonstrable reduction in manual overrides.\\n\\nComplianceStream profile (cmp_c3c2abb06ba1)\\n- Strengths relevant to SCU: audit packaging, SIEM connectors, and export-focused workflows. Likely has existing familiarity with compliance teams.\\n- Weaknesses relevant to SCU: not built for real-time correlation; no built-in remediation automation; limited transparency into why a classification was made.\\n\\nHow ComplianceStream sells to similar accounts\\n- Emphasizes evidence bundling and SIEM ingestion; pitches as 'compliance-first' adjunct to monitoring stacks. Typically paired with other tools for automation.\\n- Procurement angle: mid-range pricing, positioned as low-friction for audit teams.\\n\\nNorthstar positioning vs Com\"},{\"artifact_id\":\"art_9ae897b5abc3\",\"customer_id\":\"cus_24d45026f273\",\"customer\":\"Pioneer Grid Retail LLC\",\"account_health\":\"recovering\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: BeaconOps\",\"snippet\":\"Context\\n- Customer: Pioneer Grid Retail LLC — post-acquisition consolidation produced duplicate remediation runs. BeaconOps had been used in the acquired unit for playbooks.\\n\\nWhere BeaconOps shines\\n- Fast agent onboarding: they can get playbooks firing quickly, useful for small teams.\\n- Large playbook marketplace: good library for common ops tasks; low friction to adopt.\\n\\nBeaconOps gaps (relevant to this scenario)\\n- Limited retention controls: no per-tenant configurable retention and weaker audit export options — makes compliance evidence assembly harder for regulated billing processes.\\n- Less emphasis on ingest normalization: their product expects canonical idempotency from producers; limited preprocess hooks to synthesize dedupe keys at ingest time.\\n- Playbook triggering model: lightweight triggers without robust cross-incident fingerprinting. In practice, when producers are inconsiste\"},{\"artifact_id\":\"art_e46c06d1f817\",\"customer_id\":\"cus_bd59d0368d39\",\"customer\":\"Pacific Health Network\",\"account_health\":\"healthy\",\"artifact_type\":\"customer_call\",\"title\":\"Discovery call with Pacific Health Network\",\"snippet\":\"Jin Park (Solutions Engineer): hi everyone, thanks for joining — we've read the ticket and want to walk through what changed and next steps\\nPriya Menon (Head of SRE): thanks, jin. short version: after our taxonomy sweep on 2026-03-02 we renamed several metadata fields (facility->facility_id, site->facility_name, role->service_role) and added an enum for service_criticality. since then our search precision dropped and Event Nexus groupings are wrong — runbooks have triggered for the wrong on-call teams twice.\\nJin Park: okay. do you have an example query that now returns bad results?\\nRosa Delgado (Platform Eng Manager): yes — query 'facility_id:phx-* AND service_role:lab' used to return lab services in phoenix sites; now we get mixed results across sites. i pulled a couple of raw events: one event now stores 'svc_role' in metadata (producer change), schema registry shows v3.1 with aliases \"},{\"artifact_id\":\"art_545d172a6d99\",\"customer_id\":\"cus_bd59d0368d39\",\"customer\":\"Pacific Health Network\",\"account_health\":\"healthy\",\"artifact_type\":\"internal_document\",\"title\":\"PHN Taxonomy v3.1 Incident — Retro & Next Steps\",\"snippet\":\"Background:\\n- On 2026-03-02 Pacific Health Network (PHN) rolled taxonomy v3.1 which renamed and aliased several metadata fields (e.g., facility -> facility_id; site -> facility_name; service_role added). Producers began emitting mixed field names (svc_role, service_role) before compatibility enforcement.\\nRoot Cause:\\n- Index weighting and ranking configs referenced pre-v3 field names. Schema Registry (SI-SCHEMA-REG) showed v3.1 with aliases, but index mappings and ranking weights were not updated.\\n- Query templates and runbook triggers used exact field names; aliasing at query-time was incomplete.\\nImmediate Mitigations (completed/planned):\\n1) Hotfix query-mapping layer (PR ns/infra#412) to alias svc_role/service_role and facility_name->facility_id — reduces time-to-fix and avoids reindex immediately. (Owner: Jin Park; completed 2026-03-19)\\n2) ServiceNow suppression rules added (SR-8421) t\"},{\"artifact_id\":\"art_e8b3e74e23b8\",\"customer_id\":\"cus_bd59d0368d39\",\"customer\":\"Pacific Health Network\",\"account_health\":\"healthy\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: NoiseGuard\",\"snippet\":\"Context:\\n- Customer: Pacific Health Network experiencing search relevance degradation after taxonomy v3.1. NoiseGuard is present in their stack for suppression.\\nNoiseGuard assessment:\\n- Strengths: Easy deployment, quick tactical suppression rules, low operational overhead. Good for reducing duplicate alerts coming from noisy sources.\\n- Weaknesses (relevant to PHN):\\n  - No ranking/weight controls on event indexes — cannot adjust search precision tied to metadata renames.\\n  - Limited schema-awareness and no integrated schema registry; producers can change fields without NoiseGuard forcing compatibility.\\n  - Minimal automation/orchestration — cannot run dry-run replays or coordinate reindexing tasks.\\nHow Event Nexus + Orchestrator address the issue:\\n- Event Nexus (prd_f8d861694bac) exposes index weighting, schema registry integration (SI-SCHEMA-REG dependency for rules engine), and entity g\"},{\"artifact_id\":\"art_a029fae81edd\",\"customer_id\":\"cus_c31fbf7dd7e7\",\"customer\":\"Svenska PolyChem AB\",\"account_health\":\"watch list\",\"artifact_type\":\"customer_call\",\"title\":\"Executive Escalation call with Svenska PolyChem AB\",\"snippet\":\"Karin Eriksson (Head of Digital Ops): Hi everyone. Thanks for joining on short notice. To be blunt: the hourly executive dashboard yesterday took 10 minutes to render. Our CFO was furious. This is a top priority. We expanded to the Production Chemistry unit mid-February and the hourly job has doubled in size. We need a plan that delivers sub-90s within two weeks or we are forced to evaluate alternatives.\\n\\nCarlos Mendes (CSM, Northstar): Hi Karin — I’m sorry you had to see that. We did a triage and have engineering on call today. Daniel (Ingest EM) is here to walk through findings.\\n\\nDaniel Kim (Engineering Manager - Ingest): Quick summary from our side: after BU expansion event on 2026-02-15, ingest volume during the 01:00 UTC hourly window increased from ~120k events/hour to ~420k. Enrichment microservice CPU on the private-worker pool ramps to 95% and processing latency per event rises \"},{\"artifact_id\":\"art_f3968b1ad551\",\"customer_id\":\"cus_c31fbf7dd7e7\",\"customer\":\"Svenska PolyChem AB\",\"account_health\":\"watch list\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: Svenska PolyChem exec escalation — plan and decisions\",\"snippet\":\"ben.gallagher: Karin expects runbook by tomorrow 10:00 CET. Carlos to own delivery.\\n\\ncarlos.mendes: runbook draft attached (internal). Daniel/Isabella to validate staging tests; Marco to approve resource estimate.\\n\\ndaniel.kim: Fast-path stencil approach: create ingest preproc rule set 'svpoly_exec_fastpath' that strips non-essential enrichments and routes to high-priority worker queue. Requires toggling appliance replay policy flag 'per_record_ack=false' -> temporarily leave false. Implementation steps: update SI-ETL-FILTER template, update appliance config, deploy config via cloud router. ETA 48h.\\n\\nisabella.rossi: I built staging harness to replay 500k events in 20m; need two staging workers (2 vCPU each) to simulate. I'll run smoke test once fast-path deployed.\\n\\nomar.farouk: cost estimate for worker pool scale-out = €9,600/mo + €18k one-time. Need finance sign-off; Nina to prepare SOW.\"},{\"artifact_id\":\"art_fd6f109c343d\",\"customer_id\":\"cus_c31fbf7dd7e7\",\"customer\":\"Svenska PolyChem AB\",\"account_health\":\"watch list\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: EdgeCollector Co.\",\"snippet\":\"Context\\n- Customer pressure: reporting latency after BU expansion; procurement evaluating EdgeCollector trial kit.\\n- Northstar position: hybrid Signal Ingest + Signal Insights already deployed; root cause internal and remediable.\\n\\nEdgeCollector Co. (cmp_3c1aa248d11c) — strengths relevant to customer\\n- Robust offline buffering: appliances designed for intermittent connectivity in remote sites; lower footprint and proven replay logic for constrained networks.\\n- Small agent size: simpler deployment on edge PLC/SCADA networks.\\n- Pricing: positioned low-mid which appeals to procurement.\\n\\nEdgeCollector weaknesses vs Northstar\\n- Enrichment capabilities: limited downstream processing; enrichment is mostly basic field mapping without a deterministic enrichment microservice or a schema registry.\\n- Orchestration & automation: lacks an integrated runbook/orchestration layer; customer would need addi\"},{\"artifact_id\":\"art_0927b1cbb7f4\",\"customer_id\":\"cus_37e1826806c9\",\"customer\":\"Peregrine Logistics Group\",\"account_health\":\"at risk\",\"artifact_type\":\"support_ticket\",\"title\":\"Support ticket: Customer reports spike in duplicate runbook executions and duplicate incident creation after systems consolidation completed 2026-02-15. Duplicate incident rate increased from baseline 2% to 24% in week of 2026-03-15.\",\"snippet\":\"2026-03-18 09:12 - Customer: 'we're seeing duplicated ticket creation and runbooks firing twice' — triage notes: suspect idempotency mismatch between legacy WMS and new TMS; BeaconOps playbooks active in BU C; requested hotfix: map id key fields in ingestion or adjust dedupe window; customer requests urgency due to seasonal volume upcoming May; asked for SRE war room; assigned to Solutions Eng (Jin Park) and Engineering Ingest lead (Daniel Kim).\"},{\"artifact_id\":\"art_4b144e303af5\",\"customer_id\":\"cus_37e1826806c9\",\"customer\":\"Peregrine Logistics Group\",\"account_health\":\"at risk\",\"artifact_type\":\"customer_call\",\"title\":\"Renewal Negotiation call with Peregrine Logistics Group\",\"snippet\":\"Carlos Mendes (Northstar CSM): hey everyone — thanks for jumping on. quick agenda: triage current duplicates, timeline for fixes, renewal discussion. ravi, can you start with what you saw this week?\\nRavi Menon (Peregrine VP SRE): yeah — over last four days we saw duplicate runbook executions — essentially two tickets per real problem — last friday it spiked. yesterday ops counted 18% extra tasks. it started after we flipped traffic from legacy WMS to the consolidated bus on 2026-02-15.\\nSofia Martinez (Platform Dir): to add — the acquired BU C still emits shipment_ref instead of shipment_id. some producers include both but values don't line up. Kafka topic has mixed schemas now.\\nDaniel Kim (NS Eng Manager - Ingest): okay that matches what we saw in our telemetry — high-cardinality keys. EN-DEDUPE uses the event fingerprint which by default picks shipment_id when present; if shipment_id mi\"},{\"artifact_id\":\"art_e105d838d6ae\",\"customer_id\":\"cus_37e1826806c9\",\"customer\":\"Peregrine Logistics Group\",\"account_health\":\"at risk\",\"artifact_type\":\"internal_communication\",\"title\":\"Slack thread: Peregrine duplicate incidents post-acquisition — triage\",\"snippet\":\"olivia.grant: opened ticket PLG-3982 — duplicates spiking to 24% this week\\njin.park: quick check — ingestion shows missing canonical id for ~42% of events on topic 'shipments.v1'\\ndaniel.kim: propose push mapping rule to normalize shipment_id := coalesce(shipment_id, strip_prefix(shipment_ref, 'BUC-'))\\namara.okoro: flagged for CSM escalation — renewal at risk\\ncarlos.mendes: action — Jin/Daniel to implement mapping; Carlos will provide daily dup-rate report\\nben.gallagher: note finance asked what concession request looks like if SLA missed\\njin.park: will post mapping snippet in thread (see below) — tested in staging\\nmapping snippet (jin.park): {\\n  \\\"if\\\": \\\"exists(shipment_ref) && not exists(shipment_id)\\\",\\n  \\\"then\\\": \\\"shipment_id = regex_replace(shipment_ref, '^BUC-','')\\\"\\n}\\ndecision (carlos.mendes): deploy mapping to prod ingest route for topic 'shipments.v1' tonight 2026-03-20 between 18:00-19\"},{\"artifact_id\":\"art_1290f5ea8c04\",\"customer_id\":\"cus_37e1826806c9\",\"customer\":\"Peregrine Logistics Group\",\"account_health\":\"at risk\",\"artifact_type\":\"internal_document\",\"title\":\"Root-Cause Analysis: Duplicate Workflow Executions at Peregrine Logistics (PLG-3982)\",\"snippet\":\"1) Incident timeline\\n- 2026-02-15: Peregrine completed systems consolidation and began routing events to central Kafka topics.\\n- 2026-03-15..2026-03-18: Observed increase in duplicate correlated incidents from baseline 2% -> 24%.\\n- 2026-03-18: Support ticket PLG-3982 opened; engineering triage commenced.\\n\\n2) Technical root cause\\n- Field mismatch: Some producers send 'shipment_id' (canonical), acquired BU C sends 'shipment_ref' or 'BUC-<id>'.\\n- Schema registry not enforced on topic; SI-KAFKA-SINK connectors running in backward-incompatible mode.\\n- EN-DEDUPE fingerprinting logic: priority is canonical id if exists; otherwise uses payload hash -> events with nonmatching id fields not deduped.\\n- Additional duplication path: BeaconOps playbooks in BU C create external tickets upstream and our Integration Hub also creates tickets downstream, creating dual ticket creation.\\n\\n3) Evidence (samples\"},{\"artifact_id\":\"art_2a33ad2fe047\",\"customer_id\":\"cus_37e1826806c9\",\"customer\":\"Peregrine Logistics Group\",\"account_health\":\"at risk\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: BeaconOps\",\"snippet\":\"Context:\\n- Customer: Peregrine Logistics Group; post-acquisition consolidation introduced mixed event formats across 'shipments.v1'. BU C still uses BeaconOps playbooks for ticketing, creating duplicate pathways.\\n\\nBeaconOps assessment (cmp_15f3d499e5c7):\\n- Strengths relevant here:\\n  - Fast agent onboarding: BU C likely used BeaconOps originally because of quick playbook deployment and low friction.\\n  - Large playbook library: enabled BU C to continue ticket creation without rearchitecting flows.\\n- Weaknesses exploited in this scenario:\\n  - Limited retention controls and weaker schema/governance: BeaconOps does not enforce a schema registry per topic; harder to ensure canonical id adoption across producers.\\n  - Less emphasis on compliance exports and audit evidence: Peregrine requires audit trails when suppressing ticket creation (OR-AUDIT-LOGS is important), where Northstar has an edge.\\n\"},{\"artifact_id\":\"art_b450a220d7d6\",\"customer_id\":\"cus_1df01c3ac48e\",\"customer\":\"Harborline Hospitality Group\",\"account_health\":\"watch list\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: ObservaGrid\",\"snippet\":\"Context:\\n- Customer: Harborline Hospitality Group. Issue: role provisioning lag after org restructure. ObservaGrid pitched as alternative citing deep trace capabilities.\\n\\nObservaGrid (cmp_233938499802) — Strengths relevant to Harborline:\\n- Deep distributed tracing and transaction diagnostics that can show precise timing of identity flows within application stacks.\\n- Strong APM-style visualizations that executives like for root-cause storytelling.\\n- Premium positioning gives confidence but increases cost at scale.\\n\\nObservaGrid — Weaknesses / gaps vs Northstar:\\n- Weaker automation orchestration: ObservaGrid lacks a built-in runbook/orchestration product comparable to Orchestrator; remediation still requires external tooling.\\n- Compliance evidence and SLA export capabilities are weaker; Harborline needs signed export bundles for board audits and monthly KPIs.\\n- Private-cloud integrations fo\"},{\"artifact_id\":\"art_5a9a5459f84a\",\"customer_id\":\"cus_ce2defcf5292\",\"customer\":\"Arcadia Cloudworks\",\"account_health\":\"expanding\",\"artifact_type\":\"competitor_research\",\"title\":\"Competitor report: NoiseGuard\",\"snippet\":\"Background:\\n- Competitor: NoiseGuard (cmp_88dc528f7db7). Positioned as \\\"Adjacent - Alert Noise Reduction\\\" with strengths in easy deployment and tactical suppression.\\n\\nObserved strengths of NoiseGuard:\\n- Quick time-to-value for basic dedupe/suppression policies; minimal configuration.\\n- Low-mid pricing makes it attractive for teams wanting immediate noise relief.\\n\\nObserved weaknesses relative to Arcadia's problem:\\n- Not schema-aware: NoiseGuard's matching is primarily pattern and fingerprint-based and doesn't provide robust schema registry integration or field-weighted search scoring. When Arcadia changed taxonomy (v2.1), NoiseGuard would have required manual rule changes per fingerprint rather than a canonical enrichment approach.\\n- Limited automation: lacks a native runbook/orchestration engine to normalize incoming events at ingest time. Arcadia's requirement to automate canonical tagg\"}]"},{"name":"run_sql","input":"{\"sql\":\"SELECT artifact_id, title, substr(content_text,1,1500) AS snippet FROM artifacts WHERE artifact_id IN ('art_0bccc580184e','art_bd3560dfe194','art_35148df5b41b','art_a029fae81edd')\"}","output":"[{\"artifact_id\":\"art_0bccc580184e\",\"title\":\"Renewal Negotiation call with BlueHarbor Logistics\",\"snippet\":\"Liam O'Connor (Northstar Sales): Hi Sofia, thanks for making time. Quick agenda: diagnose impact, present short/medium fixes, and discuss renewal terms tied to delivery. You're on a tight exec clock, I know.\\nSofia Martinez (BlueHarbor VP Ops): Yep. Exec mandate is real — reduce manual triage by 40% in 6 months. Search relevance tanked after our taxonomy push on Feb 20. Our triage team is spending ~6 hours/day on manual sorting. We need to see measurable improvement within four weeks or I get asked why we're spending on platform renewals.\\nEvan Cho (Director SRE): To add, saved searches now surface old host tags and mix endpoints with batch jobs. We looked at schema registry entries and it looks like the field weighting that EN uses didn't get updated; some fields are now high-cardinality and pollute results.\\nJin Park (Northstar Solutions Engineer): Thanks Evan — that maps to what we've seen in the ticket. Short term we can push a tuning patch: update the index weighting and add a mapping layer that translates the new taxonomy terms to the old query terms. That should improve top-K relevance for the most-used queries. Implementation estimate: 3 engineers, ~5 business days to test and validate in staging, then 1 day for prod rollout.\\nSofia Martinez: Five business days to test? Our executives expect a proof within 10 business days. Can you guarantee measurable improvement for critical queries in that window?\\nIsabella Rossi (Data Scientist): We can run an A/B on the mapping and we\"},{\"artifact_id\":\"art_35148df5b41b\",\"title\":\"Renewal Negotiation call with NorrLog Freight AB\",\"snippet\":\"Carlos Mendes (CSM): Hi everyone — thanks for joining. Henrik, Elsa, Karl — appreciate you making time. Quick round: what is the current impact on exec reporting?\\nHenrik Svensson (Head Platform): Thanks. It's pretty direct — our scheduled hourly dashboards are coming in 30–45 minutes late. Execs noticed last Friday and they're asking why. The problem got worse after we turned on the contract-logistics BU on Feb 15.\\nElsa Berg (BI Lead): Right — the dashboard snapshot job (top-12 widgets) times out sometimes or returns partial. It's reproducible on the 00:00 and 04:00 runs when batch volumes peak.\\nCarlos: Understood. Jin, Daniel — can you walk through what you see server-side?\\nDaniel Kim (Eng Mgr - Ingest): Sure. We traced it to the enrichment stage that's part of Signal Ingest's preprocessing rules. For NorrLog the enrichment does an external ERP lookup and entity mapping. The work used to be parallelizable but with the newer schema patterns from the contract-logistics BU we're hitting a path that forces synchronous lookups for certain event types.\\nJin Park (Solutions Eng): To add: we also observed that schema-version mismatches are causing a subset of events to be enqueued for reprocessing. That reprocess path re-runs enrichment. Combined, the enrichment workers see a ~3x increase in load during the hourly window.\\nHenrik: Can you quantify that? We need numbers for procurement.\\nDaniel: Baseline reprocess was ~0.6% before Feb 15. After the expansion it's around 18% of events in\"},{\"artifact_id\":\"art_a029fae81edd\",\"title\":\"Executive Escalation call with Svenska PolyChem AB\",\"snippet\":\"Karin Eriksson (Head of Digital Ops): Hi everyone. Thanks for joining on short notice. To be blunt: the hourly executive dashboard yesterday took 10 minutes to render. Our CFO was furious. This is a top priority. We expanded to the Production Chemistry unit mid-February and the hourly job has doubled in size. We need a plan that delivers sub-90s within two weeks or we are forced to evaluate alternatives.\\n\\nCarlos Mendes (CSM, Northstar): Hi Karin — I’m sorry you had to see that. We did a triage and have engineering on call today. Daniel (Ingest EM) is here to walk through findings.\\n\\nDaniel Kim (Engineering Manager - Ingest): Quick summary from our side: after BU expansion event on 2026-02-15, ingest volume during the 01:00 UTC hourly window increased from ~120k events/hour to ~420k. Enrichment microservice CPU on the private-worker pool ramps to 95% and processing latency per event rises from ~15ms to ~80ms. Complicating that, local disk buffering on the virtual appliances replays whole batches when a single record's enrichment fails — that’s causing duplicated work and higher effective throughput requirements.\\n\\nLars Nilsson (CIO): Wait — replays on single failure? Why does the buffer not mark individual records as processed? That seems basic.\\n\\nDaniel Kim: Good question. Current enrichment pipeline assumes idempotency key is present as event.metadata.id; several of your MES adapters are not passing a stable id field. Our retry logic is batch-oriented to ensure ordering guarant\"},{\"artifact_id\":\"art_bd3560dfe194\",\"title\":\"Retro: BlueHarbor taxonomy rollout -> Event Nexus search relevance degradation\",\"snippet\":\"Context\\n- Customer: BlueHarbor Logistics (Large Enterprise, ~8k employees), taxonomy change rolled 2026-02-20 by VP Ops. Trigger: executive mandate to reduce manual work by 40%.\\n- Impact: Saved searches returned low-relevance hits and duplicates; triage increased to ~6 hours/day for Incident Ops.\\n- Products: Event Nexus (EN) for search/correlation; Orchestrator for runbooks.\\nRoot cause analysis\\n- Immediate: EN index weighting still references old schema fields (pre-taxonomy). SI-SCHEMA-REG versions diverged from EN mapping (fields renamed, some tag cardinality rose from ~10k to ~120k). Rules engine hot-mapping didn't receive updated compatibility mapping.\\n- Contributing: No automated backward-compatibility check in CI for schema-to-index weighting. No pre-rollout dry-run of sample queries against staging mapping.\\nShort-term mitigation (Proof-of-Fix plan)\\n- Scope: Update index weighting and add a translation/mapping layer that maps new taxonomy terms to historical query tokens for top 20 saved searches.\\n- Steps & timeline:\\n  1) 2026-03-19: Receive schema registry export + 14 days query logs from customer (responsibility: BlueHarbor).\\n  2) 2026-03-22: Start A/B test in staging (Jin, Isabella). Duration: 5 business days to tune + 2 business days validation = 7-10bd.\\n  3) Validation metrics: top-5 correct hit rate >= 80% for prioritized queries; no regression in EN-RULES-ENGINE suppression logic; incident correlation latency <200ms.\\n  4) If validation passes, 1-day prod rollout a\"}]"}],"suite":"canonical_sample"},{"id":"gold_sample_06","question":"Among the North America West Event Nexus accounts, which ones are really dealing with taxonomy/search semantics problems versus duplicate-action problems?","answer":"Splitting the North America West Event Nexus accounts by their actual pain:\n\n**Taxonomy/search-semantics problems** (search relevance dropped after a metadata/taxonomy refactor): BlueHarbor Logistics, HelioFab Systems, Pacific Health Network, Arcadia Cloudworks, CedarWind Renewables, and Pioneer Freight Solutions.\n\n**Duplicate-action / dedupe problems** (post-acquisition schema/idempotency-key mismatch causing dedupe drift & duplicate runbook runs): LedgerPeak Software, Pioneer Grid Retail, Peregrine Logistics Group, Helix Assemblies, MedLogix Distribution, and LedgerBright Analytics.","expected":"The taxonomy/search semantics group is Arcadia Cloudworks, BlueHarbor Logistics, CedarWind Renewables, HelioFab Systems, Pacific Health Network, and Pioneer Freight Solutions. Those accounts all have search relevance degradation after taxonomy changes. The duplicate-action group is Helix Assemblies Inc., LedgerBright Analytics, LedgerPeak Software, MedLogix Distribution, Peregrine Logistics Group, and Pioneer Grid Retail LLC. Those accounts are dealing with post-acquisition deduplication drift, duplicate incident generation, or repeated playbook executions across bridged systems.","answerScore":{"match_type":"judge","correct":null,"detail":"deferred to judge/manual"},"retrievalScore":{"scored":true,"recall":1,"precision":0.8125,"mrr":0.75,"perEntity":{"products":{"found":1,"gold":1,"recall":1,"precision":0.25},"customers":{"found":12,"gold":12,"recall":1,"precision":1}}},"expectedIds":{"products":["prd_f8d861694bac"],"customers":["cus_c
