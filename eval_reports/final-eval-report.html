<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Eval report</title>
<style>
  :root {
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, monospace;

    --bg: #f5f8fb; --surface: #ffffff; --panel: #eef2f7; --panel-2: #e3e9f1;
    --ink: #12202e; --ink-soft: #566476; --ink-faint: #8593a2;
    --border: #dbe3ec; --border-strong: #c6d1de;
    --accent: #3f57d6; --accent-soft: rgba(63,87,214,.10);
    --pass: #147a43; --pass-bg: rgba(20,122,67,.12);
    --fail: #cc372b; --fail-bg: rgba(204,55,43,.12);
    --judge: #a06d00; --judge-bg: rgba(160,109,0,.13);
    --hit: #147a43; --miss: #cc372b; --fp: #a06d00;
    --meter-track: #dde4ec;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c1016; --surface: #141a22; --panel: #1a222d; --panel-2: #212b38;
      --ink: #e7eef6; --ink-soft: #9db0c3; --ink-faint: #66768a;
      --border: #27313f; --border-strong: #34414f;
      --accent: #7f95ff; --accent-soft: rgba(127,149,255,.12);
      --pass: #45c684; --pass-bg: rgba(69,198,132,.14);
      --fail: #ff6f62; --fail-bg: rgba(255,111,98,.14);
      --judge: #e3ad3f; --judge-bg: rgba(227,173,63,.14);
      --hit: #45c684; --miss: #ff6f62; --fp: #e3ad3f;
      --meter-track: #2a3543;
    }
  }
  :root[data-theme="light"] {
    --bg: #f5f8fb; --surface: #ffffff; --panel: #eef2f7; --panel-2: #e3e9f1;
    --ink: #12202e; --ink-soft: #566476; --ink-faint: #8593a2;
    --border: #dbe3ec; --border-strong: #c6d1de; --accent: #3f57d6; --accent-soft: rgba(63,87,214,.10);
    --pass: #147a43; --pass-bg: rgba(20,122,67,.12); --fail: #cc372b; --fail-bg: rgba(204,55,43,.12);
    --judge: #a06d00; --judge-bg: rgba(160,109,0,.13);
    --hit: #147a43; --miss: #cc372b; --fp: #a06d00; --meter-track: #dde4ec;
  }
  :root[data-theme="dark"] {
    --bg: #0c1016; --surface: #141a22; --panel: #1a222d; --panel-2: #212b38;
    --ink: #e7eef6; --ink-soft: #9db0c3; --ink-faint: #66768a;
    --border: #27313f; --border-strong: #34414f; --accent: #7f95ff; --accent-soft: rgba(127,149,255,.12);
    --pass: #45c684; --pass-bg: rgba(69,198,132,.14); --fail: #ff6f62; --fail-bg: rgba(255,111,98,.14);
    --judge: #e3ad3f; --judge-bg: rgba(227,173,63,.14);
    --hit: #45c684; --miss: #ff6f62; --fp: #e3ad3f; --meter-track: #2a3543;
  }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.5; }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 28px 24px 80px; }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }

  /* header */
  header.rep { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 20px; }
  .title h1 { font-size: 20px; font-weight: 650; letter-spacing: -.01em; margin: 0 0 2px; }
  .title .sub { color: var(--ink-faint); font-size: 12.5px; font-family: var(--mono); }
  .headline { display: flex; align-items: stretch; gap: 20px; }
  .hstat .lbl { font-size: 11px; letter-spacing: .09em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 3px; }
  .hstat .big { font-size: 34px; font-weight: 680; letter-spacing: -.02em; font-family: var(--mono); font-variant-numeric: tabular-nums; line-height: 1; }
  .hstat .big .of { color: var(--ink-faint); font-weight: 500; }
  .hsep { width: 1px; background: var(--border); }
  .hmetrics { display: flex; gap: 16px; align-items: flex-end; }
  .hmetrics .m { display: flex; flex-direction: column; gap: 2px; }
  .hmetrics .m .mv { font-family: var(--mono); font-size: 22px; font-weight: 650; font-variant-numeric: tabular-nums; letter-spacing: -.01em; line-height: 1; }
  .hmetrics .m .mk { font-size: 10px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); }
  .hmetrics .scored { font-size: 11px; color: var(--ink-faint); font-family: var(--mono); }

  .suites { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
  .suite-chip { display: flex; align-items: baseline; gap: 8px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 9px; font-size: 12.5px; }
  .suite-chip .nm { color: var(--ink-soft); }
  .suite-chip .rt { font-family: var(--mono); font-weight: 600; font-variant-numeric: tabular-nums; }
  .suite-chip .bar { width: 46px; height: 5px; border-radius: 3px; background: var(--meter-track); overflow: hidden; align-self: center; }
  .suite-chip .bar > i { display: block; height: 100%; background: var(--pass); }
  .suite-chip .rc { color: var(--ink-faint); font-family: var(--mono); font-size: 11.5px; }

  /* controls */
  .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
  .controls input, .controls select { font: inherit; font-size: 13px; padding: 7px 10px; border: 1px solid var(--border-strong); border-radius: 8px; background: var(--surface); color: var(--ink); }
  .controls input { min-width: 230px; }
  .controls input:focus, .controls select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
  .spacer { flex: 1; }
  .seg { display: inline-flex; background: var(--panel); border: 1px solid var(--border); border-radius: 9px; padding: 3px; }
  .seg button { font: inherit; font-size: 12.5px; font-weight: 550; border: 0; background: transparent; color: var(--ink-soft); padding: 5px 13px; border-radius: 6px; cursor: pointer; }
  .seg button[aria-pressed="true"] { background: var(--surface); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.08); }

  /* pills + chips */
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 650; letter-spacing: .02em; padding: 2px 9px; border-radius: 100px; font-family: var(--mono); }
  .pill.pass { color: var(--pass); background: var(--pass-bg); }
  .pill.fail { color: var(--fail); background: var(--fail-bg); }
  .pill.judge { color: var(--judge); background: var(--judge-bg); }
  .pill.pass::before, .pill.fail::before, .pill.judge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .chip-suite { font-size: 11px; color: var(--ink-soft); background: var(--panel); border: 1px solid var(--border); padding: 2px 8px; border-radius: 6px; font-family: var(--mono); }
  .match { font-size: 11.5px; color: var(--ink-soft); font-family: var(--mono); }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .tags.row-tags { margin-top: 3px; }
  .chip-tag { font-size: 11px; color: var(--accent); background: var(--accent-soft); border: 1px solid transparent; padding: 2px 8px; border-radius: 6px; font-family: var(--mono); }

  /* mini meter */
  .meter { display: flex; align-items: center; gap: 7px; }
  .meter .track { width: 40px; height: 5px; border-radius: 3px; background: var(--meter-track); overflow: hidden; }
  .meter .track > i { display: block; height: 100%; background: var(--accent); }
  .meter .track.lo > i { background: var(--fail); }
  .meter .track.mid > i { background: var(--judge); }
  .meter .v { font-family: var(--mono); font-size: 12px; font-variant-numeric: tabular-nums; color: var(--ink-soft); min-width: 30px; }
  .dash { color: var(--ink-faint); }

  /* ===== CONSOLE (table) ===== */
  .tablecard { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  table { border-collapse: collapse; width: 100%; }
  thead th { position: sticky; top: 0; z-index: 2; background: var(--panel); text-align: left; font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  thead th.sortable:hover { color: var(--ink); }
  thead th .arr { opacity: .5; font-size: 9px; }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr.row { cursor: pointer; }
  tbody tr.row:hover td { background: var(--accent-soft); }
  tbody tr.row.open td { background: var(--panel); }
  td.c-chev { width: 26px; color: var(--ink-faint); text-align: center; }
  td.c-chev .cx { display: inline-block; transition: transform .12s; }
  tr.open td.c-chev .cx { transform: rotate(90deg); color: var(--accent); }
  td.c-id { font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); white-space: nowrap; }
  td.c-q { max-width: 420px; }
  td.c-q .qt { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; line-clamp: 2; overflow: hidden; color: var(--ink); }
  tr.detailrow > td { padding: 0; background: var(--panel); border-bottom: 1px solid var(--border); }
  .detailwrap { padding: 4px 18px 22px; }

  /* ===== detail panel (shared) ===== */
  .detail { display: grid; gap: 16px; }
  .qlead { display: grid; gap: 5px; }
  .lbl-eyebrow { font-size: 10.5px; letter-spacing: .09em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; }
  .qlead .qtext { font-size: 16px; line-height: 1.45; font-weight: 500; color: var(--ink); max-width: 78ch; }

  .aecols { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 760px) { .aecols { grid-template-columns: 1fr; } }
  .pane { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; min-width: 0; }
  .pane > .head { display: flex; align-items: center; justify-content: space-between; padding: 8px 13px; border-bottom: 1px solid var(--border); font-size: 10.5px; letter-spacing: .08em; text-transform: uppercase; font-weight: 600; }
  .pane.answer > .head { color: var(--accent); }
  .pane.expected > .head { color: var(--ink-soft); }
  .pane .body { padding: 13px 14px; font-size: 14px; line-height: 1.62; color: var(--ink); white-space: pre-wrap; word-break: break-word; overflow-wrap: anywhere; max-height: 340px; overflow: auto; }
  .pane.expected .body { color: var(--ink-soft); }
  .pane .body strong, .pane .body b { color: var(--ink); font-weight: 650; }
  .pane .body code { font-family: var(--mono); font-size: 12.5px; background: var(--panel-2); padding: 1px 4px; border-radius: 4px; }
  .verdict-strip { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 12.5px; color: var(--ink-soft); }
  .verdict-strip .scorer-detail { font-family: var(--mono); font-size: 12px; color: var(--ink); background: var(--panel-2); padding: 2px 8px; border-radius: 6px; }

  /* retrieval */
  .retrieval { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; display: grid; gap: 12px; }
  .retrieval .rhead { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .retrieval .metric { display: flex; align-items: baseline; gap: 6px; }
  .retrieval .metric .k { font-size: 10.5px; letter-spacing: .07em; text-transform: uppercase; color: var(--ink-faint); }
  .retrieval .metric .val { font-family: var(--mono); font-weight: 650; font-size: 15px; font-variant-numeric: tabular-nums; }
  .idgrid { display: grid; gap: 8px; }
  .idrow { display: grid; grid-template-columns: 96px 1fr; gap: 10px; align-items: start; }
  .idrow .side { font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; padding-top: 4px; }
  .idchips { display: flex; flex-wrap: wrap; gap: 5px; }
  .idchip { font-family: var(--mono); font-size: 11.5px; padding: 2px 7px; border-radius: 6px; border: 1px solid transparent; }
  .idchip .ent { opacity: .55; }
  .idchip.hit { color: var(--hit); background: var(--pass-bg); }
  .idchip.miss { color: var(--miss); background: var(--fail-bg); }
  .idchip.fp { color: var(--fp); background: var(--judge-bg); }
  .idchip.none { color: var(--ink-faint); border-color: var(--border); }

  /* trace */
  .trace { display: grid; gap: 8px; }
  .trace .thead { display: flex; align-items: center; gap: 8px; }
  .trace .thead .count { font-size: 12px; color: var(--ink-soft); font-family: var(--mono); }
  .tool { border: 1px solid var(--border); border-radius: 9px; background: var(--surface); overflow: hidden; }
  .tool > summary { list-style: none; cursor: pointer; padding: 9px 12px; display: flex; align-items: center; gap: 9px; font-size: 12.5px; }
  .tool > summary::-webkit-details-marker { display: none; }
  .tool > summary .tw { color: var(--ink-faint); font-size: 10px; transition: transform .12s; }
  .tool[open] > summary .tw { transform: rotate(90deg); }
  .tool > summary .nm { font-family: var(--mono); font-weight: 600; color: var(--accent); }
  .tool > summary .in { font-family: var(--mono); color: var(--ink-soft); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
  .tool .out { border-top: 1px solid var(--border); padding: 10px 12px; }
  .tool .out .k { font-size: 10px; letter-spacing: .06em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 4px; }
  .tool .out pre { margin: 0 0 10px; font-family: var(--mono); font-size: 11.5px; line-height: 1.55; color: var(--ink-soft); white-space: pre-wrap; word-break: break-word; max-height: 220px; overflow: auto; }
  .tool .out pre:last-child { margin-bottom: 0; }

  /* ===== CARDS ===== */
  .cards { display: grid; gap: 14px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px 18px; }
  .card > .chead { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 13px; }
  .card > .chead .cid { font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); }
  .card > .chead .spacer2 { flex: 1; }
  .card > .chead .mini { display: flex; gap: 12px; align-items: center; }
  .card > .chead .mini .m { display: flex; align-items: baseline; gap: 5px; font-size: 11px; color: var(--ink-faint); }
  .card > .chead .mini .m b { font-family: var(--mono); font-size: 12.5px; color: var(--ink-soft); font-weight: 600; }
  .card .detail { gap: 14px; }
  .card .qlead .qtext { font-size: 15px; }

  .empty { padding: 40px; text-align: center; color: var(--ink-faint); }
  footer.note { margin-top: 24px; font-size: 11.5px; color: var(--ink-faint); text-align: center; font-family: var(--mono); }
</style>
</head>
<body>
<div class="wrap">
  <header class="rep">
    <div class="title">
      <h1>Eval report</h1>
      <div class="sub" id="meta"></div>
    </div>
    <div class="headline">
      <div class="hstat">
        <div class="lbl">deterministic pass</div>
        <div class="big" id="passbig"></div>
      </div>
      <div class="hsep"></div>
      <div class="hstat">
        <div class="lbl">retrieval</div>
        <div class="hmetrics" id="retrievalbig"></div>
      </div>
    </div>
  </header>

  <div class="suites" id="suites"></div>

  <div class="controls">
    <input id="search" placeholder="Filter by id or question…" aria-label="Filter">
    <select id="verdict" aria-label="Verdict">
      <option value="">All verdicts</option>
      <option value="pass">Pass</option>
      <option value="fail">Fail</option>
      <option value="judge">Judge</option>
    </select>
    <select id="suite" aria-label="Suite"><option value="">All suites</option></select>
    <div class="spacer"></div>
    <div class="seg" role="group" aria-label="View">
      <button id="v-console" aria-pressed="true">Console</button>
      <button id="v-cards" aria-pressed="false">Cards</button>
    </div>
  </div>

  <div id="view"></div>
  <footer class="note">Open a row to read the full answer / expected panes, retrieval, and tool trace.</footer>
</div>

rtifacts\",\"filters\":[{\"column\":\"customer_id\",\"op\":\"eq\",\"value\":\"cus_409b142bc439\"},{\"column\":\"created_at\",\"op\":\"between\",\"value\":[\"2026-03-17\",\"2026-03-20T23:59:59\"]}],\"select\":[\"artifact_type\",\"created_at\",\"title\"],\"order_by\":{\"column\":\"created_at\",\"direction\":\"asc\"}}","output":"{\"rows\":[{\"artifact_type\":\"support_ticket\",\"created_at\":\"2026-03-17T09:18:00+01:00\",\"title\":\"Support ticket: High-frequency duplicate alerts from substation event streams after production scale-up leading to paging fatigue and risk to renewal negotiation. Customer reports 18 pager floods last 48h; wants fast suppression and confirmed evidence for procurement.\",\"artifact_id\":\"art_87ce7dc50339\"},{\"a"}]},{"id":"gold_0017","suite":"core_deterministic","tags":[],"correct":null,"match":"judge","detail":"deferred to judge/manual","question":"Summarize the recurring themes in the support tickets about noisy or excessive alerting.","answer":"Here are the recurring themes across ~30 support tickets about noisy/excessive alerting:\n\n**1. Alert storms after scaling pilot → production.** The single most common trigger. Ingesting more telemetry sources or ramping to production produces alert floods — e.g. 12k, 18k, and even >32k alerts/day (NordChemica, Fyrkrona, NordicChem, NordMed, NordGrid, NordFryst, Aurora Dataworks). Mostly on **Signal Ingest**.\n\n**2. Duplicate incidents/alerts after acquisition or systems consolidation.** A distinct cluster on **Event Nexus**, where suspected idempotency-key/header mismatches from acquisition glue-layers cause duplicate incidents, duplicate remediation/runbook runs, and 3x paging (Helix, Peregrine, LedgerPeak, LedgerBright, Pioneer Grid).\n\n**3. On-call / paging fatigue.** Nearly every ticket cites saturated on-call rotations, \"pager floods,\" field-dispatch fatigue, and SRE rotas being paged excessively — the core operational pain.\n\n**4. Renewal & procurement pressure.** A striking commercial thread: many customers explicitly tie the noise to renewal negotiations, with procurement using it as leverage and requesting an \"evidence package\" demonstrating noise reduction before renewing.\n\n**5. Requests for tuning, suppression, and dedup.** Common asks are threshold tuning, suppression policies, deduplication, and stopping duplicate orchestrator/runbook executions.\n\n**6. Root causes named:** unchanged pilot-era thresholds carried into production, handoff-window spikes (06:00–09:00), intermittent-connectivity replays, and enrichment-stage reprocessing.\n\nNote: results were truncated (30 total matches spanning 30 different customers), so this covers the top slice but the pattern extends across the full set. A couple of surfaced tickets (dashboard-latency/reprocessing ones) are related to duplicate/reprocessing noise but aren't strictly alerting complaints.","expected":"Several customers report high alert volume, especially spikes during shift-handoff windows, which saturates on-call staff. A common ask is to tune or suppress the noisy alerts, and in a few accounts the alert fatigue ties into renewal or procurement pressure.","recall":0.2,"precision":0.35,"mrr":1,"expectedIds":{"artifacts":["art_095b99836169","art_0a135c689c08","art_17abbddc8e1c","art_188354354875","art_2420588c7e8d","art_25fac9f564e7","art_2a2227a894e2","art_2c74d2b4b2e4","art_30819100b117","art_3dd0473bff8c","art_49ed2e9ef596","art_49f5fae5a1cf","art_4a2b3d30f2d2","art_50987b3f2b98","art_57ab871c2b35","art_599ab3ce9cc8","art_59bc3aae72e6","art_696c07fdb010","art_6c9446a04e8d","art_6f285c2f3219","art_760df143a1e2","art_769fb1a3b020","art_8254b9cf5801","art_873073298cc9","art_87ce7dc50339","art_9507c03d9d65","art_973a6b38fe0c","art_9a8845b33c9e","art_a9d51da1b57b","art_ac0f6823bd92","art_bcc36979e170","art_e89e8accadd2","art_f92d6a99f322","art_fcc001e817e5","art_ffa7143fb822"]},"predicted":{"artifacts":["art_a9d51da1b57b","art_973a6b38fe0c","art_696c07fdb010","art_50987b3f2b98","art_17abbddc8e1c","art_87ce7dc50339","art_e89e8accadd2","art_0ac4efa5a0ff","art_fcba81a726f5","art_0927b1cbb7f4","art_142ab459c9c1","art_2f780acc1f96","art_8478ccd5b200","art_164044f6262e","art_a9a5ec39e511","art_f64972a66eeb","art_f926fa9a5390","art_cc1d06976a22","art_1f94d698288a","art_10f7e8b72e09"]},"toolCallCount":1,"toolCalls":[{"name":"search_artifacts","input":"{\"query\":\"noisy excessive alerting alert fatigue false positives too many alerts\",\"filters\":{\"artifact_type\":\"support_ticket\"},\"limit\":20,\"facet_by\":\"customer_id\"}","output":"{\"rows\":[{\"artifact_id\":\"art_a9d51da1b57b\",\"title\":\"Support ticket: Customer reports noisy alerting after scaling ingest from pilot to production. Daily alert spikes during 06:00-09:00 handoff windows producing ~12k alerts/day, saturating on-call and triggering procurement concerns during renewal negotiation.\",\"artifact_type\":\"support_ticket\",\"created_at\":\"2026-03-18T09:24:00+01:00\",\"customer_id\":"}]},{"id":"gold_0018","suite":"core_deterministic","tags":[],"correct":null,"match":"judge","detail":"deferred to judge/manual","question":"What pain points come up repeatedly across our at-risk customer accounts?","answer":"Several clear, recurring themes run across all 10 at-risk accounts (most tied to post-migration/consolidation breakage and now driving renewal risk):\n\n**1. Post-migration / post-consolidation breakage** — the dominant pattern. Something breaks right after a go-live, migration, or M&A systems consolidation:\n- Approval/policy workflows failing (City of Verdant Bay, Maple Transit, Prov. of Laurentia)\n- Duplicate incidents & runbook executions from idempotency/schema divergence (Peregrine Logistics)\n- Provisioning/reconciliation failures after org restructure (Harbourline)\n\n**2. Schema drift / normalization issues** — the shared root cause behind many of the above: schema inconsistency, SCIM attribute transforms, taxonomy/index-weighting changes, idempotency key mismatches (Peregrine, Harbourline, Pioneer Freight, BlueHarbor, Maple).\n\n**3. Alert noise / false positives** — alert storms and high false-positive paging hurting on-call and giving procurement leverage (NordFryst, and dedupe evaluations at BlueHarbor/Pioneer).\n\n**4. Reporting/enrichment latency & throughput** — enrichment-stage bottlenecks and reprocessing lag after BU expansion (NorrLog Freight).\n\n**5. Compliance / audit evidence gaps** — missing audit entries and demand for compliance-grade evidence exports (Maple, DRS, Verdant Bay).\n\n**6. Renewal pressure & pricing concessions** — nearly every account is now in a renewal negotiation demanding measurable improvement within 60-90 days plus credits/discounts, often with a competitor (Patchway, NoiseGuard, BeaconOps, ComplianceStream, SignalFlow) offering a cheaper tactical alternative.\n\nNote: results were truncated at 30 total matches, so there's a bit more detail beyond what's listed, but these six themes recur consistently across the at-risk portfolio.","expected":"At-risk accounts repeatedly show noisy or excessive alerting, remediation and rollback issues after misconfigurations, and escalations. These pain points recur across several different customers, not just one account.","recall":0.5,"precision":0.14285714285714285,"mrr":null,"expectedIds":{"artifacts":["art_0927b1cbb7f4","art_3ba29fe1e026","art_50987b3f2b98","art_6be1b68b59cb","art_8b0063fbb3cb","art_a0ed9f935d3e","art_cbfb5f92862c","art_cc1d06976a22","art_fbed53e40d47","art_fc6c465c3c59"]},"predicted":{"customers":["cus_10762173c26d","cus_b430f59e0caf","cus_6a81c89143a3","cus_4637d32c1def","cus_37e1826806c9","cus_e1ae80e00362","cus_c017e831b967","cus_7355bb61ec30","cus_fe2c64f4608d","cus_e98688cf78bc"],"artifacts":["art_6be1b68b59cb","art_4b144e303af5","art_50987b3f2b98","art_f92d6a99f322","art_0927b1cbb7f4","art_cbfb5f92862c","art_ac8afb52f2d3","art_2a33ad2fe047","art_57ab871c2b35","art_a0ed9f935d3e","art_f60d368c4493","art_e408968fe032","art_1290f5ea8c04","art low. Approval tasks are created but never progress to human approvers; incidents escalate without audit entries for several approvals.\",\"artifact_type\":\"support_ticket\",\"created_at\":\"2026-03-07T09:40:00-04:00\",\"customer_id\":\"cus_e98688cf78bc\",\"product_id\":\"p"}]},{"id":"gold_0019","suite":"core_deterministic","tags":[],"correct":null,"match":"judge","detail":"deferred to judge/manual","question":"Give me your read on BeaconOps as a competitor, its strengths and where it's weak.","answer":"**BeaconOps** is a direct competitor in Incident Intelligence — incident correlation + runbook automation for cloud-native teams, mid-range pricing.\n\n**Strengths:**\n- Fast/lightweight agent onboarding — quick to stand up\n- Large playbook library / marketplace, attractive for quick runbook automation\n\n**Weaknesses:**\n- Limited retention controls (no strong per-tenant retention)\n- Weak on compliance evidence exports / audit trails\n- Ingest-side gaps: dedupe assumes consistent producer-side idempotency keys, with little ingest-side normalization or schema governance/registry\n\nIt shows up repeatedly as the primary competitor in post-acquisition deals (LedgerPeak, Helix, MedLogix, Peregrine, Pioneer Grid, LedgerBright) where its playbook/onboarding strengths get it in the door, but its retention/compliance/schema-governance gaps are exactly where we position Event Nexus + Signal Ingest/Orchestrator to win. That competitive-report pattern extends beyond these — at least ~30 matching artifacts total.","expected":"BeaconOps's main strengths are fast agent onboarding and a large playbook library. Its main weaknesses are limited retention controls and less emphasis on compliance exports.","recall":0.5833333333333334,"precision":0.6363636363636364,"mrr":1,"expectedIds":{"competitors":["cmp_15f3d499e5c7"],"artifacts":["art_0927b1cbb7f4","art_1290f5ea8c04","art_1e14a6be3a7f","art_2432dccbcdcb","art_2a33ad2fe047","art_3138b5cfc288","art_4b144e303af5","art_4f1200ae5a1f", -20 taxonomy rollout\n- HelioFab Systems — relevance fell 40-60% after taxonomy v2\n- Arcadia Cloudworks — taxonomy v2.1 broke lookup + playbook-trigger matching (~28% misses)\n- CedarWind Renewables — relevance fell ~68%→32% after taxonomy update\n- Pacific Health Network — low-relevance grouping + misfiring runbooks after 2026-03-02 taxonomy update\n- Pioneer Freight Solutions — low-relevance incident/asset lookups after taxonomy update\n\n**Duplicate-action problems** (post-acquisition idempotency-key drift → duplicate incidents/runbook runs):\n- Helix Assemblies Inc. — dedupe drift at Plant D after AcqERP bridge\n- Pioneer Grid Retail LLC — duplicated remediation runs after AcquiBill v2\n- Peregrine Logistics Group — duplicate rate 2%→24% after consolidation\n- LedgerPeak Software — duplicate incidents/actions after ChargeCore cutover\n- MedLogix Distribution — duplicate surge (23→160/day) after NorthValve acquisition\n- LedgerBright Analytics — duplicates + missing dedupe after Nov 2025 consolidation\n\nNote: the taxonomy incidents also involve NoiseGuard as the named competitor, while the duplicate-action ones involve BeaconOps — a clean divide across both the problem type and the competitive context.","expected":"The taxonomy/search semantics group is Arcadia Cloudworks, BlueHarbor Logistics, CedarWind Renewables, HelioFab Systems, Pacific Health Network, and Pioneer Freight Solutions. Those accounts all have search relevance degradation after taxonomy changes. The duplicate-action group is Helix Assemblies Inc., LedgerBright Analytics, LedgerPeak Software, MedLogix Distribution, Peregrine Logistics Group, and Pioneer Grid Retail LLC. Those accounts are dealing with post-acquisition deduplication drift, duplicate incident generation, or repeated playbook executions across bridged systems.","recall":1,"precision":0.27906976744186046,"mrr":1,"expectedIds":{"artifacts":["art_90991e25335f","art_8b0063fbb3cb","art_10f7e8b72e09","art_9345d5653840","art_4eccfd9dcf29 cet_by\":\"customer_id\",\"limit\":15}","output":"{\"rows\":[{\"artifact_id\":\"art_0ac4efa5a0ff\",\"title\":\"Support ticket: High rate of duplicate incident executions and repeated remediation playbook runs at Plant D after acquisition integration; suspected idempotency key mismatch between ERP and AcqERP.\",\"artifact_type\":\"support_ticket\",\"created_at\":\"2026-03-18T09:12:00Z\",\"customer_id\":\"cus_2a8c1063d782\",\"product_id\":\"prd_f8d861694bac\",\"competitor_id"}]},{"id":"gold_sample_07","suite":"canonical_sample","tags":[],"correct":null,"match":"judge","detail":"deferred to judge/manual","question":"Do we have a recurring Canada approval-bypass pattern across accounts, or is MapleBridge basically a one-off? Give me the customer names and the shared failure pattern in plain English.","answer":"It's a recurring pattern — MapleBridge is not a one-off. Six Canadian accounts on Orchestrator hit the same class of failure:\n\n- **MapleBridge Insurance** (Financial Services) — Canada approvers bypassed ~3 hrs, misapproved claims sent to billing\n- **MapleWest Bank** (Financial Services) — Canada policy approvals failing/misrouted across 87 branch flows\n- **MapleBay Marketplace** (Retail) — country=CA approvals stuck pending / auto-denied, order holds\n- **MapleFork Franchise Systems** (Hospitality) — Canada-ON/QC workflows misevaluated, payroll approvals blocked (~12% of franchises)\n- **MaplePath Career Institute** (Education) — dropped approvals in ON/QC/BC, missing audit entries\n- **Maple Regional Transit Authority** (Public Sector) — ON/QC approval tasks created but never route to human approvers\n\n**Shared failure pattern (plain English):** After migrating onto Orchestrator from legacy tooling, the region/country-specific approval rules for Canada (the `country=CA` / province override tags) stop being evaluated correctly. A global-default rule wins over the Canada-specific override — so approvals either get silently bypassed/auto-approved, or the opposite (stuck pending, blocked, routed to the wrong approvers). The common thread is a migration-triggered rule-precedence/override bug where the Canadian override isn't applied, often with missing audit entries as a side effect. Root cause work points at the rules engine + schema-registry propagation race (per MapleBridge's playbook).\n\nSo MapleBridge is just the most visible instance of a systemic Canada override-precedence defect. (The search returned 30 total matches, so there's more supporting evidence than the tickets listed here.)","expected":"It is definitely a recurring pattern, not a MapleBridge one-off. The clearest accounts are MapleBridge Insurance, City of Verdant Bay, Maple Regional Transit Authority, MapleBay Marketplace, MapleFork Franchise Systems, MaplePath Career Institute, and MapleWest Bank. In plain English, after migration from older workflow systems, Northstar ends up with some mix of bad precedence metadata, stale caches, field alias mismatches, or delayed schema propagation, so global or country-default rules win when province, city, or Canada-specific approval rules should win. The result is approvals getting bypassed, denied, stuck, or routed to the wrong approver, with audit trails becoming incomplete.","recall":0.5,"precision":0.4375,"mrr":1,"expectedIds":{"artifacts":["art_e697b3abe158","art_f4a8c516b934","art_cbfb5f92862c","art_fff67d92fe41","art_6be1b68b59cb","art_cf6f9e07e25a","art_39c1434aa40a","art_d57377f0810c","art_e9c20e0a23e0","art_ad58f3ce1afd","art_981952a71434","art_6bae2f4ff91f","art_b86a0ca2ce1e","art_364eddbcbfe8"]},"predicted":{"artifacts":["art_f4a8c516b934","art_e9c20e0a23e0","art_39c1434aa40a","art_b86a0ca2ce1e","art_981952a71434","art_e697b3abe158","art_6be1b68b59cb","art_54e35e2cb431","art_3162bf3bba31","art_3497f365d58e"],"customers":["cus_1a6ee5ed7a31","cus_77aa5a39cb6d","cus_8ac7338d1b68","cus_c44f952abde6","cus_e98688cf78bc","cus_f662b40a432a"]},"toolCallCount":3,"toolCalls":[{"name":"describe_entities","input":"{\"entities\":[\"customers\",\"artifacts\"]}","output":"[{\"entity\":\"customers\",\"columns\":[\"customer_id\",\"scenario_id\",\"name\",\"industry\",\"subindustry\",\"region\",\"country\",\"size_band\",\"employee_count\",\"annual_revenue_band\",\"crm_stage\",\"tech_stack_summary\",\"account_health\",\"primary_contact_name\",\"primary_contact_email\",\"contacts_json\",\"notes\"],\"foreign_keys\":[],\"enum_values\":{\"industry\":[\"Education\",\"Energy\",\"Financial Services\",\"Healthcare\",\"Hospitality\","},{"name":"search_artifacts","input":"{\"query\":\"approval bypass workflow skipped sign-off Canada\",\"facet_by\":\"customer_id\",\"limit\":10}","output":"{\"rows\":[{\"artifact_id\":\"art_f4a8c516b934\",\"title\":\"Support ticket: Approval workflow failures: Canada-specific approvers bypassed for ~3 hours after migration (2026-03-12). High-severity because misapproved claims were sent downstream to billing. Customer requests a timeline for fix, verification steps, and audit evidence export.\",\"artifact_type\":\"support_ticket\",\"created_at\":\"2026-03-13T09:22:00"},{"name":"query_entities","input":"{\"entity\":\"customers\",\"filters\":[{\"column\":\"customer_id\",\"op\":\"in\",\"value\":[\"cus_c44f952abde6\",\"cus_8ac7338d1b68\",\"cus_77aa5a39cb6d\",\"cus_1a6ee5ed7a31\",\"cus_f662b40a432a\",\"cus_e98688cf78bc\"]}],\"select\":[\"customer_id\",\"name\",\"country\",\"industry\"]}","output":"{\"rows\":[{\"customer_id\":\"cus_1a6ee5ed7a31\",\"name\":\"MapleWest Bank\",\"country\":\"Canada\",\"industry\":\"Financial Services\"},{\"customer_id\":\"cus_77aa5a39cb6d\",\"name\":\"MapleBay Marketplace\",\"country\":\"Canada\",\"industry\":\"Retail\"},{\"customer_id\":\"cus_8ac7338d1b68\",\"name\":\"MapleFork Franchise Systems\",\"country\":\"Canada\",\"industry\":\"Hospitality\"},{\"customer_id\":\"cus_c44f952abde6\",\"name\":\"MapleBridge Insuran"}]},{"id":"gold_semantic_01","suite":"semantic_stress","tags":[],"correct":null,"match":"judge","detail":"deferred to judge/manual","question":"Are any of our customers currently being pulled toward a competitor by a better price?","answer":"Yes — a few accounts are being pulled by a lower-cost competitor specifically on price, not just features:\n\n- **BlueHarbor Logistics** — evaluating **NoiseGuard** as a \"low-cost, tactical dedupe layer.\"\n- **HelioFab Systems** — risk of choosing **NoiseGuard** for cheap tactical dedupe.\n- **NorrLog Freight AB** — eyeing **EdgeCollector Co.'s** \"low-cost, small-footprint collectors\" to save on seat cost.\n- **NordFryst AB** — **Patchway's** consolidation pitch described as \"compelling financially.\"\n\nMost other competitor situations (Svenska PolyChem, NordicChem, NordChemica, NordMed, Aurora, Southern Cross, etc.) are driven by features/procurement fit rather than price. Note these results were truncated (~30 competitor reports total), so there may be a few more — but the clearest price-driven pulls are the four above.","expected":"Three accounts are being pulled toward a competitor on price. NordFryst AB: procurement is pushing to reduce vendor count, and Patchway offered a 15 percent discount to move ingestion elsewhere; NordFryst is staying with Signal Ingest for now because of the Kafka connectors and buffering, but noisy alerts remain a real problem. NordChemica AB: procurement is leaning on a Patchway consolidation pitch (roughly 18 percent annual savings) and is using the unresolved alert noise as leverage. NorrLog Freight AB: EdgeCollector Co. is offering collector seats around 30 percent cheaper, and procurement will push to switch collectors if the reporting-latency issues are not resolved.","recall":0.3,"precision":0.1875,"mrr":0.2,"expectedIds":{"artifacts":["art_57ab871c2b35","art_f92d6a99f322","art_49f5fae5a1cf","art_6f285c2f3219","art_0a135c689c08","art_ac0f6823bd92","art_49ed2e9ef596","art_ffa7143fb822","art_35148df5b41b","art_b50b72e5837c"]},"predicted":{"artifacts":["art_fd6f109c343d","art_c9970c1dc932","art_e2727db588de","art_9a8845b33c9e","art_ac0f6823bd92","art_b50b72e5837c","art_b3c672315594","art_f92d6a99f322","art_3dd0473bff8c","art_8e8c5e2be8ee","art_8d746f4d1c3d","art_4e17804e43b1","art_599ab3ce9cc8","art_760df143a1e2","art_8ab3c6a11187","art_bf47226fbfc2"]},"toolCallCount":3,"toolCalls":[{"name":"search_artifacts","input":"{\"query\":\"competitor offering lower price cheaper switching considering alternative\",\"facet_by\":\"customer_id\",\"limit\":15}","output":"{\"rows\":[{\"artifact_id\":\"art_fd6f109c343d\",\"title\":\"Competitor report: EdgeCollector Co.\",\"artifact_type\":\"competitor_research\",\"created_at\":\"2026-03-19T11:20:00+01:00\",\"customer_id\":\"cus_c31fbf7dd7e7\",\"product_id\":\"prd_ed38a2edeb94\",\"competitor_id\":\"cmp_3c1aa248d11c\",\"snippet\":\"EdgeCollector Co. (primary competitor in this scenario) offers strong offline buffering and small-footprint agents attra"},{"name":"search_artifacts","input":"{\"query\":\"customer choosing competitor because lower price cheaper cost savings budget cheaper alternative\",\"artifact_type\":\"customer_call\",\"facet_by\":\"customer_id\",\"limit\":10}","output":"{\"rows\":[{\"artifact_id\":\"art_e2727db588de\",\"title\":\"Competitor report: NoiseGuard\",\"artifact_type\":\"competitor_research\",\"created_at\":\"2026-03-19T13:00:00Z\",\"customer_id\":\"cus_95ba616f39b7\",\"product_id\":\"prd_f8d861694bac\",\"competitor_id\":\"cmp_88dc528f7db7\",\"snippet\":\"NoiseGuard is a focused alert deduplication/suppression tool (cmp_88dc528f7db7). For HelioFab's issue (taxonomy-driven relevance deg"},{"name":"search_artifacts","input":"{\"query\":\"competitor undercutting our price lower cost quote pricing pressure to switch\",\"artifact_type\":\"support_ticket\",\"facet_by\":\"customer_id\",\"limit\":10}","output":"{\"rows\":[{\"artifact_id\":\"art_c9970c1dc932\",\"title\":\"Competitor report: NoiseGuard\",\"artifact_type\":\"competitor_research\",\"created_at\":\"2026-03-19T11:20:00Z\",\"customer_id\":\"cus_10762173c26d\",\"product_id\":\"prd_f8d861694bac\",\"competitor_id\":\"cmp_88dc528f7db7\",\"snippet\":\"NoiseGuard (cmp_88dc528f7db7) is being evaluated by BlueHarbor as a low-cost, tactical dedupe layer to buy time after taxonomy-induc"}]},{"id":"gold_semantic_02","suite":"semantic_stress","tags":[],"correct":null,"match":"judge","detail":"deferred to judge/manual","question":"Which customers sound like they're running out of patience with how long our fixes are taking?","answer":"Here are the customers whose artifacts show real impatience/escalation over how long fixes are taking — mostly around slipping remediation timelines and renewal pressure:\n\n- **City of Verdant Bay** — Renewal call demanding a firm timeline for the permanent fix + a full-quarter credit; escalation on approval-workflow failures.\n- **MapleBay Marketplace** — QBR where they \"pressed for concrete timeline to guarantee fix before renewal\" and audit evidence.\n- **NordChemica AB** — Executive escalation; procurement wants a \"cost/time-bound remediation guarantee\" ahead of renewal.\n- **Harborline Hospitality Group** — Support ticket requesting \"urgent escalation to avoid renewal churn\" over provisioning delays.\n- **Harbourline Regional Transit Authority** — Remediation + SLA-addendum negotiation after provisioning lag (competitor ObservaGrid in the mix).\n- **Maple Regional Transit Authority** — Post-migration approval failures under daily standups until fixed.\n- **MapleWest Bank** — High-severity approval-routing failures demanding hourly status updates until green.\n- **Province of Laurentia (Dept. of Public Works)** — Ingest failures tied to renewal negotiation, pushing for a 24–48h fix.\n- **Peregrine Logistics Group** — Renewal call tying financial concessions to \"measured improvements within 60 days.\"\n\nNote: results were truncated (~30 matches), so this extends a bit beyond the list — but these are the clearest cases of customers running low on patience over fix timelines, and the strongest signals cluster around **City of Verdant Bay, MapleBay, NordChemica, and Harborline/Harbourline** (renewal-linked escalations).","expected":"This is a broad, pervasive pattern across the at-risk and watch-list book — roughly nineteen customers in active renewal or escalation situations voice genuine impatience about how long remediation is taking, not just a handful, and they express it in their own words rather than a shared keyword like 'patience' or 'frustrated'. It shows up three ways. (1) Renewals made contingent on a proof-of-fix by a deadline: BlueHarbor Logistics (relevance restored in 4 weeks, proof-of-fix in 10 business days), Pioneer Freight Solutions (concessions if not resolved before renewal), Harborline Hospitality Group (90-day plan tied to renewal, wants month-by-month proof), Harbourline Regional Transit Authority (firm SLA plus phased rollout), City of Verdant Bay ('25% credit or we won't renew,' decision demanded by Friday), and Maple Regional Transit Authority (renewal hesitation, wants credits/SLAs). (2) Competitor or vendor-switch ultimatums if the fix slips: NordFryst, NordChemica, and NordicChem (Patchway), NorrLog Freight and Svenska PolyChem (EdgeCollector Co.), Province of Laurentia (MetricLens), HelioFab Systems ('two weeks or Procurement opens an RFP'), and Southern Cross Travel Network ('or we'll look at alternatives'). (3) Executive escalations over an unresolved issue with hard deadlines or tight status cadences: Helix Assemblies ('not acceptable during production,' progress every 12 hours), MapleFork Franchise Systems ('finance breathing down our necks,' payouts demanded in 48 hours), Harvest Table Group ('we can't have long dev cycles,' measurable change in 30 days), Northbound Travel Network ('we can't keep manual triage for more than two weeks'), and Peregrine Logistics Group (concessions tied to measured improvement within 60 days). Naming any reasonable subset of these — especially ones using explicit ultimatum, deadline, competitor-switch, 'unacceptable,' or manual-headcount language — is correct. Department of Regional Services (DRS) is a deliberate near-miss: it is in a renewal with a competitor watch, but calls its timeline 'tight but acceptable' and voices no impatience about fix speed, so it should not be counted.","recall":0.21052631578947367,"precision":0.64,"mrr":1,"expectedIds":{"artifacts":["art_0bccc580184e","art_3e9031389474","art_bd3560dfe194","art_8b0063fbb3cb","art_776ba299d576","art_e408968fe032","art_0b682acd9b37","art_a0ed9f935d3e","art_5ccab0fec154","art_0bc4b1555242","art_c5fdb05e4bcf","art_948a65eb617b","art_a504e4c5b6f8","art_79cf94421871","art_7373b64fdfdd","art_3ba29fe1e026","art_8ca0b36476f9","art_c6d03ea392b2","art_cf6f9e07e25a","art_6be1b68b59cb","art_57ab871c2b35","art_49f5fae5a1cf","art_6f285c2f3219","art_50987b3f2b98","art_35148df5b41b","art_20bde2b4c84c","art_a516a7b0deb6","art_cc1d06976a22","art_4b144e303af5","art_e105d838d6ae","art_1290f5ea8c04","art_0927b1cbb7f4","art_24cde48fa39d","art_e856d122eeda","art_ca3e3f2e2be9","art_fbed53e40d47","art_0a135c689c08","art_49ed2e9ef596","art_ffa7143fb822","art_a9d51da1b57b","art_25fac9f564e7","art_2c74d2b4b2e4","art_873073298cc9","art_e89e8accadd2","art_a029fae81edd","art_f3968b1ad551","art_3f64aa55a21d","art_164044f6262e","art_f893faeda15a","art_f60d368c4493","art_fff67d92fe41","art_cbfb5f92862c","art_4dd3f81e5e57","art_3fbda14b69dd","art_e20b32ed9bb7","art_9345d5653840","art_704cd4878dd3","art_95ea469dd509","art_f84ee0a8f925","art_1f94d698288a","art_1ffa5cbc79df","art_7f4d46be8d52","art_e835cae69792","art_0ac4efa5a0ff","art_c6df5a6551d3","art_3497f365d58e","art_ad58f3ce1afd","art_e9c20e0a23e0","art_0a889c156455","art_1024fbdb026f","art_738af7130c81","art_62b592a9f703","art_25a4e8969ede","art_a1c34a4ec369","art_d0e7c55f63b4","art_e962952c9d23"]},"predicted":{"artifacts":["art_f60d368c4493","art_f926fa9a5390","art_164044f6262e","art_cc1d06976a22","art_a9a5ec39e511","art_1f94d698288a","art_3ba29fe1e026","art_87ce7 hnical root causes:\n\n1. **ServiceNow payload mapping omitted the override fields.** The frontline override was implemented as a local Orchestrator/kiosk action that only wrote to local audit logs; the ServiceNow template mapped only `incident_id`/`short_description`, so `override_reason` and `confidence_score` never made it into the evidence export.\n\n2. **Correlation window too short for edge kiosks.** ~8% of the 320 kiosks ran older local-buffer firmware that delivered events >3 min late, past the default 3-minute correlation window — so incidents were created without linked raw events, breaking the audit chain.\n\n(Fix: add override_reason/confidence_score/operator_id/original_event_id to the ServiceNow mapping, bump the correlation window from 3m to 6m, plus a \"Why routed\" transparency widget and the Compliance Evidence Export bundle.)","expected":"Southern Cross Travel Network. Their January-March audit found gaps in exception-routing evidence: Signal Insights received the override and routing events, but the override metadata wasn't being sent through the ServiceNow connector, so it never reached the audit trail. This is Southern Cross Travel Network, not the similarly named Southern Cross University Network, which has a separate, unrelated automation-trust issue.","recall":1,"precision":0.23529411764705882,"mrr":1,"expectedIds":{"artifacts":["art_e962952c9d23","art_25a4e8969ede","art_a1c34a4ec369","art_d0e7c55f63b4"]},"predicted":{"artifacts":["art_e962952c9d23","art_fc6c465c3c59","art_8107dc8eb87c","art_142ab459c9c1","art_5e1adf8264da","art_d0e7c55f63b4","art_f84ee0a8f925","art_a1c34a4ec369","art_95ea469dd509","art_1f94d698288a","art_b130f9d3e0ea","art_6a0e9c80a909","art_889d86e752e0","art_9985f7bb84ff","art_ddce9bf97dfe","art_25a4e8969ede","art_b3c672315594"]},"toolCallCount":3,"toolCalls":[{"name":"search_artifacts","input":"{\"query\":\"exception overrides not tracked compliance evidence audit\"}","output":"{\"rows\":[{\"artifact_id\":\"art_e962952c9 const pct = (n) => n == null ? "—" : Math.round(n * 100) + "%";
const mean = (xs) => xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
const esc = (s) => String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
// light markdown: **bold** and `code`, over escaped text; newlines preserved via CSS white-space.
const md = (s) => esc(s).replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>").replace(/`([^`]+)`/g, "<code>$1</code>");

function verdictOf(r) {
  if (r.correct === true) return { k: "pass", label: "pass" };
  if (r.correct === false) return { k: "fail", label: "fail" };
  if (r.correct === null) return { k: "judge", label: "judge" };
  return { k: "", label: "—" };
}
const meterCls = (n) => n == null ? "" : n >= 0.75 ? "" : n >= 0.4 ? "mid" : "lo";
function meter(n) {
  if (n == null) return '<span class="dash">—</span>';
  return '<span class="meter"><span class="track ' + meterCls(n) + '"><i style="width:' + Math.round(n * 100) + '%"></i></span><span class="v">' + pct(n) + '</span></span>';
}

function tagChips(tags) {
  if (!tags || !tags.length) return "";
  return '<div class="tags">' + tags.map((t) => '<span class="chip-tag">' + esc(t) + '</span>').join("") + '</div>';
}

// mode "expected": gold ids, green if retrieved else red. mode "retrieved": predicted ids, green if relevant else amber.
function idChips(groups, other, mode) {
  const ents = Object.keys(groups || {});
  if (!ents.length) return '<span class="idchip none">none</span>';
  let out = "";
  for (const e of ents) {
    const oset = new Set((other && other[e]) || []);
    for (const id of (groups[e] || [])) {
      const hit = oset.has(id);
      const cls = hit ? "hit" : mode === "expected" ? "miss" : "fp";
      out += '<span class="idchip ' + cls + '"><span class="ent">' + esc(e.slice(0, 3)) + '·</span>' + esc(id) + '</span>';
    }
  }
  return out;
}

    '<div class="idgrid">' +

    '</div></div>';
}

      '<div class="pane expected"><div class="head"><span>Expected</span><span class="match">' + esc(r.match) + '</span></div><div class="body">' + (r.expected == null ? '<span class="dash">— no gold answer —</span>' : md(r.expected)) + '</div></div>' +
    '</div>' +
    (scorer ? '<div class="verdict-strip"><span class="lbl-eyebrow">Scorer</span>' + scorer + '</div>' : "") +
    retrievalHtml(r) +
    traceHtml(r) +
  '</div>';
}

const firstFail = DATA.find((r) => r.correct === false);
const state = { view: "console", q: "", verdict: "", suite: "", sortKey: "id", sortDir: 1, open: new Set(firstFail ? [firstFail.id] : []) };

function filtered() {
  const rows = DATA.filter((r) => {
    if (state.verdict && verdictOf(r).k !== state.verdict) return false;
    if (state.suite && r.suite !== state.suite) return false;
    if (state.q) {
      const q = state.q.toLowerCase();
      const tagHit = (r.tags || []).some((t) => t.toLowerCase().includes(q));
      if (!r.id.toLowerCase().includes(q) && !r.question.toLowerCase().includes(q) && !tagHit) return false;
    }
    return true;
  });
  const k = state.sortKey;
  rows.sort((a, b) => {
    let av = a[k], bv = b[k];
    if (k === "verdict") { av = verdictOf(a).label; bv = verdictOf(b).label; }
    if (av == null) return 1;
    if (bv == null) return -1;
    return av < bv ? -state.sortDir : av > bv ? state.sortDir : 0;
  });
  return rows;
}

const COLS = [
  { k: "id", label: "id", sortable: true },
  { k: "suite", label: "suite", sortable: true },
  { k: "verdict", label: "ans", sortable: true },
  { k: "match", label: "match", sortable: true },
  { k: "question", label: "question", sortable: false },
  { k: "recall", label: "recall", sortable: true },
  { k: "precision", label: "prec", sortable: true },
  { k: "mrr", label: "mrr", sortable: true },
  { k: "toolCallCount", label: "tools", sortable: true },
];

function renderConsole(rows) {
  const arrow = (k) => state.sortKey === k ? '<span class="arr">' + (state.sortDir === 1 ? "▲" : "▼") + '</span>' : "";
  const head = '<th class="c-chev"></th>' + COLS.map((c) =>
    '<th class="' + (c.sortable ? "sortable" : "") + '" data-k="' + c.k + '">' + c.label + " " + (c.sortable ? arrow(c.k) : "") + '</th>').join("");
  let body = "";
  for (const r of rows) {
    const v = verdictOf(r);
    const open = state.open.has(r.id);
    body += '<tr class="row ' + (open ? "open" : "") + '" data-id="' + esc(r.id) + '">' +
      '<td class="c-chev"><span class="cx">›</span></td>' +
      '<td class="c-id">' + esc(r.id) + '</td>' +
      '<td><span class="chip-suite">' + esc(r.suite.replace(/_/g, " ")) + '</span></td>' +
      '<td><span class="pill ' + v.k + '">' + v.label + '</span></td>' +
      '<td><span class="match">' + esc(r.match) + '</span></td>' +
      '<td class="c-q"><div class="qt">' + esc(r.question) + '</div>' + (r.tags && r.tags.length ? '<div class="tags row-tags">' + r.tags.map((t) => '<span class="chip-tag">' + esc(t) + '</span>').join("") + '</div>' : "") + '</td>' +
      '<td>' + meter(r.recall) + '</td>' +
      '<td>' + meter(r.precision) + '</td>' +
      '<td class="num">' + (r.mrr == null ? '<span class="dash">—</span>' : r.mrr.toFixed(2)) + '</td>' +
      '<td class="num">' + r.toolCallCount + '</td>' +
    '</tr>';
    if (open) body += '<tr class="detailrow"><td colspan="' + (COLS.length + 1) + '"><div class="detailwrap">' + detailHtml(r) + '</div></td></tr>';
  }
  if (!rows.length) body = '<tr><td colspan="' + (COLS.length + 1) + '"><div class="empty">No cases match the filters.</div></td></tr>';
  return '<div class="tablecard"><table><thead><tr>' + head + '</tr></thead><tbody>' + body + '</tbody></table></div>';
}

function renderCards(rows) {
  if (!rows.length) return '<div class="tablecard"><div class="empty">No cases match the filters.</div></div>';
  return '<div class="cards">' + rows.map((r) => {
    const v = verdictOf(r);
    const mini = (r.recall == null ? "" :
      '<span class="m">recall <b>' + pct(r.recall) + '</b></span><span class="m">prec <b>' + pct(r.precision) + '</b></span>' +
      (r.mrr == null ? "" : '<span class="m">mrr <b>' + r.mrr.toFixed(2) + '</b></span>')) +
      '<span class="m">tools <b>' + r.toolCallCount + '</b></span>';
    return '<div class="card">' +
      '<div class="chead"><span class="pill ' + v.k + '">' + v.label + '</span><span class="cid">' + esc(r.id) + '</span>' +
        '<span class="chip-suite">' + esc(r.suite.replace(/_/g, " ")) + '</span><span class="match">' + esc(r.match) + '</span>' +
        '<span class="spacer2"></span><span class="mini">' + mini + '</span></div>' +
      detailHtml(r) + '</div>';
  }).join("") + '</div>';
}

function render() {
  const rows = filtered();
  document.getElementById("view").innerHTML = state.view === "console" ? renderConsole(rows) : renderCards(rows);
  if (state.view === "console") {
    document.querySelectorAll("tr.row").forEach((tr) => tr.addEventListener("click", () => {
      const id = tr.dataset.id;
      if (state.open.has(id)) state.open.delete(id); else state.open.add(id);
      render();
    }));
    document.querySelectorAll("th.sortable").forEach((th) => th.addEventListener("click", () => {
      const k = th.dataset.k;
      state.sortDir = state.sortKey === k ? -state.sortDir : 1;
      state.sortKey = k;
      render();
    }));
  }
}

function renderSummary() {
  const graded = DATA.filter((r) => r.correct === true || r.correct === false);
  const passed = graded.filter((r) => r.correct === true).length;
  document.getElementById("passbig").innerHTML = passed + '<span class="of"> / ' + graded.length + '</span>';
  document.getElementById("meta").textContent = DATA.length + " cases · " + (DATA.length - graded.length) + " judge/deferred";

  const scored = DATA.filter((r) => r.recall != null);
  const mrrScored = scored.filter((r) => r.mrr != null);
  document.getElementById("retrievalbig").innerHTML = scored.length ?
    '<div class="m"><span class="mv">' + pct(mean(scored.map((r) => r.recall))) + '</span><span class="mk">recall</span></div>' +
    '<div class="m"><span class="mv">' + pct(mean(scored.map((r) => r.precision))) + '</span><span class="mk">precision</span></div>' +
    '<div class="m"><span class="mv">' + (mrrScored.length ? mean(mrrScored.map((r) => r.mrr)).toFixed(2) : "—") + '</span><span class="mk">mrr</span></div>' +
    '<span class="scored">' + scored.length + ' scored</span>'
    : '<span class="scored">none scored</span>';

  const suiteOrder = ["core_deterministic","adversarial","canonical_sample","semantic_stress","regression"];
  const suites = [...new Set(DATA.map((r) => r.suite))].sort((a, b) => {
    const ai = suiteOrder.indexOf(a), bi = suiteOrder.indexOf(b);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  document.getElementById("suite").innerHTML = '<option value="">All suites</option>' + suites.map((s) => '<option value="' + s + '">' + s.replace(/_/g, " ") + '</option>').join("");
  document.getElementById("suites").innerHTML = suites.map((s) => {
    const rs = DATA.filter((r) => r.suite === s);
    const g = rs.filter((r) => r.correct === true || r.correct === false);
    const p = g.filter((r) => r.correct === true).length;
    const ratio = g.length ? p / g.length : 0;
    const sc = rs.filter((r) => r.recall != null);
    const rc = sc.length ? '<span class="rc">R ' + pct(mean(sc.map((r) => r.recall))) + '</span>' : "";
    return '<div class="suite-chip"><span class="nm">' + s.replace(/_/g, " ") + '</span>' +
      '<span class="bar"><i style="width:' + Math.round(ratio * 100) + '%"></i></span>' +
      '<span class="rt">' + p + '/' + g.length + '</span>' + rc + '</div>';
  }).join("");
}

document.getElementById("search").addEventListener("input", (e) => { state.q = e.target.value; render(); });
document.getElementById("verdict").addEventListener("change", (e) => { state.verdict = e.target.value; render(); });
document.getElementById("suite").addEventListener("change", (e) => { state.suite = e.target.value; render(); });
function setView(v) {
  state.view = v;
  document.getElementById("v-console").setAttribute("aria-pressed", v === "console");
  document.getElementById("v-cards").setAttribute("aria-pressed", v === "cards");
  render();
}
document.getElementById("v-console").addEventListener("click", () => setView("console"));
document.getElementById("v-cards").addEventListener("click", () => setView("cards"));

renderSummary();
render();
</script>
</body>
</html>
